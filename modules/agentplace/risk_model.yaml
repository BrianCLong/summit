# AgentPlace Risk Model Configuration
# Weights and thresholds for agent manifest risk evaluation.

weights:
  unrecognized_capability: 15
  excessive_scopes: 10
  missing_interaction_purpose: 20
  restricted_data_access: 25
  high_autonomy_capability: 30

thresholds:
  low: 20
  medium: 50
  high: 80

allowlisted_capabilities:
  - web-search
  - read-only-access
  - data-aggregation
  - natural-language-processing

high_autonomy_capabilities:
  - code-execution
  - financial-transaction
  - system-modification
  - user-impersonation
