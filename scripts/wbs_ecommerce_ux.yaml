  - id: ws3-ci-gates
    owner: codex
    deliverables:
      - .github/workflows/ux-readiness-gate.yml
      - tests/test_mobile_score.py
      - tests/test_page_speed_gate.py
      - tests/test_nav_complexity.py
    status: pending
  - id: ws4-security
    owner: codex
    deliverables:
      - docs/security/data-handling/ecommerce-ux.md
      - tests/test_hidden_fee_flag.py
      - tests/test_invalid_badge.py
    status: pending
  - id: ws5-performance
    owner: codex
    deliverables:
      - scripts/profile_ux.py
      - performance_metrics.json
    status: pending
constraints:
  - feature_flag: --enable-ux-eval
