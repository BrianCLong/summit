[package]
name = "pnel_runtime"
version = "0.1.0"
edition = "2021"

[dependencies]
pyo3 = { version = "0.19.0", features = ["extension-module"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ring = "0.16.20" # For cryptographic reasoning attestation

[lib]
name = "pnel_runtime"
crate-type = ["cdylib"]
