# Observability Stack Configuration
# ServiceMonitor, PrometheusRules, and Grafana dashboards
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: summit-api
  namespace: monitoring
  labels:
    app: summit
    release: prometheus
spec:
  selector:
    matchLabels:
      app: summit
      component: api
  namespaceSelector:
    matchNames:
    - summit
  endpoints:
  - port: metrics
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    scheme: http
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: summit-alerts
  namespace: monitoring
  labels:
    app: summit
    release: prometheus
spec:
  groups:
  - name: summit.rules
    interval: 30s
    rules:
    # High Error Rate
    - alert: SummitHighErrorRate
      expr: |
        sum(rate(http_requests_total{job="summit-api",status=~"5.."}[5m]))
        / sum(rate(http_requests_total{job="summit-api"}[5m])) > 0.05
      for: 5m
      labels:
        severity: critical
        team: platform
      annotations:
        summary: "High error rate in Summit API"
        description: "Error rate is {{ $value | humanizePercentage }} (> 5%)"

    # High Latency
    - alert: SummitHighLatency
      expr: |
        histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="summit-api"}[5m])) by (le))
        > 1
      for: 10m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "High latency in Summit API"
        description: "95th percentile latency is {{ $value }}s (> 1s)"

    # Pod Not Ready
    - alert: SummitPodNotReady
      expr: |
        kube_pod_status_ready{namespace="summit",condition="true"} == 0
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "Summit pod not ready"
        description: "Pod {{ $labels.pod }} is not ready"

    # High Memory Usage
    - alert: SummitHighMemoryUsage
      expr: |
        container_memory_working_set_bytes{namespace="summit",container!=""}
        / container_spec_memory_limit_bytes{namespace="summit",container!=""} > 0.9
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "High memory usage in Summit"
        description: "Container {{ $labels.container }} is using {{ $value | humanizePercentage }} of memory limit"

    # High CPU Usage
    - alert: SummitHighCPUUsage
      expr: |
        sum(rate(container_cpu_usage_seconds_total{namespace="summit",container!=""}[5m]))
        by (pod,container)
        / sum(container_spec_cpu_quota{namespace="summit",container!=""}/container_spec_cpu_period{namespace="summit",container!=""})
        by (pod,container) > 0.9
      for: 10m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "High CPU usage in Summit"
        description: "Container {{ $labels.container }} is using {{ $value | humanizePercentage }} of CPU limit"

    # HPA At Max Replicas
    - alert: SummitHPAAtMax
      expr: |
        kube_horizontalpodautoscaler_status_current_replicas{namespace="summit"}
        == kube_horizontalpodautoscaler_spec_max_replicas{namespace="summit"}
      for: 15m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "HPA at max replicas"
        description: "HPA {{ $labels.horizontalpodautoscaler }} is at max replicas"

    # PVC Nearly Full
    - alert: SummitPVCNearlyFull
      expr: |
        kubelet_volume_stats_used_bytes{namespace="summit"}
        / kubelet_volume_stats_capacity_bytes{namespace="summit"} > 0.85
      for: 5m
      labels:
        severity: warning
        team: platform
      annotations:
        summary: "PVC nearly full"
        description: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"

  - name: summit.slo
    interval: 30s
    rules:
    # SLO: Availability
    - record: summit:slo:availability
      expr: |
        1 - (
          sum(rate(http_requests_total{job="summit-api",status=~"5.."}[1h]))
          / sum(rate(http_requests_total{job="summit-api"}[1h]))
        )

    # SLO: Latency (p99 < 500ms)
    - record: summit:slo:latency_p99
      expr: |
        histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job="summit-api"}[1h])) by (le))

    # SLO Breach Alert
    - alert: SummitSLOBreach
      expr: summit:slo:availability < 0.999
      for: 5m
      labels:
        severity: critical
        team: platform
      annotations:
        summary: "Summit SLO breach"
        description: "Availability is {{ $value | humanizePercentage }} (SLO: 99.9%)"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: summit-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  summit-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.95},
                  {"color": "red", "value": 0.99}
                ]
              }
            }
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "summit:slo:availability",
              "legendFormat": "Availability"
            }
          ],
          "title": "SLO: Availability",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "id": 2,
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"summit-api\"}[5m])) by (status)",
              "legendFormat": "{{status}}"
            }
          ],
          "title": "Request Rate by Status",
          "type": "graph"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "id": 3,
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"summit-api\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"summit-api\"}[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"summit-api\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "title": "Request Latency",
          "type": "graph"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 37,
      "style": "dark",
      "tags": ["summit", "api"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "Summit API Dashboard",
      "uid": "summit-api",
      "version": 1,
      "weekStart": ""
    }
