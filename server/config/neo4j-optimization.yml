# Neo4j Query Optimization

# Index Recommendations
indexes:
  - label: Entity
    property: id
    type: CONSTRAINT
  - label: Entity
    property: uuid
    type: CONSTRAINT
  - label: Entity
    property: type
    type: INDEX
  - label: Investigation
    property: status
    type: INDEX
  - label: AudienceSegment
    property: id
    type: CONSTRAINT
  - label: AudienceSegment
    property: name
    type: INDEX
  - label: CognitiveState
    property: id
    type: CONSTRAINT
  - label: CognitiveAttack
    property: id
    type: CONSTRAINT
  - label: NarrativeCascade
    property: id
    type: CONSTRAINT
  - label: NarrativeCascade
    property: narrativeId
    type: INDEX
  - label: CascadeHop
    property: id
    type: CONSTRAINT
  - label: CascadeHop
    property: cascadeId
    type: INDEX
  - label: TippingPointIndicator
    property: id
    type: CONSTRAINT
  - label: TippingPointIndicator
    property: narrativeId
    type: INDEX
  - label: IOActor
    property: id
    type: CONSTRAINT
  - label: IOActor
    property: name
    type: INDEX

# Query Monitoring
monitoring:
  slow_query_threshold_ms: 500
  explain_threshold_ms: 1000
  log_level: info
