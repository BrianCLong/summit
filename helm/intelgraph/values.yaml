namespace: intelgraph-dev

image:
  app:
    repository: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/intelgraph/app
    tag: 'latest'
  web:
    repository: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/intelgraph/web
    tag: 'latest'

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:<ACCOUNT_ID>:certificate/<CERT_ID>
    alb.ingress.kubernetes.io/group.name: intelgraph-dev
  hosts:
    - host: dev.topicality.co
      paths:
        - path: /
          pathType: Prefix

env:
  NODE_ENV: production
  GRAPH_URI: bolt://neo4j.intelgraph-dev.svc.cluster.local:7687
  GRAPH_USER: neo4j
  GRAPH_PASSWORD_SECRET: neo4j-auth
  POSTGRES_URI_SECRET: pg-uri
  REDIS_URI_SECRET: redis-uri
  S3_BUCKET: intelgraph-dev-artifacts

signer:
  enabled: true
  replicas: 1
  image:
    repository: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/intelgraph/signer
    tag: 'latest'
  service:
    port: 8081
  bundle:
    url: https://artifacts.intelgraph.dev/policy/maestro-policy-bundle.tgz
    signerKeyId: opa-signer-dev
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

neo4j:
  acceptLicenseAgreement: 'yes'
  neo4j:
    password: 'please-reset-in-secret' # overridden by secret
  resources:
    cpu: '1'
    memory: '2Gi'

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /metrics
  prometheus:
    server: prometheus-server.monitoring.svc.cluster.local

# Health checks
healthCheck:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Preview environment specific settings
preview:
  enabled: false
  ttl: "24h"
  cleanup: true

rollout:
  enabled: true
  autoPromotionEnabled: false
  scaleDownDelaySeconds: 30
  progressDeadlineSeconds: 600
  canary:
    initialWeight: 10
    secondWeight: 50
    initialPause: 5m
    secondPause: 10m
    maxSurge: 1
    maxUnavailable: 0
  metrics:
    interval: "30s"
    count: 5
    successRate:
      successCondition: "result[0] >= 0.95"
      failureCondition: "result[0] < 0.90"
    errorRate:
      successCondition: "result[0] <= 0.05"
      failureCondition: "result[0] > 0.10"
    latency:
      successCondition: "result[0] <= 2000"
      failureCondition: "result[0] > 5000"
  tests:
    enabled: false
    image: curlimages/curl:8.4.0
