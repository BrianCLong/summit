version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: summit
      POSTGRES_PASSWORD: ${DB_PASSWORD:-local_dev}
      POSTGRES_DB: summit_intel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-local_dev}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  minio:
    image: minio/minio:RELEASE.2023-10-16T04-13-43Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  runner:
    build:
      context: .
      dockerfile: runtime/runner/Dockerfile
    environment:
      - DATABASE_URL=postgres://summit:${DB_PASSWORD:-local_dev}@db:5432/summit_intel
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-local_dev}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=${MINIO_PASSWORD:-minioadmin}
    depends_on:
      - db
      - neo4j
      - minio

volumes:
  postgres_data:
  neo4j_data:
  minio_data:
