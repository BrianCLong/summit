name: Plan Heatmap & Stability Gate
on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
  pull_request:

jobs:
  plan-stability-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pyyaml
      - name: Download plan samples artifact (optional)
        uses: actions/download-artifact@v4
        with:
          name: plan-samples
          path: .plan-samples
        continue-on-error: true
      - name: Render heatmap
        run: python tools/plan_heatmap.py
      - name: Enforce gate
        run: python tools/plan_gate.py

      - name: Build deterministic plan report
        run: |
          mkdir -p artifacts/plan
          python tools/plan_report.py
          python tools/plan_attest.py

      - name: Sign attestation
        run: |
          curl -L -o cosign https://github.com/sigstore/cosign/releases/download/v2.2.3/cosign-linux-amd64
          chmod +x cosign
          sudo mv cosign /usr/local/bin/
          cosign sign-blob \
            --yes \
            --output-signature artifacts/plan/plan-attestation.sig \
            artifacts/plan/plan-attestation.intoto.jsonl
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Emit metrics artifact
        run: python telemetry/plan_metrics.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plan-heatmap
          path: |
            plan-heatmap.html
            .plan-samples/*.jsonl
            artifacts/plan/*
