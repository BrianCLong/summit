version: "3.9"

services:
  postgres:
    image: debezium/postgres:16
    environment:
      POSTGRES_USER: summit
      POSTGRES_PASSWORD: summit
      POSTGRES_DB: summit
      PGDATA: /var/lib/postgresql/data
    command: >
      -c wal_level=logical
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c shared_preload_libraries=wal2json
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summit -d summit"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5.19-community
    environment:
      NEO4J_AUTH: neo4j/summit
      NEO4J_dbms_security_auth__minimum__password__length: 4
    ports:
      - "7687:7687"
      - "7474:7474"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:7474"]
      interval: 5s
      timeout: 5s
      retries: 30

  # Optional: Kafka + Debezium (disabled by default)
