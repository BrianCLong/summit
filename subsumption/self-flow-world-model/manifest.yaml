version: 1
item:
  slug: self-flow-world-model
  title: "Black Forest Labs Self-Flow → Summit World-Model Architecture (SWMA)"
  type: "research-paper"
  date: "2026-03-05"
  links:
    - "https://venturebeat.com/ai/black-forest-labs-self-flow"
  intriguing_claim: >
    Self-Flow's dual-timestep self-distillation enables encoder-free multimodal
    training; Summit extends this into a full enterprise world-model — observation,
    representation, dynamics, planning — turning GraphRAG retrieval into
    planning-grade simulation.

