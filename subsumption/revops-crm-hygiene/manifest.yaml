apiVersion: subsumption.summit.io/v1alpha1
kind: SubsumptionPlan
metadata:
  name: revops-crm-hygiene
  labels:
    vertical: revops
    phase: mvp
    domain: crm
spec:
  objective: "Establish RevOps CRM Hygiene as the foundational Studio v1 vertical."
  successThresholds:
    - metric: "tenant_connection_rate"
      threshold: ">= 70%"
      description: "≥70% of pilot RevOps users connect their CRM."
    - metric: "bulk_fix_approval_rate"
      threshold: ">= 1 per tenant"
      description: "Approve at least one bulk hygiene fix in week 1."
    - metric: "production_write_incidents"
      threshold: "== 0"
      description: "Zero incidents of writing to production CRM."
  technicalDecisions:
    - name: "crm-abstraction-layer"
      description: "Implement a thin CRM abstraction layer to support both Salesforce and HubSpot uniformly."
      rationale: "Prevents vendor lock-in, ensures a consistent schema for detection algorithms, and accelerates future integration of additional CRMs."
  workflowSteps:
    - "connect-crm"
    - "select-template"
    - "detect-hygiene-issues"
    - "review-and-approve"
    - "apply-to-sandbox"
