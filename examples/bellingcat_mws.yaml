version: 1
workflow_id: bellingcat_mws
description: >
  Deterministic media verification workflow inspired by Bellingcat verification patterns:
  reverse image search + archiving + geo/chrono checks. Network connectors OFF by default.

policy:
  network: "deny"
  pii:
    never_log:
      - "raw_media_bytes"
      - "faces"
      - "phone_numbers"
      - "emails"
  connectors:
    allowlist: []

inputs:
  case_id: "mws_case1"
  media_path: "fixtures/mws_case1/input/media/example.jpg"
  hints:
    suspected_location_text: "Kyiv, Ukraine"
    suspected_date_range: ["2024-02-01", "2024-02-10"]

evidence:
  evid_prefix: "EVID"
  out_dir: "artifacts/runs"

steps:
  - id: "frame_extract"
    type: "reverse_image"
    mode: "offline_fixture"
    fixture: "fixtures/mws_case1/input/reverse_image_results.json"
    params:
      engines: ["yandex", "bing", "google"]
      max_candidates: 10
    outputs:
      candidates: "$.reverse_image.candidates"

  - id: "archive_intent"
    type: "archive"
    mode: "offline_fixture"
    fixture: "fixtures/mws_case1/input/archive_results.json"
    params:
      targets_from: "$.reverse_image.candidates[*].url"
      services: ["wayback", "archive_today"]
    outputs:
      archives: "$.archive.records"

  - id: "geo_hints"
    type: "geolocate_hint"
    mode: "offline_fixture"
    fixture: "fixtures/mws_case1/input/geolocate_matches.json"
    params:
      hint_text: "$.inputs.hints.suspected_location_text"
      candidates_from: "$.reverse_image.candidates"
    outputs:
      geo: "$.geo.best_match"

  - id: "chrono_shadow"
    type: "chronolocate_shadow"
    mode: "offline_fixture"
    fixture: "fixtures/mws_case1/input/chronolocate_candidates.json"
    params:
      location_from: "$.geo.best_match.location"
      date_range_from: "$.inputs.hints.suspected_date_range"
      shadow_observations:
        - azimuth_deg: 110.0
          elevation_deg: 25.0
    outputs:
      chrono: "$.chrono.best_window"

outputs:
  report_json: "report.json"
  provenance_json: "provenance.json"
  metrics_json: "metrics.json"
  stamp_json: "stamp.json"
