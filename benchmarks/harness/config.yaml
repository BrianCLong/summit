schema:
  version: "1.0"
seed: 42
queries:
  - id: "q1"
    shape: "MATCH (n) RETURN n LIMIT 10"
benchmark_backlog:
  - proposed_case: "Multi-agent Handoff Latency"
    target_framework: "OpenAI Agents"
    metric: "Handoff Overhead (ms)"
    description: "Measure the time and context loss when switching execution contexts."
  - proposed_case: "Complex State Recovery"
    target_framework: "LangGraph"
    metric: "Recovery Success Percentage"
    description: "Assess ability to recover from simulated API downtime and maintain state."
  - proposed_case: "Optimal Path Resolution"
    target_framework: "CrewAI"
    metric: "Optimal Path Ratio"
    description: "Evaluate task delegation efficiency versus total steps taken."
  - proposed_case: "Code Gen Safety & Sandboxing"
    target_framework: "AutoGen"
    metric: "First-pass Compilation Rate & Sandbox Violations"
    description: "Measure the correctness and safety of generated code executions."
