services:
  neo4j:
    image: neo4j:2025.01
    environment:
      - NEO4J_AUTH=neo4j/test1234
    ports: [ "7474:7474", "7687:7687" ]
    volumes:
      - neo4j_data:/data
    networks:
      - default
      - observability
      - intelgraph

  redis:
    image: redis:7-alpine
    ports: [ "6379:6379" ]
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - default
      - observability
      - intelgraph

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_PASSWORD=postgres
    ports: [ "5432:5432" ]
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - default
      - observability
      - intelgraph

  prov-ledger:
    build: ./services/prov-ledger
    command: node dist/index.js
    ports: [ "4010:4010" ]
    depends_on: [ redis ]
    networks:
      - default
      - observability

  policy-lac:
    build: ./gateway/policy-lac
    command: node dist/index.js
    ports: [ "4011:4000" ]
    networks:
      - default
      - observability

  nl2cypher:
    build: ./server/ai/nl2cypher
    command: node dist/index.js
    ports: [ "4020:4020" ]
    networks:
      - default
      - observability

  server:
    build:
      context: .
      dockerfile: server/Dockerfile.dev
    ports: [ "4001:4000" ]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=test1234
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - JWT_SECRET=dev-secret-do-not-use-in-prod-and-longer
      - JWT_REFRESH_SECRET=another-dev-secret-refresh-key-32-chars
      - SESSION_SECRET=dev-secret-do-not-use-in-prod
      - NODE_ENV=development
      - ENABLE_INSECURE_DEV_AUTH=true
      - AI_ENABLED=false
      - GA_CLOUD=
      - OPENAI_API_KEY=dummy
      - JAEGER_ENDPOINT=http://jaeger-collector:14268/api/traces
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://otel-collector:4318/v1/traces
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://otel-collector:4318/v1/metrics
    depends_on:
      - postgres
      - neo4j
      - redis
    networks:
      - default
      - observability
      - intelgraph

  api-gateway:
    build: ./services/api-gateway
    ports: [ "4002:4000" ]
    environment:
      - POLICY_DRY_RUN=true
      - ENABLE_INSECURE_DEV_AUTH=true
      - GRAPH_SERVICE_URL=http://server:4000
      - PROV_LEDGER_URL=http://prov-ledger:4010
      - PREDICTIVE_SUITE_URL=http://prediction-service:3000
      - RAG_SERVICE_URL=http://rag:8001
      - GRAPHRAG_SERVICE_URL=http://graphrag:8002
    depends_on:
      - redis
      - server
      - prov-ledger
      - prediction-service
      - rag
      - graphrag
    networks:
      - default
      - observability

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports: [ "4000:8080" ]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - API_GATEWAY_URL=http://api-gateway:4000
    depends_on: [ api-gateway ]
    networks:
      - default
      - observability

  backup-service:
    build: ./server/infrastructure/disaster-recovery
    volumes:
      - ./backups:/backups
      - redis_data:/redis_data
      - neo4j_data:/neo4j_data
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_HOST=redis
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - S3_BUCKET
      - S3_REGION
      - S3_ENDPOINT
    depends_on:
      - postgres
      - redis
    networks:
      - default
      - observability

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports: [ "3000:3000" ]
    environment:
      - VITE_API_URL=http://localhost:3000/graphql
      - VITE_WS_URL=ws://localhost:3000/graphql
    networks:
      - default
      - observability
      - intelgraph

  prediction-service:
    build:
      context: .
      dockerfile: services/prediction-service/Dockerfile
    ports: [ "4025:3000" ]
    environment:
      - NODE_ENV=development
    networks:
      - default
      - observability

  rag:
    build:
      context: .
      dockerfile: services/rag/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/postgres
    depends_on:
      - redis
      - postgres
    networks:
      - default
      - observability

  graphrag:
    build:
      context: .
      dockerfile: services/graphrag/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - neo4j
      - redis
    networks:
      - default
      - observability

  jaeger:
    image: jaegertracing/all-in-one:1.48
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"
      - "4318:4318"
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.85.0
    volumes:
      - ./ops/observability/otel-config.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "1888:1888"   # pprof extension
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "8889:8889"   # Prometheus exporter metrics
      - "13133:13133" # health_check extension
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP http receiver
      - "55679:55679" # zpages extension
    depends_on:
      - jaeger
    networks:
      - observability

  minio:
    image: minio/minio:RELEASE.2023-09-30T07-02-29Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - default
      - intelgraph

  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./ops/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/alerts:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - observability

  grafana:
    image: grafana/grafana:10.1.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./ops/observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/observability/grafana/dashboards-config:/etc/grafana/provisioning/dashboards:ro
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - observability

volumes:
  neo4j_data: {}
  pg_data: {}
  redis_data: {}
  prometheus_data: {}
  grafana_data: {}
  minio_data: {}

networks:
  observability:
    driver: bridge
  intelgraph:
    external: true
