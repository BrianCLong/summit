id: whois.v1
name: WHOIS Connector
version: 1.0.0
kind: osint-connector
owner: summit
license_class: public
collection_mode: api
deterministic: true
input_schema: domain.lookup.v1
output_schema: connector-output.v1
rate_limit:
  rps: 1
  burst: 5
policy_refs:
  - policies/collection/CONNECTOR_COLLECTION_POLICY.yaml
  - policies/licensing/CONNECTOR_LICENSE_POLICY.yaml
entity_mappings:
  - from: raw.domain
    to: entity/domain
  - from: raw.registrant_email
    to: entity/email
evidence:
  capture_raw: true
  capture_transform_hash: true
  capture_source_metadata: true
