type IntelGraphCost {
  dbHits: Int!
  rows: Int!
  elapsedMs: Int!
}

type GraphNode {
  id: ID!
  label: String!
}

type GraphEdge {
  id: ID!
  sourceId: ID!
  targetId: ID!
  type: String!
}

type Provenance {
  sourceId: String!
  firstSeenAt: String!
  confidence: Float!
}

type PatternResult {
  templateId: String!
  templateVersion: String!
  runId: String!
  tenantScope: String!
  nodes: [GraphNode!]!
  edges: [GraphEdge!]!
  provenance: [Provenance!]!
  warnings: [String!]!
  cost: IntelGraphCost!
  evidenceIds: [String!]!
}

input ScopeInput {
  tenantId: String!
  workspaceId: String!
}

extend type Query {
  runPattern(name: String!, params: String, scope: ScopeInput!): PatternResult
  getTemplate(name: String!): String
}
