name: AI Factory Drift Detection
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm && pnpm install
      - run: pnpm exec tsx scripts/monitoring/ai-factory-drift.ts
      - run: pnpm exec tsx scripts/monitoring/ai-factory-trends.ts
      - uses: actions/upload-artifact@v4
        with:
          name: ai-factory-drift-report
          path: artifacts/monitoring/ai-factory-drift/report.json
      - uses: actions/upload-artifact@v4
        with:
          name: ai-factory-trends-metrics
          path: artifacts/monitoring/ai-factory-trends/metrics.json
