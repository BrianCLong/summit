# UMAD (Uncertainty-Guided Multi-Agent Debate) Configuration
# This config injects UMAD rewards and hyperparameters into the Summit orchestrator.

umad:
  # Phase 1: Inference-only signal calculation
  inference:
    enabled: true
    # Weight for Aleatoric Uncertainty (Sys-AU) penalty (entropy-based)
    au_penalty_weight: 0.1
    # Threshold to consider a trajectory as "too noisy"
    au_threshold: 0.8
    # Weight for Epistemic Uncertainty (Sys-EU) divergence
    eu_divergence_weight: 0.2

  # Phase 2: Training / PPO configuration (UMAD IPPO)
  training:
    enabled: false
    # Accuracy reward (r^acc)
    accuracy_reward_weight: 1.0
    # Aleatoric uncertainty reward weight (r^au = -Sys-AU)
    au_reward_weight: 0.5
    # Epistemic influence reward weight (r^eu = Δ peer accuracy)
    eu_influence_reward_weight: 0.8
    # Discount factor
    gamma: 0.99
    # PPO clip ratio
    clip_ratio: 0.2
    # Value function coefficient
    vf_coef: 0.5
    # Entropy coefficient for exploration
    ent_coef: 0.01

  # Agent persona configurations for UMAD
  agents:
    - name: "Planner"
      temperature: 0.7
    - name: "CriticalVerifier"
      temperature: 0.4
    - name: "Reconciler"
      temperature: 0.2
