version: 1
default: deny
rules:
  - id: allow-jules-planning
    when:
      agent_names: ["jules"]
      roles: ["planner"]
      skills: ["plan.generate", "repo.read"]
      envs: ["dev", "test"]
    allow: true

  - id: allow-codex-write-client-only
    when:
      agent_names: ["codex"]
      roles: ["builder"]
      skills: ["repo.write", "tests.run"]
      repo_paths_glob: ["client/**", "server/**", "docs/**"]
      envs: ["dev", "test"]
    allow: true

  - id: allow-observer-ci
    when:
      agent_names: ["observer"]
      roles: ["reviewer"]
      skills: ["ci.inspect", "tests.run", "repo.read"]
      envs: ["dev", "test", "prod"]
    allow: true

  - id: allow-antigravity-release
    when:
      agent_names: ["antigravity"]
      roles: ["governance"]
      skills: ["release.approve", "repo.read"]
      envs: ["prod"]
    allow: true
