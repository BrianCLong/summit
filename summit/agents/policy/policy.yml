default: deny
rules:
  - id: allow-dev-builder-docs
    effect: allow
    env:
      - dev
      - test
    agent_role: builder
    skills:
      - docs.update
    scopes:
      - repo.write
    annotations:
      approvals:
        - maintainer

  - id: allow-prod-governance-release
    effect: allow
    env:
      - prod
    agent_role: governance
    skills:
      - release.approve
    scopes:
      - repo.write
    annotations:
      approvals:
        - governance
