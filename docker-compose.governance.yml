# Docker Compose for Governance Infrastructure
# Includes OPA, PostgreSQL, Neo4j, and Redis for governance system

version: '3.8'

services:
  # Open Policy Agent
  opa:
    image: openpolicyagent/opa:latest
    container_name: summit-opa
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ./policies:/policies:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - governance-network

  # PostgreSQL (for warrants, access requests, audit)
  postgres:
    image: postgres:15-alpine
    container_name: summit-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: summit_governance
      POSTGRES_USER: summit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-summit_dev_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/src/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summit"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - governance-network

  # Neo4j (for graph database with policy tags)
  neo4j:
    image: neo4j:5.15-enterprise
    container_name: summit-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-summit_dev_password}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_memory_pagecache_size: 2G
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
      NEO4JLABS_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-import:/var/lib/neo4j/import
      - neo4j-plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-summit_dev_password} 'RETURN 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - governance-network

  # Redis (for caching and audit buffering)
  redis:
    image: redis:7-alpine
    container_name: summit-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-summit_dev_password}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - governance-network

  # OPA Policy Bundle Server (optional - for production)
  opa-bundle-server:
    image: nginx:alpine
    container_name: summit-opa-bundle-server
    ports:
      - "8888:80"
    volumes:
      - ./policies:/usr/share/nginx/html/policies:ro
    restart: unless-stopped
    networks:
      - governance-network
    depends_on:
      - opa

  # Prometheus (for monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: summit-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - governance-network

  # Grafana (for dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: summit-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped
    networks:
      - governance-network
    depends_on:
      - prometheus

volumes:
  postgres-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  neo4j-import:
    driver: local
  neo4j-plugins:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  governance-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
