id: "implement.crm-provider@v1"
name: "Design RevOps CRM Hygiene"
description: "Design RevOps CRM Hygiene around a HubSpot and salesforce‑first implementation"
prompt: |
  Design RevOps CRM Hygiene around a HubSpot and salesforce‑first implementation, with a thin abstraction that later supports Salesforce without rewrites. Implement:
  1. **HubSpot as Canonical v1**
  - Treat HubSpot and salesforce as the primary CRMs for Studio’s first RevOps pilots: faster time‑to‑value and simpler setup for non‑technical teams. [prospeo](https://prospeo.io/s/hubspot-vs-salesforce)
  - Optimize UX copy, examples, and starter blueprints around HubSpot concepts (pipelines, deals, properties, lists, workflows) and typical HubSpot‑native RevOps teams. [thequantumleap](https://www.thequantumleap.business/blog/rethinking-revops-how-crm-hygiene-and-ai-driven-sales-enablement-unlock-predictable-pipeline-growth-1769443247)
  2. **Thin CRM Abstraction Layer**
  - Introduce a `CrmProvider` interface (HubSpot v1, Salesforce behind a feature flag):
    - Core ops: list/read/update deals/opps, companies/accounts, contacts, owners, stages, pipelines, activities.
    - Hygiene primitives: find missing required fields, stale deals by stage, inconsistent stages, duplicates, and unassigned records. [youtube](https://www.youtube.com/watch?v=DhOzmhdMOrQ)
  - Ensure all hygiene detectors and proposal generators depend on this abstraction, not HubSpot APIs directly, so Salesforce can be plugged in later with minimal changes. [vantagepoint](https://vantagepoint.io/blog/sf/salesforce-vs-hubspot-2026-comparison)
  3. **HubSpot-Specific v1 Details**
  - Implement HubSpot auth, connection test, and schema introspection (pipelines, stages, properties) via the official APIs.
  - Ship HubSpot‑opinionated defaults:
    - Default pipeline and stages for pilots (e.g., New → Qualified → Proposal → Closed Won/Lost).
    - Default hygiene rules aligned with common HubSpot RevOps patterns (e.g., close date required, owner required, stage-age thresholds). [thequantumleap](https://www.thequantumleap.business/blog/how-revops-driven-crm-hygiene-supercharges-hubspot-automation-for-revenue-growth-1768492833)
  4. **Salesforce-Readiness Without Delivery Yet**
  - Document the mapping from the generic `CrmProvider` to Salesforce objects and fields (Opportunities, Accounts, Contacts, Owners, Pipelines/Record Types), but keep Salesforce behind a flag and out of v1 scope. [vantagepoint](https://vantagepoint.io/blog/sf/salesforce-vs-hubspot-2026-comparison)
  - Validate that Studio’s RevOps UX copy (e.g., “pipeline,” “stage,” “owner”) works for both HubSpot and Salesforce, avoiding deeply vendor‑specific jargon in the main flows.
  5. **Success Criteria**
  - HubSpot RevOps pilots can connect, inspect, and approve hygiene proposals without seeing any “Salesforce-only” concepts or dead ends.
  - The `CrmProvider` abstraction is clean enough that a future Salesforce implementation can pass the same hygiene test suite without changing Studio UX or core detectors.
