apiVersion: apps/v1
kind: Deployment
metadata:
  name: supply-chain-service
  namespace: supply-chain
  labels:
    app: supply-chain-service
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: supply-chain-service
  template:
    metadata:
      labels:
        app: supply-chain-service
        component: backend
    spec:
      containers:
      - name: supply-chain-service
        image: intelgraph/supply-chain-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 4020
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "4020"
        - name: NODE_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: database-url
        - name: NEO4J_URI
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: neo4j-uri
        - name: NEO4J_USER
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: neo4j-user
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: neo4j-password
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: redis-url
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4020
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 4020
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: supply-chain-service
  namespace: supply-chain
  labels:
    app: supply-chain-service
spec:
  type: ClusterIP
  ports:
  - port: 4020
    targetPort: 4020
    protocol: TCP
    name: http
  selector:
    app: supply-chain-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: supply-chain-service-hpa
  namespace: supply-chain
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: supply-chain-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
