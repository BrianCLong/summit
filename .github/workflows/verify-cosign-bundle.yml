name: "Verify Cosign Bundle"

on:
  workflow_call:
    inputs:
      image_uri:
        description: "The container image URI to verify"
        required: true
        type: string
      expected_oidc_issuer:
        description: "The expected OIDC issuer for keyless verification"
        required: true
        type: string
      expected_identity:
        description: "The expected identity for keyless verification"
        required: true
        type: string
      rekor_pub_key:
        description: "Explicit Rekor public key"
        required: true
        type: string

jobs:
  verify-bundle:
    name: Verify Cosign Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v3.1.1'

      - name: Run Explicit Cross-Check
        env:
          IMAGE_URI: ${{ inputs.image_uri }}
          EXPECTED_OIDC_ISSUER: ${{ inputs.expected_oidc_issuer }}
          EXPECTED_IDENTITY: ${{ inputs.expected_identity }}
          REKOR_PUB_KEY: ${{ inputs.rekor_pub_key }}
        run: |
          scripts/security/verify-cosign-bundle.sh \
            --image "$IMAGE_URI" \
            --expected-oidc-issuer "$EXPECTED_OIDC_ISSUER" \
            --expected-identity "$EXPECTED_IDENTITY" \
            --rekor-pub-key "$REKOR_PUB_KEY"
