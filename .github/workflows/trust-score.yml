name: Trust Score CI

on:
  pull_request:
    branches: [main, release/*]
  push:
    branches: [main]

jobs:
  generate-trustscore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Run CI Script (Mock)
        run: |
          mkdir -p build/trust
          cat > build/trust/trustscore.json << 'JSON'
          {
            "schemaVersion": "trustscore.v1",
            "generatedAt": "2026-02-28T20:10:00Z",
            "repo": "brianclong/summit",
            "commit": "${{ github.sha }}",
            "release": "v1.7.0",
            "environment": "ci",
            "overall": {
              "status": "PASS",
              "score": 92,
              "blockers": []
            },
            "checks": {
              "reproducible_build": { "status": "PASS", "weight": 20, "evidence": "artifacts/repro.json" },
              "sbom_presence":      { "status": "PASS", "weight": 15, "evidence": "sbom/manifest.json" },
              "artifact_signing":   { "status": "PASS", "weight": 15, "evidence": "attestations/cosign.json" },
              "provenance_coverage":{ "status": "WARN", "weight": 15, "value": 88, "threshold": 95, "evidence": "provenance/coverage.json" },
              "policy_pack_loaded": { "status": "PASS", "weight": 10, "evidence": "policy/status.json" },
              "critical_vulns":     { "status": "PASS", "weight": 15, "value": 0, "threshold": 0, "evidence": "security/vulns.json" },
              "secrets_hygiene":    { "status": "PASS", "weight": 10, "evidence": "security/secrets-scan.json" }
            },
            "thresholds": {
              "passScore": 85,
              "warnScore": 70,
              "failOnAny": ["reproducible_build", "critical_vulns"]
            }
          }
          JSON

          # Bundle the outputs
          tar -czf build/trust/trust-packet.tgz -C build/trust trustscore.json

      - name: Archive Trust Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trust-packet
          path: build/trust/

  build-sovereign-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Bundle
        run: |
          ./scripts/sovereign/build-bundle.sh v1.0.0

      - name: Archive Bundle
        uses: actions/upload-artifact@v4
        with:
          name: sovereign-bundle
          path: build/sovereign-bundle-*.tar.gz
