name: Golden Path Supply Chain

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  packages: write
  id-token: write
  attestations: write
  issues: write

jobs:
  pre-flight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    steps:
      - name: Context Info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"
      - name: Validate Secrets Presence
        env:
          HAS_TOKEN: ${{ secrets.GITHUB_TOKEN != '' }}
        run: |
          if [ "$HAS_TOKEN" != "true" ]; then
            echo "::error::GITHUB_TOKEN is missing or empty."
            python3 -c "import sys; sys.exit(1)"
          fi
          echo "Critical secrets presence validated."

  governance-drift-check:
    name: Governance Drift Check
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: read
      issues: write
      administration: read # Required to read branch protection rules
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Governance Check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DRIFT_REPORT_PATH: drift-report.md
        run: node scripts/governance/check-branch-protection.mjs
      - name: Upload Drift Report
        if: failure() || success()
        uses: actions/upload-artifact@v4
        with:
          name: governance-drift-report
          path: drift-report.md
          if-no-files-found: ignore

  build-server:
    name: Build Server (SLSA L3)
    needs: [pre-flight]
    uses: ./.github/workflows/_reusable-slsa-build.yml
    with:
      image_name: server
      dockerfile: server/Dockerfile
      context: .
      push: ${{ github.event_name == 'push' }}
      sign: true
      sbom: true
      slsa_provenance: true
    secrets: inherit

  build-client:
    name: Build Client (SLSA L3)
    needs: [pre-flight]
    uses: ./.github/workflows/_reusable-slsa-build.yml
    with:
      image_name: client
      dockerfile: client/Dockerfile
      context: .
      push: ${{ github.event_name == 'push' }}
      sign: true
      sbom: true
      slsa_provenance: true
    secrets: inherit
