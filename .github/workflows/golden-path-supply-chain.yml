name: Golden Path Supply Chain

on:
  pull_request:
  workflow_dispatch:

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    if: ${{ vars.SUPPLY_CHAIN_GATE == 'true' }}
    steps:
      - run: echo "Supply chain gate enabled"

  supply-chain-disabled:
    runs-on: ubuntu-latest
    if: ${{ vars.SUPPLY_CHAIN_GATE != 'true' }}
    steps:
      - run: echo "Supply chain gate disabled (not blocking)"
