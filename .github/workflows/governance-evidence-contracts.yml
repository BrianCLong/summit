name: Governance Evidence Contracts

on:
  pull_request:
    paths:
      - "scripts/ci/**"
      - ".github/workflows/**"
      - "docs/ci/REQUIRED_CHECKS_POLICY.yml"
      - "schemas/governance/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  governance-evidence:
    name: Validate Governance Evidence
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          name: governance-evidence
          path: artifacts/governance/*.evidence.json
          retention-days: 14
