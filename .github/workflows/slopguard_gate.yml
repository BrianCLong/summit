name: SlopGuard Gate

on:
  pull_request:
    paths:
      - 'summit/**'
      - 'ingest/**'
      - 'datasets/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slopguard:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          name: slopguard-evidence
          path: evidence/slopguard/
