name: SWE Drift Monitor

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  monitor-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for drift
        run: npx tsx scripts/monitoring/swe-rebench-drift.ts
        working-directory: ${{ github.workspace }}
permissions:
  contents: read
