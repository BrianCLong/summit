name: AI Copilot Canary

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:
  push:
    paths:
      - "slo/ai-copilot.yaml"
      - "RUNBOOKS/ai-copilot-service.md"
      - "services/ai-copilot/**"
      - ".github/workflows/ai-copilot-canary.yml"

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
          node-version: "20"

      - name: Install system dependencies for node-canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev libpixman-1-dev

      - name: Install dependencies (script only)
        run: pnpm add -w js-yaml

      - name: Run AI Copilot canary checks
        run: node scripts/ai-copilot-canary.cjs
