name: drift-check
on:
  pull_request:
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '**/pnpm-lock.yaml'
      - '**/requirements*.txt'
      - '.github/workflows/**'
jobs:
  drift:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
          fetch-tags: true
      - name: Setup Python & Node
        uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v4
        with: { node-version: 'lts/*' }
      - name: Install minimal tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit > /dev/null 2>&1 || true
          npm i -g pnpm >/dev/null 2>&1
      - name: Run lockfile drift check
        run: |
          if ! python tools/drift/check_lockfile_diff.py --baseline-lockfile=package-lock.json; then
            bash -c 'exit 1'
          fi
      - name: Scan for unpinned Actions
        run: |
          bash tools/drift/unpinned_actions.sh
      - name: Upload annotations
        if: always()
        run: echo "drift-check completed"
