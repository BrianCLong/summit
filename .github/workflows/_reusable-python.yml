name: Reusable — Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use
        type: string
        default: '3.11'
      working-directory:
        description: Working directory for Python commands
        type: string
        default: .

jobs:
  python:
    name: Python ${{ inputs.python-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

        with:
          fetch-depth: 0
      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dev tools and package
        run: |
          pip install ruff mypy pytest pytest-cov
          # Try [dev] extras, fall back to base install, then skip gracefully
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: MyPy type check
        run: |
          if [ -d src ]; then
            mypy src/
          else
            echo "No src/ directory found; skipping mypy"
          fi

      - name: Pytest with coverage
        run: |
          cov_dir="."
          [ -d src ] && cov_dir="src"
          pytest --tb=short --cov="$cov_dir" --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: python-${{ inputs.python-version }}
          fail_ci_if_error: false
permissions:
  contents: read
