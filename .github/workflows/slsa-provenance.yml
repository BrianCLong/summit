name: SLSA Provenance
on: [push]

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.slsa-subjects.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.1.1
        with:
          retention-days: 14
          name: summit-artifacts
          path: |
            dist/
            sbom.spdx.json
            sbom.spdx.json.sig
            sbom.cdx.json
            sbom.cdx.json.sig
            attestation.json
            attestation.json.sig

  provenance:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          subject-checksums: dist/checksums.txt

  # Linked: https://linear.app/summi7/issue/SUM-10197

  verify:
    runs-on: ubuntu-latest
    needs: [provenance]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: summit-artifacts
          path: dist
      - name: Verify checksums
        run: |
          cd dist
          sha256sum -c checksums.txt
      - name: Verify Attestation
        run: |
          gh attestation verify dist/checksums.txt --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
