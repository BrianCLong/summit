name: CI/CD Observer

on:
  schedule:
    - cron: '0 0 * * *'  # Nightly at midnight
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode (online or offline)'
        required: true
        default: 'offline'
        type: choice
        options:
          - online
          - offline

jobs:
  observe:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          name: cicd-report
          path: evidence/daily-report/
