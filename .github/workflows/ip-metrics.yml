name: IP Metrics Report

on:
  # Run every Monday at 9:00 AM UTC
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual trigger
  workflow_dispatch:

  # Run on PRs that touch IP-related files
  pull_request:
    paths:
      - 'docs/ip/**'
      - '**/ip.meta.json'
      - 'scripts/ip-metrics.ts'
      - 'scripts/ip-weekly-report.ts'

permissions:
  contents: read
  pull-requests: write  # For commenting on PRs

jobs:
  ip-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-based metrics

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true  # Don't fail if lockfile is missing

      - name: Run IP metrics
        id: metrics
        run: |
          echo "### IP Metrics Report" > ip-metrics-output.md
          echo "" >> ip-metrics-output.md
          pnpm run ip:metrics >> ip-metrics-output.md 2>&1 || echo "Metrics generation failed" >> ip-metrics-output.md

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: ip-metrics-report
          path: ip-metrics-output.md
          retention-days: 90

      - name: Comment on PR (if PR context)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('ip-metrics-output.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 IP Metrics Report\n\n${report}\n\n---\n*Generated by IP Metrics workflow*`
            });

  ip-weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run on scheduled Monday runs
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Generate weekly report
        run: |
          pnpm run ip:weekly-report > weekly-report.md 2>&1 || echo "Report generation failed" > weekly-report.md

      - name: Upload weekly report
        uses: actions/upload-artifact@v4
        with:
          name: ip-weekly-report
          path: weekly-report.md
          retention-days: 180

      # TODO: Uncomment when Slack webhook is configured
      # - name: Send to Slack
      #   run: |
      #     pnpm run ip:weekly-report --format=slack --slack-webhook=${{ secrets.SLACK_WEBHOOK_URL }}

      # TODO: Uncomment when email is configured
      # - name: Send email report
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: smtp.gmail.com
      #     server_port: 465
      #     username: ${{ secrets.EMAIL_USERNAME }}
      #     password: ${{ secrets.EMAIL_PASSWORD }}
      #     subject: "IP Platform Weekly Report"
      #     body: file://weekly-report.md
      #     to: engineering@company.com
      #     from: CI/CD Bot

  coverage-tracking:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run on schedule and manual trigger
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Generate JSON metrics
        run: pnpm run ip:metrics:json > ip-metrics.json 2>&1 || echo "{}" > ip-metrics.json

      - name: Check coverage thresholds
        id: check
        run: |
          # Parse JSON and check if avg coverage < 60%
          avg_coverage=$(jq -r '.global.avg_coverage_pct // 0' ip-metrics.json)
          echo "avg_coverage=$avg_coverage" >> $GITHUB_OUTPUT

          if [ "$avg_coverage" -lt 60 ]; then
            echo "::warning::Average IP coverage is ${avg_coverage}% (target: ≥70%)"
            exit 1
          else
            echo "::notice::IP coverage at ${avg_coverage}% ✅"
          fi

      - name: Upload metrics JSON
        uses: actions/upload-artifact@v4
        with:
          name: ip-metrics-json
          path: ip-metrics.json
          retention-days: 365  # Keep for trend analysis

      # TODO: Send to time-series database for trend analysis
      # - name: Send to TimescaleDB
      #   run: |
      #     curl -X POST ${{ secrets.TIMESCALEDB_URL }}/api/metrics \
      #       -H "Authorization: Bearer ${{ secrets.TIMESCALEDB_TOKEN }}" \
      #       -d @ip-metrics.json
