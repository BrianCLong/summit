name: Evidence Badge PR Comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Post or update evidence badge comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const marker = '<!-- evidence-badge -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;
            const badgeUrl = `https://img.shields.io/endpoint?url=${encodeURIComponent(`https://raw.githubusercontent.com/${owner}/${repo}/gh-pages/evidence/${sha}/badge.json`)}`;
            const evidenceUrl = `https://raw.githubusercontent.com/${owner}/${repo}/gh-pages/evidence/${sha}/evidence.summary.json`;
            const body = `${marker}

**Evidence Badge**

![Evidence Badge](${badgeUrl})

[Evidence summary](${evidenceUrl})
`;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
