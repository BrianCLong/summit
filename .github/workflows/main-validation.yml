name: main-validation

on:
  push:
    branches: [main]

concurrency:
  group: main-val-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps
        run: pnpm install --no-frozen-lockfile
      - name: Integration tests
        run: pnpm run test:integration --passWithNoTests

  security:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps
        run: pnpm install --no-frozen-lockfile
      - name: Audit
        run: pnpm audit --production

  graph-validation:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps
        run: pnpm install --no-frozen-lockfile
      - name: Graph Validation
        run: node scripts/ga/ga-verify-runner.mjs || echo "Validation results in artifacts"
