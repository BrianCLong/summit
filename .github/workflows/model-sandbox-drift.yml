name: Model Sandbox Drift Detection

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:

jobs:
  drift-check:
    name: Detect Security Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run drift detector
        run: node .github/scripts/model-sandbox/drift_detector.mjs
