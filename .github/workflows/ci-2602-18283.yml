name: 2602_18283 Reproducibility Gate

on:
  pull_request:
    paths:
      - 'summit/evaluators/hf_2602_18283.py'
      - 'summit/datasets/hf_2602_18283_adapter.py'
      - 'summit/metrics/hf_2602_18283_metrics.py'
      - 'scripts/run_2602_18283.py'
      - 'configs/hf_2602_18283.yaml'

jobs:
  validate-claim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run 2602_18283 Evaluator (CI Mode)
        run: python scripts/run_2602_18283.py --ci

        working-directory: ${{ github.workspace }}
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 2602_18283_artifacts
          path: artifacts/2602_18283/
permissions:
  contents: read
