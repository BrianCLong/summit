name: Security Hardening Scan

on:
  pull_request:
    paths:
      - '**'
      - '!docs/**'
      - '!.github/**'
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Run Dependency Audit
        run: |
          chmod +x security/scripts/audit-deps.sh
          ./security/scripts/audit-deps.sh

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Secret Scan
        run: |
          chmod +x security/scripts/scan-secrets.sh
          # Note: In CI, we want to scan the last commit or the diff
          # For staged files, it's more of a pre-commit hook,
          # but here we scan changed files in the PR.
          FILES=$(git diff --name-only origin/${{ github.base_ref }} ${{ github.sha }})
          if [ -z "$FILES" ]; then
            echo "No files changed."
            exit 0
          fi

          # Mocking the diff --cached for the script to pick up PR changes
          # or adjusting the script to accept a list of files.
          # For simplicity in this suite, we'll run the script's test mode
          # and then a dry run on the changed files.
          ./security/scripts/scan-secrets.sh --test

          echo "Scanning changed files in PR..."
          for FILE in $FILES; do
            if [ -f "$FILE" ]; then
               # Basic grep check matching the script's patterns
               grep -E "AKIA[0-9A-Z]{16}|sk_live_[0-9a-zA-Z]{24}|-----BEGIN RSA PRIVATE KEY-----" "$FILE" && { echo "Secret found in $FILE"; exit 1; } || true
            fi
          done
          echo "Secret scan passed."
