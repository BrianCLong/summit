name: agent-trust

on:
  pull_request:
    paths:
      - "summit/agent_eval/**"
      - "tests/test_agent_eval_determinism.py"
      - "tests/test_perf_budget.py"
      - "scripts/ci/verify_agent_trust.py"
      - "evidence/agent_output.schema.json"
      - ".github/workflows/agent-trust.yml"
  push:
    branches: [main]
    paths:
      - "summit/agent_eval/**"
      - "tests/test_agent_eval_determinism.py"
      - "tests/test_perf_budget.py"
      - "scripts/ci/verify_agent_trust.py"
      - "evidence/agent_output.schema.json"
      - ".github/workflows/agent-trust.yml"

jobs:
  agent-trust:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest jsonschema

      - name: Run deterministic tests
        run: pytest tests/test_agent_eval_determinism.py tests/test_perf_budget.py

      - name: Generate sample evaluation artifacts
        run: |
          mkdir -p artifacts/agent-eval
          cat > artifacts/agent-eval/sample.py <<'PY'
          print("hello from trust gate")
          PY
          python - <<'PY'
          from summit.agent_eval import AgentEvalHarness
          harness = AgentEvalHarness(gates_enabled=True)
          harness.evaluate(
              "artifacts/agent-eval/sample.py",
              "artifacts/agent-eval",
              agent_model="ci-smoke",
              prompt_hash="sha256:agent-trust-smoke",
          )
          PY

      - name: Verify trust boundary
        env:
          SUMMIT_AGENT_GATES: "true"
        run: |
          python scripts/ci/verify_agent_trust.py \
            --artifact artifacts/agent-eval/sample.py \
            --report artifacts/agent-eval/report.json \
            --metrics artifacts/agent-eval/metrics.json \
            --stamp artifacts/agent-eval/stamp.json \
            --schema evidence/agent_output.schema.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-artifacts
          path: artifacts/agent-eval
          retention-days: 30
