name: summit-sync

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          python -m pip install --upgrade pip
          pip install neo4j psycopg[binary]

      - name: Acceptance checks
        run: |
          grep -q "MISMATCH_RATE" acceptance/validation_criteria.md
          grep -q "Gate A (Parity)" acceptance/validation_criteria.md
          test -s schema/summit_mapping.yml

      - name: Harness
        env:
          PG_DSN: postgresql://summit:summit@localhost:5432/summit
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASS: summit
        run: |
          chmod +x tests/test_harness.sh
          ./tests/test_harness.sh
