name: Summit UI CI

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "apps/summit-ui/**"
      - ".github/workflows/summit-ui-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/summit-ui/**"
      - ".github/workflows/summit-ui-ci.yml"

defaults:
  run:
    working-directory: apps/summit-ui

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:


      - uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          cache-dependency-path: apps/summit-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Unit / Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:


      - uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          cache-dependency-path: apps/summit-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summit-ui-coverage
          path: apps/summit-ui/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:


      - uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          cache-dependency-path: apps/summit-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: summit-ui-dist
          path: apps/summit-ui/dist/
          retention-days: 7
