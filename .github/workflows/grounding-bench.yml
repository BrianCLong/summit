name: "grounding-bench"

on:
  pull_request:
    paths:
      - 'bench/grounding/**'
      - '.github/workflows/grounding-bench.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install neo4j faiss-cpu numpy pandas tqdm orjson sentence-transformers

      - name: Configure environment
        run: cp bench/grounding/conf.example.env .env

      - name: Run benchmark
        run: python bench/grounding/run_benchmark.py
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}

      - name: Verify regressions
        run: python bench/grounding/ci_asserts.py

      - name: Archive results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grounding-bench-results
          path: bench/grounding/results.json
