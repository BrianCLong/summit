name: Workflow Lint (actionlint)

on:
  push:
    branches: ["main"]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: ["main"]
    paths:
      - '.github/workflows/**'

jobs:
  ci-actionlint:
    name: ci-actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4.2.2

      - name: Run actionlint
        run: |
          bash -c "$(curl -L https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)"
          ./actionlint
