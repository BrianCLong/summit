name: Tool Call Conformance

on:
  pull_request:
    paths:
      - 'summit/providers/**'
      - 'scripts/monitoring/kimi-k2-5-drift.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          name: toolcall-conformance-artifacts
          path: artifacts/kimi-k2-5/
