name: Reusable — Rust CI

on:
  workflow_call:
    inputs:
      toolchain:
        description: Rust toolchain to use (stable, beta, nightly)
        type: string
        default: stable
      working-directory:
        description: Working directory for cargo commands
        type: string
        default: .

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ inputs.toolchain }})
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ inputs.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain }}
          components: clippy, rustfmt

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.working-directory }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build (all targets)
        run: cargo build --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace --all-features

      - name: Security audit (cargo-audit)
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
