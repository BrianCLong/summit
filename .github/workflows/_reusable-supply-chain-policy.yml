name: Supply Chain Policy Gate

on:
  workflow_call:
    inputs:
      image_uri:
        required: true
        type: string
      image_digest:
        required: true
        type: string
      sbom_artifact_name:
        required: true
        type: string
      severity_threshold:
        required: false
        type: string
        default: HIGH
    secrets: {}

permissions:
  contents: read
  packages: read
  id-token: write
  attestations: read

jobs:
  gate:
    name: Verify signatures, SBOM, provenance, and policy
    runs-on: ubuntu-latest
    env:
      COSIGN_EXPERIMENTAL: "1"
      EXPECTED_OIDC_ISSUER: https://token.actions.githubusercontent.com
      EXPECTED_IDENTITY_REGEX: ^https://github.com/.+/\.github/workflows/_reusable-slsa-build.yml@.*$
      GRYPE_DB_CACHE_DIR: /tmp/grype/db
      REKOR_URL: https://rekor.sigstore.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v4

      - name: Enforce cosign hardening policy
        run: |
          set -euo pipefail
          node scripts/ci/verify-cosign-hardening.mjs \
            --report-out artifacts/cosign-hardening-policy.json

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ inputs.sbom_artifact_name }}
          path: artifacts

      - name: Ensure SBOMs are present
        run: |
          set -euo pipefail
          test -f artifacts/sbom.cdx.json
          test -f artifacts/sbom.spdx.json

      - name: Validate SBOM completeness
        run: |
          set -euo pipefail
          jq -e '(.components // []) | length > 0' artifacts/sbom.cdx.json >/dev/null
          jq -e '(.packages // []) | length > 0' artifacts/sbom.spdx.json >/dev/null

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1
        with:
          cosign-release: "v3.0.5"

      - name: Verify container signature
        run: |
          set -euo pipefail
          cosign verify --use-signed-timestamps "${{ inputs.image_uri }}" \ || { echo "::error::Supply chain verification failed! Missing or invalid signed timestamps."; false; }
            --rekor-url "${{ env.REKOR_URL }}" \
            --certificate-identity-regexp "${{ env.EXPECTED_IDENTITY_REGEX }}" \
            --certificate-oidc-issuer "${{ env.EXPECTED_OIDC_ISSUER }}"

      - name: Verify SBOM attestations
        run: |
          set -euo pipefail
          cosign verify-attestation --use-signed-timestamps "${{ inputs.image_uri }}" --type cyclonedx --rekor-url "${{ env.REKOR_URL }}" --certificate-oidc-issuer "${{ env.EXPECTED_OIDC_ISSUER }}" --certificate-identity-regexp "${{ env.EXPECTED_IDENTITY_REGEX }}" || { echo "::error::Supply chain verification failed! Missing or invalid signed timestamps."; false; }
          cosign verify-attestation --use-signed-timestamps "${{ inputs.image_uri }}" --type spdxjson --rekor-url "${{ env.REKOR_URL }}" --certificate-oidc-issuer "${{ env.EXPECTED_OIDC_ISSUER }}" --certificate-identity-regexp "${{ env.EXPECTED_IDENTITY_REGEX }}" || { echo "::error::Supply chain verification failed! Missing or invalid signed timestamps."; false; }

      - name: Verify SLSA provenance attestation
        run: |
          set -euo pipefail
          cosign verify-attestation --use-signed-timestamps "${{ inputs.image_uri }}" --type slsaprovenance --rekor-url "${{ env.REKOR_URL }}" --certificate-oidc-issuer "${{ env.EXPECTED_OIDC_ISSUER }}" --certificate-identity-regexp "${{ env.EXPECTED_IDENTITY_REGEX }}" || { echo "::error::Supply chain verification failed! Missing or invalid signed timestamps."; false; }

      - name: Check SBOM vs lockfile drift
        run: |
          set -euo pipefail
          node scripts/ci/check-sbom-lockfile-drift.mjs \
            --lockfile pnpm-lock.yaml \
            --package-json package.json \
            --sbom-cdx artifacts/sbom.cdx.json \
            --sbom-spdx artifacts/sbom.spdx.json \
            --evidence-out artifacts/sbom-lockfile-drift.json

      - name: Install grype
        uses: anchore/scan-action/download-grype@3343887d815d7b07465f6fdcd395bd66508d486a # v3

      - name: Scan SBOM for vulnerabilities
        run: |
          set -euo pipefail
          mkdir -p ${GRYPE_DB_CACHE_DIR}
          grype sbom:artifacts/sbom.spdx.json -o json > artifacts/grype.json

      - name: Enforce license and CVE policy
        run: |
          set -euo pipefail
          python scripts/supply_chain/gate.py \
            --sbom artifacts/sbom.cdx.json \
            --grype artifacts/grype.json \
            --license-allowlist security/supply-chain/license-allowlist.txt \
            --license-overrides security/supply-chain/license-overrides.txt \
            --cve-allowlist security/supply-chain/cve-allowlist.txt \
            --severity-threshold "${{ inputs.severity_threshold }}"

      - name: Install OPA
        run: |
          set -euo pipefail
          curl -sSfL -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa

      - name: Evaluate supply-chain OPA policy
        run: |
          set -euo pipefail
          COSIGN_VERSION="$(cosign version | grep -Eo 'v?[0-9]+\.[0-9]+\.[0-9]+' | head -n1 | sed 's/^v//')"
          jq -n \
            --arg cosign_version "$COSIGN_VERSION" \
            '{
              evidence: { result: "pass" },
              cosign: { version: $cosign_version },
              trust: { pinned: true },
              rekor: { tlog_verified: true },
              attestations: {
                provenance: { slsa_verified: true },
                sbom: { spdx_complete: true, cyclonedx_complete: true }
              }
            }' > artifacts/supplychain-policy-input.json
          opa eval --format=json \
            --data .github/policies/supplychain/verify.rego \
            --input artifacts/supplychain-policy-input.json \
            'data.supplychain.allow' | tee artifacts/supplychain-policy-eval.json
          jq -e '.result[0].expressions[0].value == true' artifacts/supplychain-policy-eval.json >/dev/null
