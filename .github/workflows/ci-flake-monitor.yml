name: CI Flake Monitor

on:
  workflow_run:
    workflows: ["CI Core Pipeline"] # or other main workflows
    types:
      - completed
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  monitor-flakes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

        with:
          fetch-depth: 0
      - name: Update Flake Registry and Plan
        run: node .github/workflows/scripts/update-flake-registry.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        working-directory: ${{ github.workspace }}
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update flake registry and attack plan [skip ci]"
          file_pattern: '.github/flake-registry.json docs/reports/flake_attack_plan.md'

      - name: Create or Update Flake Attack Plan Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const planPath = path.join(process.cwd(), 'docs', 'reports', 'flake_attack_plan.md');

            if (fs.existsSync(planPath)) {
                const planContent = fs.readFileSync(planPath, 'utf8');

                // Check if issue exists
                const issues = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels: 'p0:ci-determinism',
                  state: 'open'
                });

                const existingIssue = issues.data.find(issue => issue.title === 'CI Flake Attack Plan & Registry');

                if (existingIssue) {
                    await github.rest.issues.update({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: existingIssue.number,
                      body: planContent
                    });
                } else {
                    await github.rest.issues.create({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      title: 'CI Flake Attack Plan & Registry',
                      body: planContent,
                      labels: ['p0:ci-determinism']
                    });
                }
            }
