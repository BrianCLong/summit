name: Lint (changed workspaces)

on:
  pull_request:
    branches: [main]

concurrency:
  group: lint-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '20.14.x', cache: 'pnpm' }
      - name: Install
        run: |
          corepack enable || true
          corepack prepare pnpm@9.12.3 --activate || true
          pnpm i --frozen-lockfile=false
      - name: Lint (${{ matrix.path }})
        working-directory: ${{ matrix.path }}
        shell: bash
        run: |
          if jq -e '.scripts.lint' package.json >/dev/null 2>&1; then
            pnpm run lint
          else
            pnpm exec eslint . --max-warnings=0 || true
          fi
