name: Auto Draft Release

on:
  workflow_run:
    workflows: ["Fast Lane", "Integration Lane"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  draft-release:
    name: Create Draft Release
    runs-on: ubuntu-22.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          cache: 'pnpm'
          node-version: '20.11.x'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          tag_name: ${{ steps.version.outputs.value }}-draft-${{ github.run_number }}
          name: Draft Release ${{ steps.version.outputs.value }}
          body_path: release-notes.md
          draft: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
