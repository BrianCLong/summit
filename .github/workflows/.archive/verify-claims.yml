name: Verify Narrative Claims

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'prompts/**'
      - 'evidence/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-claims:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v6
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
          node-version: "20"
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm exec tsx scripts/governance/validate_claims.ts
      - name: Verify Governance Gates
        run: pnpm exec tsx scripts/governance/verify_governance_gates.ts
