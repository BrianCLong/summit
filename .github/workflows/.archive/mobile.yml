name: Mobile CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/mobile/**'
      - 'packages/mobile-sdk/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/mobile/**'
      - 'packages/mobile-sdk/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          name: app-release.aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab

  build-ios:
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'pnpm'
          node-version: 18

      - name: Install dependencies
        run: |
          npm install -g pnpm
          pnpm install --no-frozen-lockfile

      - name: Install Applesimutils
        run: |
          brew tap wix/brew
          brew install applesimutils

      - name: Build for Detox (iOS)
        run: cd apps/mobile && pnpm detox build -c ios.sim.release

      - name: Run Detox Tests
        run: cd apps/mobile && pnpm detox test -c ios.sim.release --cleanup
