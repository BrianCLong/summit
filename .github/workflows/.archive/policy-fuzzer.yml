name: Policy Fuzzer

on:
  pull_request:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          name: policy-fuzzer-reports
          path: |
            policy-fuzzer/failing_cases.txt
            policy-fuzzer/reproducer_*.py
