name: Evals

on:
  push:
    branches: [ main ]
    paths:
      - 'prompts/**'
      - 'eval/**'
      - 'GOLDEN/datasets/**'
  pull_request:
    paths:
      - 'prompts/**'
      - 'eval/**'
      - 'GOLDEN/datasets/**'
  schedule:
    - cron: '0 0 * * *' # Nightly

jobs:
  eval-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          name: eval-results
          path: .evidence/eval_results/
