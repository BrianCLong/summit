name: Build & Push
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  REGISTRY: ${{ secrets.REGISTRY }}            # e.g. ghcr.io/owner
  IMAGE_NAME: app                               # replace per service

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          ignore-unfixed: true
          format: table
