name: migration-gate

on:
  pull_request:
    paths:
      - 'migrations/**'
      - 'services/**/db/**'
      - 'apps/**/db/**'
      - 'packages/**/db/**'
      - 'apps/**/models/**'
      - 'services/**/models/**'
      - '.ci/policies/**'
  push:
    branches:
      - main
    paths:
      - 'migrations/**'
      - 'services/**/db/**'
      - 'apps/**/db/**'
      - 'packages/**/db/**'
      - 'apps/**/models/**'
      - 'services/**/models/**'
      - '.ci/policies/**'

concurrency:
  group: migration-gate-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan-and-validate:
    runs-on: ubuntu-22.04
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      LOG_FORMAT: json
      SOPS_AGE_KEY_FILE: ${{ secrets.SOPS_AGE_KEY_FILE || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          python-version: '3.11'

      - name: Install toolchain
        run: |
          npm install -g pnpm
          pip install --upgrade pip
          pip install alembic psycopg2-binary neo4j typesense

      - name: Check for migration labels
        if: (((((github.event_name == 'pull_request') && (${{ always() }})) && (${{ always() }})) && (${{ always() }})) && (github.event.pull_request.number != '')) && (${{ github.event.pull_request.number != '' }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Fetch PR labels
          LABELS=$(gh pr view $PR_NUMBER --json labels -q '.labels[].name')

          if [[ "$LABELS" == *"migration:approved"* ]]; then
            echo "✅ PR has 'migration:approved' label"
          elif [[ "$LABELS" == *"migration:safe"* ]]; then
            echo "✅ PR has 'migration:safe' label"
          else
            echo "::error::Schema-affecting PRs require 'migration:approved' or 'migration:safe' label"
            exit 1
          fi

      - name: Conftest policy check
        uses: open-policy-agent/conftest-action@v1.6.0
        with:
          name: migration-gate-artifacts
          path: |
            shadow-report.json
            migration-plans/**
            rollback-plan/**

      - name: PR summary comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          name: synthetic-shadow-results
          path: synthetic-shadow-report.json
