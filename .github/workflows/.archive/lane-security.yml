name: Security Lane
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run security scans nightly
    - cron: '0 2 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          name: sbom

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  security-summary:
    name: Security Summary
    runs-on: ubuntu-22.04
    needs: [sbom-generation, vulnerability-scan]
    steps:
      - name: Security summary
        run: |
          echo "🔒 Security Lane Summary"
          echo "========================"
          echo "SBOM Generation: ${{ needs.sbom-generation.result }}"
          echo "Vulnerability Scan: ${{ needs.vulnerability-scan.result }}"
          echo ""
          if [[ "${{ needs.sbom-generation.result }}" == "success" && "${{ needs.vulnerability-scan.result }}" == "success" ]]; then
            echo "🟢 Security checks passed!"
          else
            echo "⚠️ Security checks need review"
          fi
