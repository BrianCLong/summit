name: Security Autopilot

# Run comprehensive security checks on every push and PR
on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: security-autopilot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write
  checks: write

jobs:
  # ========================================
  # SAST: Static Application Security Testing
  # ========================================
  sast-codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          languages: javascript,python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          version: 10
        with:

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  # ========================================
  # Container & Infrastructure Scanning
  # ========================================
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check Trivy for blockers
        uses: aquasecurity/trivy-action@master
        with:
          cache: 'pnpm'
          node-version: '20.11.x'

      - name: Run Crypto Hygiene Checker
        run: |
          node .security/crypto-hygiene-checker.cjs

      - name: Check for hardcoded secrets patterns
        run: |
          echo "🔍 Checking for hardcoded crypto patterns..."

          # Check for hardcoded keys/secrets (excluding test fixtures)
          if grep -r -n -E "(private[_-]?key|secret[_-]?key|api[_-]?key)\s*=\s*['\"](?!process\.env|YOUR_|REPLACE_|TEST_|EXAMPLE_)[A-Za-z0-9+/=]{20,}" \
            --include="*.ts" \
            --include="*.js" \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=coverage \
            --exclude-dir=tests \
            --exclude-dir=__tests__ \
            --exclude-dir=fixtures \
            . ; then
            echo "❌ ERROR: Potential hardcoded secrets detected"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi

      - name: Verify KMS usage
        run: |
          echo "🔍 Verifying crypto operations use KMS..."

          # Check that crypto operations reference KMS or env vars
          if grep -r -n "crypto\\.createCipher\\|crypto\\.createDecipher" \
            --include="*.ts" \
            --include="*.js" \
            --exclude-dir=node_modules \
            --exclude-dir=tests \
            --exclude-dir=__tests__ \
            . ; then
            echo "⚠️ WARNING: Found deprecated crypto.createCipher usage (should use createCipheriv)"
          fi

  # ========================================
  # DAST: Dynamic Application Security Testing (ZAP)
  # ========================================
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker
        run: |
          docker --version

      - name: Start application for scanning
        run: |
          # Start minimal services for ZAP scan
          if [ -f docker-compose.yml ]; then
            docker compose up -d client || echo "Client service not available"
            sleep 10
          fi

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          script: |
            const results = {
              sast: '${{ needs.sast-codeql.result }}',
              secrets: '${{ needs.secret-detection.result }}',
              dependencies: '${{ needs.dependency-scan.result }}',
              trivy: '${{ needs.trivy-scan.result }}',
              crypto: '${{ needs.crypto-hygiene.result }}',
              gates: '${{ needs.security-gates.result }}'
            };

            const allPassed = Object.values(results).every(r => r === 'success');
            const icon = allPassed ? '✅' : '⚠️';
            const status = allPassed ? 'PASSED' : 'ISSUES DETECTED';

            const body = `## ${icon} Security Autopilot: ${status}

            | Security Check | Result |
            |----------------|--------|
            | SAST (CodeQL) | ${results.sast === 'success' ? '✅' : '❌'} ${results.sast} |
            | Secret Detection | ${results.secrets === 'success' ? '✅' : '❌'} ${results.secrets} |
            | Dependency Scan | ${results.dependencies === 'success' ? '✅' : '❌'} ${results.dependencies} |
            | Container Scan (Trivy) | ${results.trivy === 'success' ? '✅' : '❌'} ${results.trivy} |
            | Crypto Hygiene | ${results.crypto === 'success' ? '✅' : '❌'} ${results.crypto} |
            | Security Gates | ${results.gates === 'success' ? '✅' : '❌'} ${results.gates} |

            ${allPassed ?
              '**No high or critical security vulnerabilities detected.** ✅' :
              '**⚠️ Security issues detected. Please review the workflow logs and address findings before merging.**'
            }

            ---
            *Security Autopilot runs on every push. View detailed results in the [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).*
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
