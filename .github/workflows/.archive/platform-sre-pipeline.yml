name: platform-sre-pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_version:
        description: "Semantic version to release (vX.Y.Z)"
        required: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io/${{ github.repository_owner }}/summit
  RELEASE_ENV: production

jobs:
  version:
    name: Verify semantic version tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build workspace
        run: npm run build --if-present
      - name: Run unit tests
        run: npm test -- --ci --reporters=jest-junit

  security_scans:
    name: Lint, scan & SBOM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          name: smoke-logs
          path: logs/**/*.log

  canary_deploy:
    name: Canary deploy
    runs-on: ubuntu-latest
    needs: integration_tests
    environment:
      name: canary
      url: https://canary.intelgraph.dev
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to cluster
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.PROD_KUBECONFIG }}
      - name: Promote traffic to 100%
        run: |
          kubectl argo rollouts promote intelgraph -n platform-prod --full
      - name: Post-deploy verification
        run: |
          ./ops/deployment/simulate-canary-deploy.sh \
            --environment production \
            --service api \
            --verify-only

  sbom:
    name: Attach SBOM
    needs: security_scans
    uses: ./.github/workflows/reusable/sbom.yml
    with:
      service: platform-sre
    secrets: inherit

  rollback:
    name: Auto rollback
    runs-on: ubuntu-latest
    needs: canary_deploy
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to cluster
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.CANARY_KUBECONFIG }}
      - name: Rollback last canary release
        run: |
          kubectl argo rollouts rollback intelgraph -n platform-canary
      - name: Post-rollback validation
        run: |
          ./ops/deployment/simulate-canary-deploy.sh \
            --environment canary \
            --service api \
            --verify-only
