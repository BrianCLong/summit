name: SOC2 Evidence Bundle
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download prior artifacts
        uses: actions/download-artifact@v4
        with:
          name: soc2-evidence
          path: soc2-evidence-*.tar.gz
