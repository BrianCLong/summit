name: SCPE Supply Chain Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          name: scpe-receipt
          path: scpe-receipt.json
