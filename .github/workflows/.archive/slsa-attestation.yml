name: SLSA Level 3 Attestation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      artifact_path:
        description: 'Path to artifact to attest'
        required: true
        default: 'dist/'
      image_ref:
        description: 'Container image reference (optional)'
        required: false

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write

env:
  COSIGN_EXPERIMENTAL: '1'

jobs:
  build-provenance:
    name: Build with Provenance
    runs-on: ubuntu-latest
    outputs:
      artifact-digest: ${{ steps.build.outputs.digest }}
      artifact-path: ${{ steps.build.outputs.path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          cache: 'pnpm'
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          name: build-artifacts
          path: ${{ steps.build.outputs.path }}
          retention-days: 90

  generate-slsa3-provenance:
    name: Generate SLSA-3 Provenance
    runs-on: ubuntu-latest
    needs: build-provenance
    outputs:
      provenance-path: ${{ steps.provenance.outputs.path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: slsa-provenance
          path: |
            slsa-provenance.json
            slsa-provenance.sig
            slsa-provenance.pem
            slsa-attestation-bundle.json
          retention-days: 365

  attest-container:
    name: Attest Container Image
    runs-on: ubuntu-latest
    needs: [build-provenance, generate-slsa3-provenance]
    if: github.event.inputs.image_ref != ''

    steps:
      - name: Download provenance
        uses: actions/download-artifact@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest container image
        run: |
          IMAGE_REF="${{ github.event.inputs.image_ref }}"

          echo "📦 Attesting image: $IMAGE_REF"

          # Attest SLSA provenance to container image
          cosign attest \
            --yes \
            --predicate slsa-provenance.json \
            --type slsaprovenance \
            "$IMAGE_REF"

          echo "✅ Container image attested with SLSA-3 provenance"

      - name: Verify attestation
        run: |
          IMAGE_REF="${{ github.event.inputs.image_ref }}"

          # Verify the attestation
          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-identity-regexp '.*' \
            --certificate-oidc-issuer-regexp '.*' \
            "$IMAGE_REF"

          echo "✅ Attestation verified successfully"

  verify-slsa-level:
    name: Verify SLSA Level
    runs-on: ubuntu-latest
    needs: generate-slsa3-provenance

    steps:
      - name: Download provenance
        uses: actions/download-artifact@v4
        with:
          name: slsa-compliance-report
          path: slsa-compliance-report.json
          retention-days: 365
