name: Auto-resolve conflicts

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    env:
      IS_SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Auto-resolved lockfile conflicts**\n\nThe lockfile has been regenerated from `package.json` to resolve merge conflicts.\n\nPlease verify the changes and ensure CI passes before merging.\n\n---\n🤖 *Automated by auto-resolve-conflicts workflow*'
            })
