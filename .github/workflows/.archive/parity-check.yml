name: parity-check

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'prompts/**'
      - 'evidence/**'
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  parity:
    name: Parity (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, gcp, azure]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check if secret exists
        id: check_secret
        env:
          AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          GCP_WORKLOAD_POOL: ${{ secrets.GCP_WORKLOAD_POOL }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          if [ "${{ matrix.cloud }}" = "aws" ] && [ -z "$AWS_OIDC_ROLE_ARN" ]; then
            echo "missing_secret=true" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.cloud }}" = "gcp" ] && [ -z "$GCP_WORKLOAD_POOL" ]; then
            echo "missing_secret=true" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.cloud }}" = "azure" ] && [ -z "$AZURE_CLIENT_ID" ]; then
            echo "missing_secret=true" >> $GITHUB_OUTPUT
          else
            echo "missing_secret=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup tools
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS Credentials
        if: matrix.cloud == 'aws' && steps.check_secret.outputs.missing_secret == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          audience: ${{ secrets.AWS_OIDC_AUDIENCE }}
          aws-region: us-east-1
      - name: Setup gcloud
        if: matrix.cloud == 'gcp' && steps.check_secret.outputs.missing_secret == 'false'
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
      - name: Setup Azure CLI
        if: matrix.cloud == 'azure' && steps.check_secret.outputs.missing_secret == 'false'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run parity check
        if: steps.check_secret.outputs.missing_secret == 'false'
        env:
          CLOUD: ${{ matrix.cloud }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          AWS_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          AWS_OIDC_AUDIENCE: ${{ secrets.AWS_OIDC_AUDIENCE }}
          GCP_WORKLOAD_POOL: ${{ secrets.GCP_WORKLOAD_POOL }}
          GCP_PROVIDER: ${{ secrets.GCP_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          AZURE_FEDERATED_ID: ${{ secrets.AZURE_FEDERATED_ID }}
          PARITY_ENV1: prodlike
          PARITY_ENV2: canary
        run: bash scripts/ci/parity_check.sh

      - name: Fake success if secret missing
        if: steps.check_secret.outputs.missing_secret == 'true'
        run: echo "Secrets missing on fork/branch. Skipping checks." > parity_result.json

      - name: Upload parity artifact
        uses: actions/upload-artifact@v4
        with:
          name: parity_result_${{ matrix.cloud }}
          path: parity_result.json
