name: parity-check

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'prompts/**'
      - 'evidence/**'
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  parity:
    name: Parity (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, gcp, azure]
    env:
      AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS Credentials
        if: matrix.cloud == 'aws' && env.AWS_OIDC_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        env:
          AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          audience: ${{ secrets.AWS_OIDC_AUDIENCE }}
          aws-region: us-east-1
      - name: Setup gcloud
        if: matrix.cloud == 'gcp' && env.GCP_PROJECT_ID != ''
        uses: google-github-actions/setup-gcloud@v3
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
      - name: Setup Azure CLI
        if: matrix.cloud == 'azure' && env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run parity check
        env:
          CLOUD: ${{ matrix.cloud }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          AWS_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          AWS_OIDC_AUDIENCE: ${{ secrets.AWS_OIDC_AUDIENCE }}
          GCP_WORKLOAD_POOL: ${{ secrets.GCP_WORKLOAD_POOL }}
          GCP_PROVIDER: ${{ secrets.GCP_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          AZURE_FEDERATED_ID: ${{ secrets.AZURE_FEDERATED_ID }}
          PARITY_ENV1: prodlike
          PARITY_ENV2: canary
        run: |
          SKIP=0
          if [ "$CLOUD" == "aws" ] && [ -z "$AWS_ROLE_ARN" ]; then
            SKIP=1
          fi
          if [ "$CLOUD" == "gcp" ] && [ -z "$GCP_WORKLOAD_POOL" ]; then
            SKIP=1
          fi
          if [ "$CLOUD" == "azure" ] && [ -z "$AZURE_FEDERATED_ID" ]; then
            SKIP=1
          fi

          if [ "$SKIP" == "1" ]; then
            echo "Skipping parity check for $CLOUD due to missing secrets."
            echo "{}" > parity_result.json
          else
            bash scripts/ci/parity_check.sh
          fi

      - name: Upload parity artifact
        uses: actions/upload-artifact@v4
        with:
          name: parity_result_${{ matrix.cloud }}
          path: parity_result.json
