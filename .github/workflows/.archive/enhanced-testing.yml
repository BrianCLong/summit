name: Enhanced Testing Suite

on:
  pull_request:
    paths:
      - 'tests/**'
      - 'server/**'
      - 'client/**'
      - 'services/**'
  push:
    branches: [main]
    paths:
      - 'tests/**'
      - 'server/**'
      - 'client/**'
      - 'services/**'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - error-scenarios
          - graphql
      verbose:
        description: 'Enable verbose output'
        required: false
        default: false
        type: boolean

env:
  NODE_ENV: test
  CI: true

jobs:
  # Fast unit tests - run first for quick feedback
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: ((((((((${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'unit' || github.event.inputs.test_type == '' }}) && (always())) && (${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'integration' || github.event.inputs.test_type == '' }})) && (always())) && (${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'graphql' || github.event.inputs.test_type == '' }})) && (always())) && (${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'error-scenarios' || github.event.inputs.test_type == '' }})) && (always())) && (always())

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:jest --maxWorkers=50% --testPathIgnorePatterns='integration|e2e|error-scenarios'
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: unit-tests.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          name: integration-test-results
          path: test-results/
          retention-days: 7

  # GraphQL resolver tests
  graphql-tests:
    name: GraphQL Resolver Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run GraphQL resolver tests
        run: pnpm test:jest --testPathPattern='tests/integration/graphql' --runInBand
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: graphql-tests.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          name: error-scenario-test-results
          path: test-results/
          retention-days: 7

  # Test coverage aggregation
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, graphql-tests, error-scenario-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-test-results

      - name: Generate coverage summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count test files
          for dir in all-test-results/*/; do
            if [ -d "$dir" ]; then
              name=$(basename "$dir")
              echo "### $name" >> $GITHUB_STEP_SUMMARY
              if [ -f "$dir"/*.xml ]; then
                echo "✅ Tests completed" >> $GITHUB_STEP_SUMMARY
              else
                echo "⚠️ No results found" >> $GITHUB_STEP_SUMMARY
              fi
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Check for failures
        run: |
          # Check if any job failed
          if [ "${{ needs.unit-tests.result }}" == "failure" ] || \
             [ "${{ needs.integration-tests.result }}" == "failure" ] || \
             [ "${{ needs.graphql-tests.result }}" == "failure" ] || \
             [ "${{ needs.error-scenario-tests.result }}" == "failure" ]; then
            echo "::error::One or more test jobs failed"
            exit 1
          fi
          echo "All test jobs completed successfully"
