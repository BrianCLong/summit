name: Schema Validation & Drift Detection

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  pull_request:
    paths:
      - '**/migrations/**'
      - 'db/**'
      - 'server/db/**'
      - 'server/src/migrations/**'
  workflow_dispatch:
    inputs:
      full_validation:
        description: 'Run full validation (including performance analysis)'
        required: false
        default: 'false'

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9'

jobs:
  detect-schema-drift:
    name: Detect Schema Drift
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: summit_validation
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/validationpass
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd="neo4j status"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          name: schema-drift-report-${{ github.run_number }}
          path: |
            snapshots/
          retention-days: 30

      - name: Comment PR with drift report
        uses: actions/github-script@v7
        with:
          name: performance-report-${{ github.run_number }}
          path: perf_report.md
          retention-days: 30
