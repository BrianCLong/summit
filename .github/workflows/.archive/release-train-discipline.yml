name: Release Train Discipline

on:
  schedule:
    - cron: '0 13 * * MON'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  open-weekly-issue:
    name: Ensure weekly release train issue
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse weekly tracker
        uses: actions/github-script@v7
        with:
      service: release-train
    secrets: inherit
