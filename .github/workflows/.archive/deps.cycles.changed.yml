name: Dependency Cycles (changed workspaces)

on:
  pull_request:
    branches: [main]

concurrency:
  group: cycles-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '20.14.x' , cache: 'pnpm' }
      - name: Check for cycles with madge
        working-directory: ${{ matrix.path }}
        run: |
          npx --yes madge --circular src || {
            echo "::error::Dependency cycles detected in ${{ matrix.path }}"; exit 1; }
