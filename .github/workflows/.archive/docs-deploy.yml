name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/docs-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          cache-dependency-path: website/pnpm-lock.yaml
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/build
          cname: docs.summit.io
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          cache: 'pnpm'
          node-version: '18'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
      
      - name: Install dependencies
        run: |
          cd website
          pnpm install --frozen-lockfile
      
      - name: Lint documentation
        run: |
          cd website
          pnpm run lint || echo "Lint not configured yet"
        continue-on-error: true
      
      - name: Type check
        run: |
          cd website
          pnpm run typecheck
      
      - name: Test build
        run: |
          cd website
          pnpm build
