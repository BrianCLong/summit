name: GA Supply Chain Gate

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9.12.0'

jobs:
  supply-chain:
    name: Supply Chain Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          cache: 'pnpm'
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          name: supply-chain-${{ github.sha }}
          path: |
            artifacts/sbom/*.json
            artifacts/provenance.json
            artifacts/dependency-audit.json
          retention-days: 30
