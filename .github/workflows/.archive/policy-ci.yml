name: Policy CI

on:
  push:
    paths:
      - 'policy/**'
      - '.ci/policies/**'
      - '.ci/scripts/opa/**'
  pull_request:
    paths:
      - 'policy/**'
      - '.ci/policies/**'
      - '.ci/scripts/opa/**'

jobs:
  opa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          name: opa-coverage
          path: opa-coverage.json
