name: Policy Fuzzing

on:
  push:
    paths:
      - 'policy/**'
      - 'policy-fuzzer/**'
  pull_request:
    paths:
      - 'policy/**'
      - 'policy-fuzzer/**'
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          name: fuzzing-reports
          path: policy-fuzzer/reports/
