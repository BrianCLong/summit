name: Weekly Hygiene

on:
  schedule: [{ cron: '0 9 * * 1' }]
  workflow_dispatch:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dead link check
        uses: lycheeverse/lychee-action@v1
        with: { dockerfile: 'deploy/docker/Dockerfile' }
