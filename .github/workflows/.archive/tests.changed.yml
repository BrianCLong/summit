name: Tests (changed workspaces)

on:
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '20.14.x', cache: 'pnpm' }

      - name: Install & heal
        run: |
          corepack enable || true
          corepack prepare pnpm@9.12.3 --activate || true
          pnpm i --frozen-lockfile=false
          node scripts/monorepo_heal.mjs || true

      - name: Typecheck (fast)
        run: pnpm exec tsc -b --pretty --noEmit || true

      - name: Test (${{ matrix.path }})
        working-directory: ${{ matrix.path }}
        run: pnpm run test || echo "::warning::tests failed in ${{ matrix.path }}"
