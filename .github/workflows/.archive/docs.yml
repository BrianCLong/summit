name: docs

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs-site/**'
      - '*.md'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - '.vale.ini'
      - '.vale/**'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs-site/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  pages: write
  id-token: write

jobs:
  docs-build-lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          name: documentation-artifacts
          path: |
            docs-report.md
            vale-report.txt
            .markdownlint.json
            .markdown-link-check.json
            docs-site/build/
            docs-site/dist/
          retention-days: 14

      - name: Deploy to GitHub Pages (main branch only)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB.TOKEN }}
          publish_dir: ./docs-site/build
          enable_jekyll: false
          cname: docs.intelgraph.dev

      - name: Generate step summary
        run: |
          echo "## 📚 Documentation CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Markdownlint | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Vale Linting | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Link Validation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Inclusive Language | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| TOC Generation | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Structure Validation | ✅ |" >> $GITHUB_STEP_SUMMARY

          if [ -d "docs-site/build" ] || [ -d "docs-site/dist" ]; then
            echo "| Site Build | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Site Build | ⚠️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
