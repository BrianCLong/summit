name: Docs Screenshots

on:
  workflow_dispatch:
    inputs:
      ui_url:
        description: 'UI URL to capture (e.g., http://localhost:3000)'
        required: true
        default: 'http://localhost:3000'

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          name: cookbook-screenshots
          path: docs/cookbook/screenshots
      - name: Upload observability screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: observability-screenshots
          path: docs/observability/screenshots
