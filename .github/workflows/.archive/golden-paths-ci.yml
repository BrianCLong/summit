name: golden-paths

on:
  pull_request:
    paths:
      - 'observability/golden_paths.yaml'
      - 'tools/synth-probe/**'
      - '.github/workflows/golden-paths-ci.yml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  synth-probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          name: synth-probe-results
          path: gp_results.json
        continue-on-error: true
