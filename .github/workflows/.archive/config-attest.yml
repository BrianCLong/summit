name: config-attestation
on:
  pull_request:
    paths:
      - 'charts/**'
      - 'deploy/**'
      - 'ops/**'
  push:
    branches: [main, 'release/**']
  workflow_dispatch:
    inputs:
      change_approved:
        description: 'Approve config changes (CHANGE_APPROVED=1)'
        required: false
        default: 'false'

jobs:
  config-attestation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          name: config-attestation-${{ github.run_id }}
          path: |
            evidence/v0.3.3/config/*.json
            evidence/v0.3.3/config/*.txt
          retention-days: 30

      - name: Summary
        run: |
          echo "🔐 Config Attestation Summary"
          echo "============================="
          echo "✅ Current snapshot: evidence/v0.3.3/config/config-current.json"
          if [[ -f "evidence/v0.3.3/config/config-signature.txt" ]]; then
            echo "✅ Signature: evidence/v0.3.3/config/config-signature.txt"
          fi
          echo "📊 Drift detected: ${{ steps.drift_check.outputs.drift_detected }}"
          echo "🔧 Change approved: ${{ github.event.inputs.change_approved }}"
