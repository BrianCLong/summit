name: SonarCloud Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          cache: 'pnpm'
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          args: >
            -Dsonar.projectKey=intelgraph-platform
            -Dsonar.organization=intelgraph
