name: Platform Health Score

on:
  schedule:
    - cron: '0 0 * * *' # Nightly
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  health-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          name: health-score
          path: |
            health-score.json
            docs/ops/dashboard-health.md

      - name: Summary
        run: cat docs/ops/dashboard-health.md >> $GITHUB_STEP_SUMMARY
