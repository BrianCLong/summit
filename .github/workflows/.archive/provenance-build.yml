name: Build & Sign

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Sign (${{ matrix.product }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        product: [Maestro, IntelGraph, CompanyOS, Switchboard]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          name: "provenance-build-${{ matrix.product }}"
          path: dist/${{ matrix.product }}
