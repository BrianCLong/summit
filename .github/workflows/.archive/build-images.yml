name: build-images

# One image build at a time to prevent registry conflicts
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - '**/Dockerfile*'
      - 'package.json'
      - 'package-lock.json'
      - 'pnpm-lock.yaml'
      - 'src/**'
      - 'server/**'
      - 'client/**'
      - 'apps/**'
      - 'services/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  actions: read
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: brianclong/intelgraph

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    strategy:
      matrix:
        component:
          - name: web
            dockerfile: apps/web/Dockerfile
            context: .
          - name: server
            dockerfile: server/Dockerfile
            context: .
          - name: gateway
            dockerfile: services/gateway/Dockerfile
            context: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.component.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=IntelGraph ${{ matrix.component.name }}
            org.opencontainers.image.description=IntelGraph ${{ matrix.component.name }} component
            org.opencontainers.image.vendor=IntelGraph Team

      - name: Check if Dockerfile exists
        id: dockerfile-check
        run: |
          if [ -f "${{ matrix.component.dockerfile }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Warning: Dockerfile not found at ${{ matrix.component.dockerfile }}"
          fi

      - name: Build and push Docker image
        if: ((((((((((steps.dockerfile-check.outputs.exists == 'true') && (steps.dockerfile-check.outputs.exists == 'true')) && (steps.dockerfile-check.outputs.exists == 'true')) && (steps.dockerfile-check.outputs.exists == 'true')) && (steps.dockerfile-check.outputs.exists == 'true' && (success() || failure()))) && (steps.dockerfile-check.outputs.exists == 'true')) && (steps.dockerfile-check.outputs.exists == 'true')) && (steps.dockerfile-check.outputs.exists == 'true')) && (steps.dockerfile-check.outputs.exists == 'true')) && (steps.dockerfile-check.outputs.exists == 'true')) && (steps.dockerfile-check.outputs.exists == 'true')
        id: build
        uses: docker/build-push-action@v5
        with:
          sarif_file: trivy-${{ matrix.component.name }}.sarif
          category: trivy-${{ matrix.component.name }}

      - name: Cosign sign (keyless)
        id: cosign-sign
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          IMAGE_REF=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.component.name }}@${{ steps.build.outputs.digest }}
          cosign sign --yes "$IMAGE_REF"
          echo "ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Attach SBOM attestation (cosign)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.component.name }}.spdx.json \
            --type spdxjson \
            ${{ steps.cosign-sign.outputs.ref }}

      - name: Verify image signature
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ steps.cosign-sign.outputs.ref }}

      - name: Verify SBOM attestation
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ steps.cosign-sign.outputs.ref }}

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.component.name }}
          path: |
            sbom-${{ matrix.component.name }}.spdx.json
            sbom-${{ matrix.component.name }}.cyclonedx.json
          retention-days: 30

      - name: Generate build summary
        run: |
          echo "## 🐳 Container Build Summary - ${{ matrix.component.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.component.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | ${{ steps.meta.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Platforms | linux/amd64, linux/arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Signed | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generated | ✅ |" >> $GITHUB_STEP_SUMMARY
