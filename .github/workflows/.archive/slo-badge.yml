name: SLO Guardrails & Badge

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  slo-check:
    name: Check SLOs & Generate Badge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          name: slo-badge
          path: badges/slo-status.svg

      - name: Cleanup
        run: make down
