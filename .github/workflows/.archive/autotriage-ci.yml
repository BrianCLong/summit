name: Autotriage CI

on:
  push:
    branches: [ main, develop, 'claude/**' ]
    paths:
      - 'assistant/autotriage/**'
      - '.github/workflows/autotriage-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'assistant/autotriage/**'
  workflow_dispatch:

jobs:
  test:
    name: Test Autotriage Engine
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          name: test-report-node-${{ matrix.node-version }}
          path: /tmp/test-report.md
          retention-days: 7

  weekly-triage:
    name: Weekly Triage Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          title: "📊 Weekly Triage Report - $(date +%Y-%m-%d)"
          content-filepath: triage-report.md
          labels: triage, automated, weekly-report

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: weekly-triage-${{ github.run_number }}
          path: |
            triage-report.md
            triage-labels.json
            triage-comments.json
          retention-days: 30
