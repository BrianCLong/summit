name: Webapp E2E and Visual Regression

on:
  pull_request:
    paths:
      - 'apps/webapp/**'
      - '.github/workflows/webapp-e2e.yml'

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          name: webapp-cypress-artifacts
          path: |
            /tmp/webapp-dev.log
            apps/webapp/cypress/screenshots
            apps/webapp/cypress/videos
          retention-days: 5
