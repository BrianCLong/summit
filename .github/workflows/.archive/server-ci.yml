name: Server CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'server/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'server/**'

concurrency:
  group: server-ci-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

env:
  PNPM_CACHE_FOLDER: ~/.pnpm-store

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: pnpm
        with:
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          files: server/policies/

      - name: Run tests with coverage
        run: pnpm run test:coverage
        working-directory: server
        env:
          NODE_OPTIONS: --experimental-vm-modules --max-old-space-size=8192

      - name: Build server
        run: pnpm run build
        working-directory: server

      - name: Run CodeQL Analysis (Placeholder)
        run: echo "CodeQL analysis would run here"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          name: server-supply-chain-artifacts
          path: |
            server/sbom.json
            artifacts/build-manifest.*.json

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          files: ./server/coverage/lcov.info # Path to LCOV coverage report
          flags: server # Optional: add flags to distinguish reports
          name: server-coverage # Optional: a name for the upload
