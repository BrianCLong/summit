name: Docs Lint

on:
  pull_request:
    paths:
      - "**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-lint:
    name: Markdown Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # v4
      - name: Setup Node.js
        uses: actions/setup-node@v4 # v6
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Run Markdown Lint
        run: pnpm dlx markdownlint-cli -c .markdownlint.json '**/*.md' --ignore 'node_modules' --disable MD060 MD040 MD032 MD036 MD058 MD030 MD034 MD007 MD031 MD022 MD004 MD009 MD012 MD024 MD025 MD026 MD029 MD038 MD047 MD049
