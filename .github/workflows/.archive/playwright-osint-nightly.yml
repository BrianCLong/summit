name: Playwright OSINT Nightly

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch: {}

jobs:
  osint-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          name: playwright-traces
          path: |
            playwright-results
            playwright-report
          retention-days: 7
