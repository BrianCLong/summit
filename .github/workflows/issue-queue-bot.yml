name: "Deterministic P0 Queue Bot"

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process manually"
        required: true
        type: string

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || true
        working-directory: .github/scripts/issue-queue-bot

      - name: Run Deterministic P0 Queue Bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_EVENT_PAYLOAD: ${{ toJson(github.event) }}
          DRY_RUN: ${{ env.DRY_RUN || 'false' }}
        run: |
          node .github/scripts/issue-queue-bot/run.js
