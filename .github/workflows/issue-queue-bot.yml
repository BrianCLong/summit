name: issue-queue-bot

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: string

permissions:
  issues: write
  pull-requests: read
  contents: read
  projects: write

jobs:
  classify-and-queue:
    runs-on: ubuntu-latest
    concurrency:
      group: issue-queue-bot-${{ github.event.issue.number || github.event.inputs.issue_number || github.run_id }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run deterministic issue queue bot
        uses: actions/github-script@v7
        env:
          QUEUE_BOT_DRY_RUN: ${{ vars.QUEUE_BOT_DRY_RUN || 'false' }}
        with:
          script: |
            const run = require('./.github/scripts/issue-queue-bot/run.cjs');
            await run({ github, context });
