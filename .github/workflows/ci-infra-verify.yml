name: "CI: Infra Verify"
on:
  pull_request:
    paths:
      - 'src/platform/infra/**'
      - '.github/policies/infra/**'
      - '.github/workflows/ci-infra-verify.yml'
      - '.github/scripts/infra-verify.ts'
      - '.github/scripts/evidence-emit.ts'
      - 'tests/infra/**'
  push:
    branches:
      - main
    paths:
      - 'src/platform/infra/**'
      - '.github/policies/infra/**'
      - '.github/workflows/ci-infra-verify.yml'
      - '.github/scripts/infra-verify.ts'
      - '.github/scripts/evidence-emit.ts'
      - 'tests/infra/**'

jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm i -g pnpm && pnpm install --frozen-lockfile

      - name: Run Tests
        run: pnpm test tests/infra/

      - name: Verify Infrastructure and Emit Evidence
        run: npx tsx .github/scripts/infra-verify.ts

      - name: Upload Evidence
        uses: actions/upload-artifact@v4
        with:
          name: infra-evidence
          path: evidence/
