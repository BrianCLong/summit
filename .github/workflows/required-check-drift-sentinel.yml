name: Required-Check Drift Sentinel

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/ci/check_required_contexts_drift.mjs'
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: read
  statuses: read
  issues: write # For auto-opening tracking issues if needed

jobs:
  detect-drift:
    runs-on: ubuntu-22.04
    name: Check Required Contexts Drift
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22

      - name: Run Drift Sentinel (PR Mode)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/ci/check_required_contexts_drift.mjs --static-only

      - name: Run Drift Sentinel (Full Mode)
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/ci/check_required_contexts_drift.mjs

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: drift-report
          path: artifact/drift_report.json

      - name: Open Tracking Issue on Drift
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('artifact/drift_report.json')) return;
            const report = JSON.parse(fs.readFileSync('artifact/drift_report.json', 'utf8'));

            if (!report.drift_detected) return;

            const title = "Required-check drift detected";
            const body = `## Required-Check Drift Sentinel Detected Drift\n\nThe following required contexts are missing from the produced contexts (static + dynamic):\n\n` +
              report.hints.map(h => `- **${h.context}**\n  - Type: ${h.type}\n  - Hint: ${h.fix}`).join("\n\n") +
              `\n\n### Local Reproduction\n\nRun the sentinel script locally using:\n\n\`\`\`bash\nexport GITHUB_TOKEN=your_pat\nnode scripts/ci/check_required_contexts_drift.mjs\n\`\`\`\n\nPlease check \`docs/runbooks/REQUIRED_CHECK_DRIFT.md\` for the fix playbook.`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'app/github-actions'
            });

            const existing = issues.data.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: "Drift detected again in latest scheduled run.\n\n" + body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ["bug", "ci", "drift"]
              });
            }
