name: Qwen License Check

on:
  pull_request:
    paths:
      - 'summit/models/qwen/**'
      - 'summit/scripts/license_check_qwen.py'

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run License Check
        run: python summit/scripts/license_check_qwen.py --license Qwen-License
