name: reusable-mm-evidence

on:
  workflow_call:

jobs:
  mm-evidence-verify:
    name: mm-evidence-verify
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Verify multimodal evidence bundle
        run: node .github/scripts/mm/evidence-verify.ts --evidence ./evidence
