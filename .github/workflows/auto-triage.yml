name: Auto Triage

on:
  issues:
    types: [opened, edited, reopened]
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr_path_labeler:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  keyword_triage:
    runs-on: ubuntu-22.04
    steps:
      - name: Apply deterministic keyword labels
        uses: actions/github-script@v7
        with:
          script: |
            const isPR = context.eventName === 'pull_request_target';
            const n = isPR ? context.payload.pull_request.number : context.payload.issue.number;
            const body = (isPR ? context.payload.pull_request.body : context.payload.issue.body) || "";
            const title = (isPR ? context.payload.pull_request.title : context.payload.issue.title) || "";
            const text = (title + "\n" + body).toLowerCase();

            const add = new Set();
            const ensure = (l) => add.add(l);

            // Always triage new/edited items
            ensure("state:triage");

            const matchAny = (arr) => arr.some(k => text.includes(k));

            // Buckets (deterministic)
            if (matchAny(["flaky", "flake", "nondeterministic", "non-deterministic", "reproducibility", "determinism", "repro gate"])) {
              ensure("p0:ci-determinism"); ensure("prio:P0");
            }
            if (matchAny(["queued", "queue depth", "saturation", "duplicate workflow", "duplicate run", "runaway matrix", "concurrency", "cancel-in-progress"])) {
              ensure("p0:ci-saturation"); ensure("prio:P0");
            }
            if (matchAny(["run_id", "run id", "run manifest", "untracked write", "manifest propagation", "provenance"])) {
              ensure("p0:manifest-provenance"); ensure("prio:P0");
            }
            if (matchAny(["sbom", "policy hash", "policy hashing", "attestation", "supply chain"])) {
              ensure("p0:compliance-sbom"); ensure("prio:P0");
            }
            if (matchAny(["opa", "abac", "rego", "policy simulation", "authorization", "authz", "tenant isolation"])) {
              ensure("p0:authz-policy"); ensure("prio:P0");
            }
            if (matchAny(["k6", "slo", "smoke gate", "perf gate", "performance gate", "regression"])) {
              ensure("p0:slo-k6"); ensure("prio:P0");
            }
            if (matchAny(["ga blocker", "release blocker", "ship blocker", "blocks required checks", "fails on main"])) {
              ensure("p0:release-integrity"); ensure("prio:P0");
            }

            const labels = Array.from(add);

            if (isPR) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: n,
                labels
              });
            } else {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: n,
                labels
              });
            }
