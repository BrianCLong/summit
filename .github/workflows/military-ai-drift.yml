name: military-ai-drift
on:
  schedule:
    - cron: '0 3 * * 1'
jobs:
  drift-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run drift detection
        run: python scripts/monitoring/military-ai-drift.py
        working-directory: ${{ github.workspace }}
permissions:
  contents: read
