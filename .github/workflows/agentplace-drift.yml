name: AgentPlace Drift Detection

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sundays
  workflow_dispatch: # Allow manual trigger

jobs:
  drift-check:
    runs-on: ubuntu-latest
    if: env.SUMMIT_AGENTPLACE_ENABLED == 'true'
    env:
      SUMMIT_AGENTPLACE_ENABLED: ${{ vars.SUMMIT_AGENTPLACE_ENABLED || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install PyYAML jsonschema
      - name: Run Drift Detector
        run: |
          PYTHONPATH=. python3 scripts/monitoring/agentplace-drift.py
      - name: Upload Drift Report
        uses: actions/upload-artifact@v4
        with:
          name: agentplace-drift-report
          path: drift_report.json
