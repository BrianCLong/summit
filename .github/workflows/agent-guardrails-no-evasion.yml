name: Agent Guardrails Gate

on:
  pull_request:
    paths:
      - 'src/agents/itt/**'
  push:
    branches:
      - main
    paths:
      - 'src/agents/itt/**'

jobs:
  guardrails-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install -g tsx

      - name: Run Guardrails Verifier
        run: npx tsx .github/scripts/agent_guardrails_no_evasion.ts
