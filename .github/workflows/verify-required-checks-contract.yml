name: Verify Required Checks Contract

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts/ci/**"
      - "docs/governance/REQUIRED_CHECKS_CONTRACT.yml"
      - ".github/required-checks.yml"

jobs:
  verify-contract:
    name: Verify Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run verification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/ci/verify_required_checks_contract.mjs || echo "::warning::Required checks contract verification failed. This is currently advisory on PR."
