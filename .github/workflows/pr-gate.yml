name: pr-gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
  merge_group:
    branches:
      - main

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: corepack enable && pnpm install --no-frozen-lockfile

      - name: Check Queue Saturation
        run: |
          # Count PRs actively in the merge queue (not all open PRs)
          QUEUE_SIZE=$(gh pr list --search "is:pr is:open is:in-merge-queue" --json number --jq 'length')
          MAX_QUEUE=50
          echo "Merge queue depth: $QUEUE_SIZE / $MAX_QUEUE"

          if [ "$QUEUE_SIZE" -ge "$MAX_QUEUE" ]; then
            echo "::error::Merge queue saturated ($QUEUE_SIZE/$MAX_QUEUE). Autopilot draining — hold new PRs."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workflow Drift Sentinel
        run: node scripts/ci/validate_workflows.mjs

      - name: Workflow Budget Sentinel
        run: node scripts/ci/workflow-budget-sentinel.mjs

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit --passWithNoTests

      - name: Evidence ID validation
        run: node scripts/ci/verify_evidence_id_consistency.mjs

      - name: Timestamp scan
        run: node scripts/scan_timestamp_keys.mjs

      - name: Report separation gate
        run: pnpm gate:report


      - name: Validate JSON Schemas
        run: pnpm gate:schema

      - name: Detect governance policy changes
        id: governance_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            governance_policy:
              - 'summit/agents/policy/**'
              - 'summit/agents/skills/**'
              - 'tools/governance/**'
              - 'docs/governance/**'

      - name: Governance policy bundle gate
        if: steps.governance_changes.outputs.governance_policy == 'true'
        run: |
          CHANGED_FILES=$(git diff --name-only "${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}" "${{ github.sha }}")
          pnpm exec tsx tools/governance/check-policy.ts $CHANGED_FILES
