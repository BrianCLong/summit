name: pr-gate

on:
  pull_request:
  merge_group:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Check Queue Saturation
        run: |
          # Count PRs in merge queue specifically (non-draft and mergeable)
          QUEUE_SIZE=$(gh pr list --search "is:pr is:open draft:false" --json mergeable --jq '[.[] | select(.mergeable=="MERGEABLE")] | length')
          MAX_QUEUE=200
          echo "Current Mergeable PR Count: $QUEUE_SIZE"

          if [ "$QUEUE_SIZE" -ge "$MAX_QUEUE" ]; then
            echo "::error::Merge queue saturated ($QUEUE_SIZE/$MAX_QUEUE). Please hold new PRs."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workflow Drift Sentinel
        run: node scripts/ci/validate_workflows.mjs

      - name: Workflow Budget Sentinel
        run: node scripts/ci/workflow-budget-sentinel.mjs

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit --passWithNoTests

      - name: Agent orchestrator tests
        run: pnpm exec tsx --test tests/agents/orchestrator.test.ts

      - name: Evidence ID validation
        run: node scripts/ci/verify_evidence_id_consistency.mjs

      - name: Timestamp scan
        run: node scripts/scan_timestamp_keys.mjs
