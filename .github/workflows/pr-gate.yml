name: pr-gate

on:
  pull_request:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Check Queue Saturation
        run: |
          # Fails if the queue depth is > 200, acting as an early warning for CI meltdown.
          QUEUE_DEPTH=$(gh pr list --search "is:open is:pr" --limit 1000 --json number | jq '. | length')
          echo "Current Queue Depth: $QUEUE_DEPTH"
          if [ "$QUEUE_DEPTH" -gt 200 ]; then
            echo "::error::Queue depth is saturated ($QUEUE_DEPTH > 200). Please hold new PRs."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workflow Drift Sentinel
        run: node scripts/ci/validate_workflows.mjs

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit --passWithNoTests

      - name: Evidence ID validation
        run: node scripts/ci/verify_evidence_id_consistency.mjs

      - name: Timestamp scan
        run: node scripts/scan_timestamp_keys.mjs
