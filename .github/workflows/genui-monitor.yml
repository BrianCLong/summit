name: GenUI Monitor
on:
  schedule:
    - cron: '0 * * * *'
jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Run Drift Script
        run: npx tsx scripts/monitoring/genui-drift.ts
        working-directory: ${{ github.workspace }}
permissions:
  contents: read
