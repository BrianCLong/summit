name: Biometrics Privacy Gate

on:
  pull_request:
    paths:
      - 'src/graphrag/itt/**'
  push:
    branches:
      - main
    paths:
      - 'src/graphrag/itt/**'

jobs:
  privacy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install -g tsx

      - name: Run Privacy Scanner
        run: npx tsx .github/scripts/biometrics_privacy_verify.ts
