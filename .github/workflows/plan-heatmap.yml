name: Plan Heatmap & Stability Gate
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 * * * *"   # hourly
jobs:
  plan-stability:
    runs-on: ubuntu-latest
    env:
      PLAN_SAMPLER_ENABLED: "true"
      PLAN_SAMPLING_RATE: "0.0075"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install deps
        run: pip install pyyaml
      - name: Collect last-N samples
        uses: actions/download-artifact@v4
        with:
          name: plan-samples
          path: .plan-samples
        continue-on-error: true
      - name: Render heatmap
        run: python tools/plan_heatmap.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plan-heatmap
          path: |
            plan-heatmap.html
            .plan-samples/*.jsonl
      - name: Stability Gate
        id: gate
        run: python scripts/ci/plan_stability_gate.py
