name: AI Governance Enforcement

on:
  pull_request:
    paths:
      - 'src/agents/policies/**'
      - 'src/api/**/middleware/policyGuard.ts'
      - '.github/policies/**'

jobs:
  ai-policy-validation:
    name: AI Governance Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install -g pnpm && pnpm install --no-frozen-lockfile

      - name: Run Redline Coverage Check
        run: |
          echo "Executing Redline tests..."
          if [ -d "src/agents/policies/__tests__" ] && ls src/agents/policies/__tests__/*redline*.test.ts 1> /dev/null 2>&1; then
            pnpm test src/agents/policies/__tests__/*redline*.test.ts
          else
            echo "⚠️ No dedicated redline tests found yet. This check will be enforced in phase 2."
          fi

      - name: Setup Open Policy Agent (OPA)
        uses: open-policy-agent/setup-opa@v2
        with:
          version: 'latest'

      - name: Run Open Policy Agent (OPA) Validation
        run: |
          opa check .github/policies/ai-usage.rego
