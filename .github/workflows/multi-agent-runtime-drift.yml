name: Multi-Agent Runtime Drift Detector
on:
  schedule:
    - cron: '0 0 * * *'
jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install
      - run: npx tsx scripts/monitoring/multi-agent-runtime-drift.ts
