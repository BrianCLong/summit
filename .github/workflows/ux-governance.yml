name: UX Governance Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ux-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # v4.0.0
        # Version read from package.json packageManager field

      - name: Setup Node.js
        uses: actions/setup-node@v4 # v6
        with:
          retention-days: 14
          name: ux-governance-report
          path: ux-governance-report.json
