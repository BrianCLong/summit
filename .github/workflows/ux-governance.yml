name: UX Governance
on:
  pull_request:
    paths:
      - 'src/components/**'
      - 'src/styles/**'
      - 'ux/**'

jobs:
  ux-governance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm run ux:audit || echo "UX Audit failed but continuing for now"

      # Mock artifact generation if the real command doesn't produce it yet
      - run: |
          if [ ! -f ux-governance-report.json ]; then
            echo '{"status": "mock", "issues": []}' > ux-governance-report.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ux-governance-report
          path: ux-governance-report.json
          retention-days: 14
