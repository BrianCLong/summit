name: Reusable E2E
on:
  workflow_call:

env:
  PNPM_CACHE_FOLDER: ~/.pnpm-store
  NODE_VERSION: '20.x'

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: '1'
      COMPOSE_DOCKER_CLI_BUILD: '1'
    steps:
      - uses: actions/checkout@v4 # v4
      - uses: actions/setup-node@v4 # v4
      with:
        node-version-file: .nvmrc
        cache: pnpm.0.0
          run_install: false
      - name: Cache pnpm store
        uses: actions/cache@v4 # v4
        with:
          name: build-artifacts
        continue-on-error: true
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Bootstrap repo (make bootstrap)
        run: make bootstrap
      - name: Cache Docker layers
        uses: actions/cache@v4 # v4
        with:
          context: ./server
          file: ./server/Dockerfile.dev
          tags: summit/api:ci
          push: false
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
      - name: Build client image (cached)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4 # v4
      with:
        node-version-file: .nvmrc
        cache: pnpm.0.0
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          name: build-artifacts
        continue-on-error: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap repo (make bootstrap)
        run: make bootstrap

      - name: Cache Docker layers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          context: ./server
          file: ./server/Dockerfile.dev
          tags: summit/api:ci
          push: false
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build client image (cached)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: ./client
          file: ./client/Dockerfile.dev
          tags: summit/web:ci
          push: false
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Move cache to prevent unbounded growth
      - name: Rotate Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

      - name: Bring up stack (make up)
        run: make up

      - name: Golden path smoke tests
        run: make smoke

      - name: Compose logs on failure
        if: (failure()) && (always())
        run: ./scripts/run-compose.sh -f docker-compose.dev.yml logs --tail=200

      - name: Tear down stack
        run: ./scripts/run-compose.sh -f docker-compose.dev.yml down -v
