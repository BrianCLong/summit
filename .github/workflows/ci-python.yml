name: Python CI

on:
  push:
    branches: [main, develop]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'requirements*.txt'
  pull_request:
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'requirements*.txt'

jobs:
  python-ci:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    uses: ./.github/workflows/_reusable-python.yml
    with:
      python-version: ${{ matrix.python-version }}
