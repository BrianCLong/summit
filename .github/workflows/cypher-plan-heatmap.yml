name: cypher-plan-heatmap
on:
  pull_request:
  push:
    branches: [main]

jobs:
  cypher_heatmap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract plan summaries (from eval fixtures)
        run: |
          mkdir -p out/cypher
          # If you later store retrieval results elsewhere, point --in at that path.
          node tools/cypher/plan_extract.mjs \
            --in tools/graphrag/eval/datasets/smoke.jsonl \
            --out out/cypher/plan_summaries.json || true

          # Fallback: if fixtures directory doesn't exist yet, create an empty input
          if [ ! -s out/cypher/plan_summaries.json ]; then echo "[]" > out/cypher/plan_summaries.json; fi

      - name: Render heatmap
        run: |
          python tools/cypher/plan_heatmap.py out/cypher/plan_summaries.json out/cypher

      - name: Upload heatmap artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cypher-heatmap
          path: |
            out/cypher/heatmap.svg
            out/cypher/heatmap.json
            out/cypher/topk.json
            out/cypher/plan_summaries.json
permissions:
  contents: read
