name: PR Size Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  label:
    name: Label PR by size
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size: XS'
          xs_max_size: 10
          s_label: 'size: S'
          s_max_size: 100
          m_label: 'size: M'
          m_max_size: 500
          l_label: 'size: L'
          l_max_size: 1000
          xl_label: 'size: XL'
          # Set to true to block merging oversized PRs
          fail_if_xl: false
          message_if_xl: >
            This PR is very large (>1000 lines changed). Consider breaking it
            into smaller, reviewable pieces to reduce review burden and merge risk.
          files_to_ignore: >
            "package-lock.json pnpm-lock.yaml Cargo.lock poetry.lock
             *.generated.ts *.generated.graphql"
