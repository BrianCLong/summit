name: Reproducibility Check

on:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-determinism:
    runs-on: ubuntu-latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Generate Deterministic Run
        id: generate
        run: |
          # Run the script and capture output
          output=$(npx tsx scripts/test-determinism.ts)
          echo "$output"
          # Extract run_id from the log line: "Starting deterministic test run: test-run-..."
          run_id=$(echo "$output" | grep "Starting deterministic test run:" | awk '{print $5}')
          if [ -z "$run_id" ]; then
            echo "Failed to extract run_id"
            # Fail the step
            /bin/false
          fi
          echo "RUN_ID=$run_id" >> $GITHUB_ENV

      - name: Replay Run
        run: |
          echo "Replaying Run ID: $RUN_ID"
          # Use the built CLI
          node packages/cli/dist/index.js replay --run "$RUN_ID"
