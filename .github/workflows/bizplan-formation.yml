name: bizplan-formation

on:
  pull_request:
    paths:
      - 'pipelines/bizplan_readiness.py'
      - 'pipelines/fixtures/sample_startup.json'
      - 'schemas/business_plan.schema.json'
      - 'schemas/legal_structure.matrix.json'
      - 'docs/standards/cnbc-bizplan-formation.md'
      - '.github/workflows/bizplan-formation.yml'

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run deterministic readiness pipeline
        run: |
          python3 pipelines/bizplan_readiness.py \
            --input pipelines/fixtures/sample_startup.json \
            --out-dir artifacts/cnbc-bizplan
      - name: Verify deterministic artifacts
        run: |
          test -f artifacts/cnbc-bizplan/report.json
          test -f artifacts/cnbc-bizplan/metrics.json
          test -f artifacts/cnbc-bizplan/stamp.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('artifacts/cnbc-bizplan/report.json').read_text())
          assert report['readiness']['score'] >= 0.70
          assert report['decision'] == 'allow'
          PY
permissions:
  contents: read
