name: Evidence Bundle Generator

on:
  workflow_call:

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download preflight verdict
        uses: actions/download-artifact@v4
        with:
          name: preflight-verdict
          path: artifacts
      - name: Generate Evidence Bundle
        run: |
          ./scripts/generate_evidence.sh artifacts/evidence-bundle.json
      - name: Validate Evidence Format
        run: |
          jq empty artifacts/evidence-bundle.json
      - name: Upload Evidence Bundle
        uses: actions/upload-artifact@v4
        with:
          name: evidence-bundle
          path: artifacts/evidence-bundle.json
