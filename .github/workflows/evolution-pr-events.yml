name: Evolution - PR Event Emission

# Emit evolution events for PR lifecycle
# Integrates with Evolution Ledger for repository intelligence

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
      - ready_for_review
  pull_request_review:
    types:
      - submitted

jobs:
  emit-pr-event:
    runs-on: ubuntu-latest

    # Only run if Evolution Ledger is available
    # Gracefully skips if database not configured
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for features

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd services/evolution-ledger
          npm install

      - name: Prepare PR context
        id: pr-context
        run: |
          # Build PR context JSON
          PR_CONTEXT=$(cat <<EOF
          {
            "prNumber": ${{ github.event.pull_request.number }},
            "title": "${{ github.event.pull_request.title }}",
            "author": "${{ github.event.pull_request.user.login }}",
            "baseBranch": "${{ github.event.pull_request.base.ref }}",
            "headBranch": "${{ github.event.pull_request.head.ref }}",
            "state": "${{ github.event.pull_request.state }}",
            "merged": ${{ github.event.pull_request.merged }},
            "additions": ${{ github.event.pull_request.additions }},
            "deletions": ${{ github.event.pull_request.deletions }},
            "filesChanged": ${{ github.event.pull_request.changed_files }},
            "commits": ${{ github.event.pull_request.commits }},
            "createdAt": "${{ github.event.pull_request.created_at }}",
            "updatedAt": "${{ github.event.pull_request.updated_at }}",
            "sha": "${{ github.event.pull_request.head.sha }}"
          }
          EOF
          )

          # Export for next step
          echo "PR_CONTEXT<<EOF" >> $GITHUB_ENV
          echo "$PR_CONTEXT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Determine event type
        id: event-type
        run: |
          EVENT_TYPE="pr_unknown"

          if [[ "${{ github.event.action }}" == "opened" ]]; then
            EVENT_TYPE="pr_opened"
          elif [[ "${{ github.event.action }}" == "reopened" ]]; then
            EVENT_TYPE="pr_reopened"
          elif [[ "${{ github.event.action }}" == "synchronize" ]]; then
            EVENT_TYPE="pr_synchronize"
          elif [[ "${{ github.event.action }}" == "closed" && "${{ github.event.pull_request.merged }}" == "true" ]]; then
            EVENT_TYPE="pr_merged"
          elif [[ "${{ github.event.action }}" == "closed" ]]; then
            EVENT_TYPE="pr_closed"
          elif [[ "${{ github.event.action }}" == "ready_for_review" ]]; then
            EVENT_TYPE="pr_ready_for_review"
          elif [[ "${{ github.event.review.state }}" == "approved" ]]; then
            EVENT_TYPE="pr_approved"
          elif [[ "${{ github.event.review.state }}" == "changes_requested" ]]; then
            EVENT_TYPE="pr_changes_requested"
          fi

          echo "EVENT_TYPE=$EVENT_TYPE" >> $GITHUB_OUTPUT
          echo "📡 Event type: $EVENT_TYPE"

      - name: Emit evolution event
        env:
          POSTGRES_HOST: ${{ secrets.EVOLUTION_LEDGER_HOST || 'localhost' }}
          POSTGRES_PORT: ${{ secrets.EVOLUTION_LEDGER_PORT || '5432' }}
          POSTGRES_DB: ${{ secrets.EVOLUTION_LEDGER_DB || 'summit_evolution' }}
          POSTGRES_USER: ${{ secrets.EVOLUTION_LEDGER_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.EVOLUTION_LEDGER_PASSWORD }}
        run: |
          # Emit event (gracefully handles missing database)
          node scripts/evolution/emit-pr-event.mjs \
            "${{ steps.event-type.outputs.EVENT_TYPE }}" \
            "$PR_CONTEXT" || echo "⚠️  Evolution Ledger unavailable, skipping event emission"

      - name: Comment on PR (optional)
        if: steps.event-type.outputs.EVENT_TYPE == 'pr_opened'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.name,
              body: '📊 Evolution intelligence activated for this PR. Events will be tracked in the Evolution Ledger.'
            })
