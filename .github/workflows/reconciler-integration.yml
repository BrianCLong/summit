name: reconciler-integration
on:
  pull_request:
    paths:
      - 'reconciler/**'
      - 'tests/integration/**'
      - 'tests/data/**'
      - 'observability/**'
      - '.github/workflows/reconciler-integration.yml'

jobs:
  canary:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    services:
      neo4j:
        image: neo4j:5.22
        ports: ['7687:7687']
        env:
          NEO4J_AUTH: neo4j/password
        options: >-
          --health-cmd "cypher-shell -u neo4j -p password 'RETURN 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install neo4j==5.19.0 pytest==8.3.3

      - name: Run reconciler canary (JSONL replay)
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          RECONCILE_CANARY_JSONL: tests/data/canary_10k.jsonl
        run: |
          pytest -q tests/integration/test_reconciler_convergence.py

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reconcile-metrics
          path: observability/reconcile_metrics.prom
