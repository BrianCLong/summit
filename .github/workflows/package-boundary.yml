name: Package Boundary Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:

jobs:
  boundary-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: ppnpm install --frozen-lockfile

      - name: Run Package Boundary Check
        run: npx tsx scripts/repoos/package-boundary-check.ts

      - name: Upload Violation Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boundary-violations-report
          path: boundary_violations_report.md
