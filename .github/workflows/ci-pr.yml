name: ci-pr

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  JEST_RETRY_TIMES: 2
  NODE_ENV: test
  TZ: UTC
  NODE_OPTIONS: --max-old-space-size=8192

permissions:
  contents: read
  actions: read
  checks: write
  id-token: write

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            task: lint
          - name: Typecheck
            task: typecheck
          - name: Unit Tests
            task: test
          - name: Build
            task: build
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run ${{ matrix.task }}
        run: |
          case "${{ matrix.task }}" in
            lint) pnpm -r lint ;;
            typecheck) pnpm -r typecheck ;;
            test)
              if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                echo "Skipping recursive workspace test fanout in PR to avoid noise."
              else
                pnpm -r test -- --ci
              fi
              ;;
            build) pnpm -r build ;;
          esac

  config-guard:
    name: Config Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Validate Jest & pnpm Configuration
        run: pnpm -w check:jest-config

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [config-guard]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Start Test Infrastructure
        run: |
          docker run -d --name summit-db-test -p 5432:5432 -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=summit_test timescale/timescaledb:latest-pg14
          docker run -d --name summit-redis-test -p 6379:6379 redis:7-alpine
          until docker exec summit-db-test pg_isready; do sleep 2; done
          until docker exec summit-redis-test redis-cli ping | grep -q PONG; do sleep 2; done
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run database migrations
        run: cd server && npx tsx scripts/managed-migrate.ts up
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/summit_test
      - name: Run integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/summit_test
          REDIS_URL: redis://localhost:6379

  verification-suite:
    name: Verification Suite
    runs-on: ubuntu-latest
    needs: [config-guard]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify runtime configuration
        run: pnpm verify:runtime
      - name: Run verification scripts
        run: pnpm verify

  governance:
    name: Governance
    runs-on: ubuntu-latest
    needs: [config-guard]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify governance docs
        run: pnpm ci:docs-governance

  soc-controls:
    name: SOC Controls (ci-pr)
    runs-on: ubuntu-latest
    needs: [config-guard]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run SOC control tests
        run: |
          mkdir -p soc-compliance-reports
          bash scripts/test-soc-controls.sh soc-compliance-reports
