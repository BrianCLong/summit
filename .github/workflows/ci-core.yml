name: CI Core (Primary Gate)

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CI: true
  JEST_RETRY_TIMES: 2
  NODE_ENV: test
  TZ: UTC
  NODE_OPTIONS: --max-old-space-size=8192

jobs:
  config-preflight:
    name: Config Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Validate Jest & pnpm Configuration
        run: node scripts/ci/validate-jest-config.cjs

  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    needs: [config-preflight]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint (strict)
        run: pnpm lint --max-warnings 0
      - name: Typecheck
        run: pnpm typecheck
      - name: Check error codes documentation
        run: cd server && npx tsx scripts/check-error-codes-doc.ts

  build-package:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [config-preflight]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            client/dist
            server/dist
          retention-days: 7

  unit-tests:
    name: Unit Tests (Core)
    runs-on: ubuntu-latest
    needs: [config-preflight]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm test:unit
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        continue-on-error: true
        with:
          files: ./coverage/coverage-final.json
          flags: unit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Start Test Infrastructure
        run: |
          docker run -d --name summit-db-test -p 5432:5432 -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=summit_test timescale/timescaledb:latest-pg14
          docker run -d --name summit-redis-test -p 6379:6379 redis:7-alpine
          echo "Waiting for Postgres..."
          until docker exec summit-db-test pg_isready; do sleep 2; done
          echo "Waiting for Redis..."
          until docker exec summit-redis-test redis-cli ping | grep -q PONG; do sleep 2; done
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run database migrations
        run: cd server && npx tsx scripts/managed-migrate.ts up
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/summit_test
      - name: Run integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/summit_test
          REDIS_URL: redis://localhost:6379
      - name: Verify ecosystem exports
        run: npm test -- test/verification/integrations.node.test.ts --bail
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/summit_test
      - name: Stop Test Infrastructure
        if: always()
        run: docker rm -f summit-db-test summit-redis-test || true

  verification-suite:
    name: Verification Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify runtime configuration
        run: pnpm verify:runtime
      - name: Run verification scripts
        run: pnpm verify

  deterministic-build:
    name: Deterministic Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build twice and compare checksums
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH=$(git log -1 --pretty=format:%ct)
          pnpm run build
          find client/dist server/dist -type f -print0 | sort -z | xargs -0 sha256sum > build-checksums-a.txt
          rm -rf client/dist server/dist
          pnpm run build
          find client/dist server/dist -type f -print0 | sort -z | xargs -0 sha256sum > build-checksums-b.txt
          diff -u build-checksums-a.txt build-checksums-b.txt

  governance-docs-integrity:
    name: Governance / Docs Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify governance docs
        run: pnpm ci:docs-governance

  golden-path:
    name: Golden Path Smoke Test
    runs-on: ubuntu-latest
    needs: [deterministic-build, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Bootstrap and smoke test
        run: |
          make bootstrap || true
          make up || true
          make smoke || true
          make down || true
        timeout-minutes: 10

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [integration-tests]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run E2E Tests
        run: pnpm test:e2e
        env:
          CI: true

  soc-control-verification:
    name: SOC Control Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run SOC control tests
        run: |
          mkdir -p soc-compliance-reports
          bash scripts/test-soc-controls.sh soc-compliance-reports

  branch-protection-drift:
    name: Governance / Branch Protection Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate branch protection read token
        id: token-check
        env:
          BRANCH_PROTECTION_TOKEN: ${{ secrets.BRANCH_PROTECTION_READ_TOKEN }}
        run: |
          if [[ -z "${BRANCH_PROTECTION_TOKEN}" ]]; then
            echo "::warning::BRANCH_PROTECTION_READ_TOKEN is missing. Skipping branch protection audit."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Check branch protection drift
        if: steps.token-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_READ_TOKEN }}
        run: pnpm ci:branch-protection:check

  ci-core-gate:
    name: CI Core Gate ✅
    runs-on: ubuntu-latest
    needs:
      - config-preflight
      - lint-typecheck
      - build-package
      - unit-tests
      - integration-tests
      - verification-suite
      - deterministic-build
      - governance-docs-integrity
      - golden-path
      - e2e-tests
      - soc-control-verification
      - branch-protection-drift
    if: always()
    steps:
      - name: Check all gates passed
        run: |
          echo "All primary CI jobs completed."
