name: CI Core
on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint-typecheck:
    name: Lint & Typecheck (Stub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Stub execution
        run: |
          echo "Migration stub: CI Core has been consolidated into pr-gate.yml"
          echo "Running minimal checks for branch protection compatibility..."
          pnpm --version

  governance-docs-integrity:
    name: Governance Docs Integrity (Stub)
    runs-on: ubuntu-latest
    steps:
      - run: echo "Migration stub: Governance checks now part of pr-gate.yml"
