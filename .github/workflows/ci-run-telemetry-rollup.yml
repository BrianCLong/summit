name: CI telemetry rollup

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: ci-telemetry-rollup
  cancel-in-progress: false

jobs:
  rollup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: run-meta-*
          path: artifacts
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/ci-rollup.cjs
        working-directory: ${{ github.workspace }}
      - uses: actions/upload-artifact@v4
        with:
          name: ci-rollup-json
          path: ci-rollup.json
      - uses: actions/upload-artifact@v4
        with:
          name: ci-rollup-csv
          path: ci-rollup.csv
permissions:
  contents: read
