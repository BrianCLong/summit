# .github/workflows/ci.yml
# ==============================================================================
#  Continuous Integration Workflow for the Summit Platform
#
#  This workflow ensures that all code pushed to the repository adheres to
#  our quality and correctness standards. It is designed to have absolute
#  parity with the local development environment.
# ==============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  # Ensures Docker BuildKit is used for faster, more efficient builds.
  DOCKER_BUILDKIT: '1'
  COMPOSE_DOCKER_CLI_BUILD: '1'

permissions:
  contents: read
  security-events: write

jobs:
  # ============================================================================
  #  Validate Job
  #
  #  This is the core validation job. It uses the exact same canonical `make`
  #  commands that developers use locally, guaranteeing CI/local parity.
  # ============================================================================
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies and configure environment
        run: make dev-setup

      - name: Run linting and formatting checks
        run: make dev-lint

      - name: Run the complete test suite
        run: make dev-test

  # ============================================================================
  #  Golden Path (Smoke Test) Job
  #
  #  This job runs the end-to-end smoke tests to validate the critical
  #  "Golden Path" workflow in a fully running environment.
  # ============================================================================
  golden-path:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: make dev-setup

      - name: Bring up the full application stack
        run: make dev-run

      - name: Run golden path smoke tests
        run: make smoke

      - name: Capture logs on failure
        if: failure()
        run: docker-compose -f docker-compose.dev.yml logs --tail=200

      - name: Tear down the stack
        if: always()
        run: make down

  # ============================================================================
  #  Security Scan Job (Non-blocking)
  #
  #  This job runs security-related scans to identify potential
  #  vulnerabilities. It runs in parallel and does not block PR merging.
  # ============================================================================
  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: true # Do not block PRs for this job
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'
          vuln-type: 'os,library'

      - name: Generate SBOM (Software Bill of Materials)
        uses: anchore/sbom-action@v0
        with:
          path: .
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
