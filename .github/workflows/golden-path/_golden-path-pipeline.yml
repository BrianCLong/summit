# Golden Path CI/CD Pipeline
#
# Main orchestrator workflow that composes all pipeline stages.
# Services call this workflow to get the full Golden Path experience.
#
# Usage:
#   jobs:
#     pipeline:
#       uses: ./.github/workflows/_golden-path-pipeline.yml
#       with:
      service: ${{ inputs.service }}
      environment: ${{ inputs.environment }}
      prometheus-url: ${{ inputs['prometheus-url'] }}
      canary-window: ${{ inputs['canary-window'] }}
      canary-slo-p95-ms: ${{ inputs['canary-slo-p95-ms'] }}
      canary-error-rate: ${{ inputs['canary-error-rate'] }}
      canary-saturation-max: ${{ inputs['canary-saturation-max'] }}
      rollback-enabled: ${{ inputs['rollback-enabled'] }}

  # ============================================================================
  # Summary
  # ============================================================================
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, test, security, build, deploy, verify, canary-rollback]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## Golden Path Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result == 'success' && '✅' || '❌' }} ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result == 'success' && '✅' || '❌' }} ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result == 'success' && '✅' || needs.security.result == 'skipped' && '⏭️' || '❌' }} ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅' || '❌' }} ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result == 'success' && '✅' || needs.deploy.result == 'skipped' && '⏭️' || '❌' }} ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verify | ${{ needs.verify.result == 'success' && '✅' || needs.verify.result == 'skipped' && '⏭️' || '❌' }} ${{ needs.verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Canary + Rollback | ${{ needs['canary-rollback'].result == 'success' && '✅' || needs['canary-rollback'].result == 'skipped' && '⏭️' || '❌' }} ${{ needs['canary-rollback'].result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ inputs.service }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.outputs.image }}" != "" ]; then
            echo "**Image:** \`${{ needs.build.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          fi
