name: Summit Golden Path Scaffold

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  golden-path:
    name: golden-path
    runs-on: ubuntu-22.04
    env:
      BUILD_ID: pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Policy checks (OPA placeholder)
        run: pnpm exec tsx governance/policy-check.ts

      - name: Run golden path tests (scaffold)
        run: |
          echo "Running scaffolded PR test checks"
          pnpm --version

      - name: Generate evidence bundle
        run: |
          mkdir -p evidence/out
          cat > evidence/out/bundle.json <<JSON
          {
            "build_id": "${BUILD_ID}",
            "commit_sha": "${COMMIT_SHA}",
            "policy_results": [
              {
                "policy_name": "governance/opa-placeholder",
                "status": "pass",
                "severity": "low",
                "evidence_ref": "governance/policy-check.ts"
              }
            ],
            "test_results": [
              {
                "name": "golden-path-scaffold",
                "status": "pass"
              }
            ],
            "provenance": {
              "workflow": "summit-golden-path",
              "run_id": "${{ github.run_id }}",
              "repository": "${{ github.repository }}"
            },
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON

      - name: Validate evidence schema
        run: |
          node -e "const fs=require('fs'); const schema=JSON.parse(fs.readFileSync('evidence/schema.json','utf8')); const bundle=JSON.parse(fs.readFileSync('evidence/out/bundle.json','utf8')); const required=schema.required||[]; const missing=required.filter((k)=>!(k in bundle)); if(missing.length){console.error('Missing required fields:',missing.join(',')); process.exit(1);} const policyOk=Array.isArray(bundle.policy_results)&&bundle.policy_results.every((r)=>['pass','fail','warn'].includes(r.status)); const testOk=Array.isArray(bundle.test_results)&&bundle.test_results.every((r)=>['pass','fail','skip'].includes(r.status)); if(!policyOk||!testOk){console.error('Invalid status values in evidence bundle'); process.exit(1);} console.log('Evidence bundle validation passed');"

      - name: Observer notification hook (stub)
        run: |
          pnpm exec tsx -e "import { notifyObserver } from './services/observer/notify.ts'; (async () => { await notifyObserver({ eventType: 'ga.golden_path.completed', buildId: process.env.BUILD_ID ?? 'local', commitSha: process.env.COMMIT_SHA ?? 'local', status: 'pass', timestamp: new Date().toISOString(), evidenceRef: 'evidence/out/bundle.json' }); })().catch((error) => { console.error(error); process.exit(1); });"

      - name: Upload evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: summit-golden-path-evidence
          path: evidence/out/bundle.json
          if-no-files-found: error
