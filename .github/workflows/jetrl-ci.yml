name: Jet-RL CI
on: [push, pull_request]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python -m pip install pytest jsonschema torch --extra-index-url https://download.pytorch.org/whl/cpu
      - run: python -m pytest tests/test_precision_flow_policy.py tests/test_detectors_deny_by_default.py
  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python -m pip install jsonschema
      - run: python tools/validate_evidence_schemas.py
