name: Context Drift Check

on:
  push:
    paths:
      - '.summit/context/**'
  schedule:
    - cron: '0 0 * * 1' # Weekly

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - name: Run Drift Check
        run: npx tsx scripts/monitoring/context_drift.ts
