name: audit-exception-expiry

on:
  pull_request:
    paths:
      - "audit/exceptions.yaml"
      - "scripts/audit/check-exceptions.cjs"
      - ".github/workflows/audit-exception-expiry.yml"
  push:
    branches: [main]
    paths:
      - "audit/exceptions.yaml"
      - "scripts/audit/check-exceptions.cjs"
      - ".github/workflows/audit-exception-expiry.yml"

jobs:
  validate-exceptions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v6
      - name: Use Node.js 20
        uses: actions/setup-node@v4 # v6
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          npm install -g js-yaml
      - name: Validate exceptions
        run: NODE_PATH=$(npm root -g) node scripts/audit/check-exceptions.cjs
