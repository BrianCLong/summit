name: 🧠 Self-Healing & Learning Loop

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

  workflow_run:
    workflows: ["🤖 Master Orchestrator - Autonomous Cycle"]
    types: [completed]

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config --global user.name "Summit Learning Bot"
          git config --global user.email "learning@summit.ai"

      - name: Run SAFE Autodidactic Loop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          chmod +x scripts/orchestrator/autodidactic_feedback_engine.mjs
          node scripts/orchestrator/autodidactic_feedback_engine.mjs || true

      - name: Run Meta-Librarian
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          chmod +x scripts/orchestrator/meta_librarian.mjs
          node scripts/orchestrator/meta_librarian.mjs || true

      - name: Run Entropy Hunter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          chmod +x scripts/orchestrator/entropy_hunter.mjs
          node scripts/orchestrator/entropy_hunter.mjs || true

      - name: Run AI Tech Lead
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          chmod +x scripts/orchestrator/ai_tech_lead.mjs
          node scripts/orchestrator/ai_tech_lead.mjs || true

      - name: Commit Learning Updates
        run: |
          git add .learnings/ artifacts/ docs/governance/decisions/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Update learnings and governance docs [skip ci]

🧠 Auto-generated by Self-Healing Loop
- SAFE autodidactic feedback
- Meta-librarian compression
- Entropy analysis
- AI tech lead insights

Co-Authored-By: Summit Learning Bot <learning@summit.ai>" || true
            git push || true
          fi

      - name: Upload Learning Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: learning-artifacts-${{ github.run_number }}
          path: |
            .learnings/
            artifacts/
