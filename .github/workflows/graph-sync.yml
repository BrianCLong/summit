name: graph-sync
on:
  pull_request:
    types: [opened, synchronize, reopened]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # v4
      - uses: actions/setup-node@v4
        with:
          compose-file: .github/compose/pg_neo.yml
      - name: Validate Graph↔PG sync
        run: node scripts/ci/validate_graph_pg_sync.mjs
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graph-sync-evidence
          path: artifacts/graph-sync/*.json
