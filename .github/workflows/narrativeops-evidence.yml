name: narrativeops-evidence

on:
  pull_request:
    paths:
      - '.github/scripts/verify-narrativeops-evidence.mjs'
      - '.github/policies/narrativeops.policy.json'
      - 'src/graphrag/narrativeops/**'
      - 'tests/graphrag/narrativeops/**'
      - '.github/workflows/narrativeops-evidence.yml'
  push:
    branches: [main]
    paths:
      - '.github/scripts/verify-narrativeops-evidence.mjs'
      - '.github/policies/narrativeops.policy.json'
      - 'src/graphrag/narrativeops/**'
      - 'tests/graphrag/narrativeops/**'
      - '.github/workflows/narrativeops-evidence.yml'

jobs:
  narrativeops-evidence:
    name: summit/narrativeops-evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node .github/scripts/verify-narrativeops-evidence.mjs tests/graphrag/narrativeops/evidence.golden/seeded_minimal
      - run: node tests/graphrag/narrativeops/verify-evidence.mjs
