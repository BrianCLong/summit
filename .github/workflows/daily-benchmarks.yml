name: "Daily AI Benchmarks"

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run GraphRAG Benchmark
        run: npx tsx scripts/benchmarks/run_graphrag.ts

      - name: Commit Benchmark Artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/benchmarks/graphrag/*.json
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "chore: update daily benchmark artifacts"
            git push
          else
            echo "No benchmark artifacts changed."
          fi
