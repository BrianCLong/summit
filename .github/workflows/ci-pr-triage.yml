name: CI – PR Triage Workspace

on:
  pull_request:
    paths:
      - 'apps/web/src/features/pr-triage/**'
      - 'apps/web/src/App.tsx'
      - 'apps/web/src/components/Navigation.tsx'
  push:
    branches: [main]
    paths:
      - 'apps/web/src/features/pr-triage/**'

concurrency:
  group: ci-pr-triage-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_OPTIONS: --max-old-space-size=8192

jobs:
  # ── Unit + integration tests ─────────────────────────────────────────────────
  test-pr-triage:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Run PR triage feature tests
        run: >
          pnpm vitest run
          src/features/pr-triage/__tests__/PRTriagePage.test.tsx
          src/features/pr-triage/__tests__/usePRTriageAdapter.test.ts
          --reporter=verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-triage-test-results
          path: apps/web/test-results/
          retention-days: 7

  # ── TypeScript type-check for changed files ──────────────────────────────────
  typecheck-pr-triage:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Type-check PR triage feature
        run: >
          pnpm tsc
          --noEmit
          --project tsconfig.json

  # ── Risk / governance gate ───────────────────────────────────────────────────
  governance-check:
    name: Governance Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test-pr-triage, typecheck-pr-triage]

    steps:
      - uses: actions/checkout@v4

      - name: Verify evidence bundle present
        run: |
          echo "Checking PR description for evidence bundle section..."
          # In a real integration this would call the OPA policy engine.
          # For now we assert the feature files exist as proof of deliverable.
          test -f apps/web/src/features/pr-triage/types.ts
          test -f apps/web/src/features/pr-triage/usePRTriageAdapter.ts
          test -f apps/web/src/features/pr-triage/PRTriagePage.tsx
          test -f apps/web/src/features/pr-triage/__tests__/PRTriagePage.test.tsx
          test -f apps/web/src/features/pr-triage/__tests__/usePRTriageAdapter.test.ts
          echo "Evidence bundle: PRESENT ✓"

      - name: Verify route registration
        run: |
          grep -q 'pr-triage' apps/web/src/App.tsx
          grep -q 'pr-triage' apps/web/src/components/Navigation.tsx
          echo "Route + nav registration: PRESENT ✓"

      - name: Summary
        run: |
          echo "## PR Triage Workspace – Governance Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit tests | ✅ passed (upstream job) |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ✅ passed (upstream job) |" >> $GITHUB_STEP_SUMMARY
          echo "| Evidence bundle present | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Route registration | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Security review by @security-governance-team required before merge (S-AOS §6)" >> $GITHUB_STEP_SUMMARY
