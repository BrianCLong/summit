name: Go CI

on:
  push:
    branches: [main, develop]
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
  pull_request:
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'

jobs:
  go-ci:
    name: Go CI — all modules
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go (stable)
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: gofmt — all modules
        run: |
          bad=""
          while IFS= read -r mod_dir; do
            files=$(gofmt -l "$mod_dir")
            [ -n "$files" ] && bad="${bad}${files}"$'\n'
          done < <(find . -name go.mod -not -path './.git/*' -exec dirname {} \; | sort)
          if [ -n "$bad" ]; then
            printf 'Unformatted files:\n%s\n' "$bad"
            exit 1
          fi

      - name: vet + build + test — all modules
        run: |
          set -e
          find . -name go.mod -not -path './.git/*' -exec dirname {} \; | sort | while IFS= read -r mod_dir; do
            echo "::group::$mod_dir"
            (cd "$mod_dir" && go vet ./... && go build ./... && go test -race -count=1 -timeout 5m ./...)
            echo "::endgroup::"
          done

      - name: govulncheck — all modules
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          find . -name go.mod -not -path './.git/*' -exec dirname {} \; | sort | while IFS= read -r mod_dir; do
            echo "::group::govulncheck $mod_dir"
            (cd "$mod_dir" && govulncheck ./...)
            echo "::endgroup::"
          done
