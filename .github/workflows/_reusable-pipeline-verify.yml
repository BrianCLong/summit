name: Reusable Pipeline Verify

on:
  workflow_call:

jobs:
  pipeline-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: ppnpm install --frozen-lockfile

      - name: Run test suite
        run: pnpm test

      - name: Validate evidence files
        run: |
          test -f evidence/pipelines/report.json
          test -f evidence/pipelines/metrics.json
          test -f evidence/pipelines/stamp.json
          test -f evidence/index.json

      - name: Pipeline policy note
        run: echo "pipeline-verify placeholder for schema/cycle/policy gates"
