name: benchmark-interactive

on:
  pull_request:
    paths:
      - 'benchmarks/interactive/**'
      - 'agents/benchmark/**'
      - '.github/workflows/benchmark-interactive.yml'
  push:
    branches: [main]

jobs:
  interactive-benchmarks:
    uses: ./.github/workflows/_reusable-ci.yml
    with:
      run-tests: true
      workspace-filter: ""
