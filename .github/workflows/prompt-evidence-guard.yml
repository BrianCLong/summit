name: Prompt/Evidence Guard

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'prompts/**'
      - 'evidence/**'

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Validate evidence ID consistency
        run: node scripts/verify_evidence_id_consistency.mjs

      - name: Scan deterministic artifacts
        run: node scripts/scan_timestamp_keys.mjs
