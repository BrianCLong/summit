name: military-use-risk-check

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  military-use-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pyyaml
      - name: Run scoring pipeline
        run: python pipelines/military_use_scoring.py
      - name: Governance fail-fast rule
        run: |
          python3 -c "import json, sys; d=json.load(open('reports/military_use/report.json')); sys.exit(1 if d.get('military_use_risk_score', 0) > 0.65 and d.get('mitigation_block') is None else 0)"
