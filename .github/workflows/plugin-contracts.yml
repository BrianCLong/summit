name: DisinfoShield Plugin Contracts

on:
  pull_request:
    paths:
      - 'src/graphrag/cis/**'
      - '.github/scripts/plugin_contracts_verify.ts'
      - '.github/workflows/plugin-contracts.yml'
  push:
    branches: [ main ]
    paths:
      - 'src/graphrag/cis/**'
      - '.github/scripts/plugin_contracts_verify.ts'
      - '.github/workflows/plugin-contracts.yml'

concurrency:
  group: cis-plugins-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-contracts:
    name: Verify Plugin Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Contract Verification
        run: npx tsx .github/scripts/plugin_contracts_verify.ts
