name: SLO Smoke Gate

# CI Quality Gate: Validates Service Level Objectives before merge
# Addresses: Issue #1236 - CI: SLO Smoke (k6) as Quality Gate
# Authority: Platform Engineering
#
# SLO Thresholds:
# - p95 Latency < 1.5s
# - Error Rate < 1%
# - 95% of checks must pass

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/ISSUE_TEMPLATE/**"

  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"

  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL for SLO tests (default: localhost)"
        required: false
        default: ""

  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  NODE_VERSION: "20"

jobs:
  slo-smoke-gate:
    name: SLO Smoke Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # v4.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          name: slo-gate-results-${{ github.run_id }}
          path: |
            slo-results.json
            slo-summary.json
            slo-metrics.json
          retention-days: 30
          if-no-files-found: warn

      - name: Teardown stack
        if: always()
        run: |
          docker compose down -v --remove-orphans 2>/dev/null || make down || true
