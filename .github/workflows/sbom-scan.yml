name: SBOM & Vulnerability Scanning

# CI Quality Gate: SBOM generation and vulnerability scanning
# Addresses: Issue #1222 - CI: SBOM + Vulnerability Gate
# Authority: Platform Engineering
#
# Requirements:
# - CI fails on Sev >= High
# - SBOM artifacts uploaded
# - Allowlist support via security/grype-allowlist.yaml

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]
  merge_group:

  workflow_dispatch:

  schedule:
    - cron: "0 4 * * *" # Daily at 4 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  id-token: write
  attestations: write

jobs:
  sbom:
    name: SBOM & Vulnerability Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@62ad5284b8ced813296287a0b63906cb364b73ee # v0
        with:
          format: cyclonedx-json
          output-file: sbom.json

      - name: Install Grype
        uses: anchore/scan-action/download-grype@3343887d815d7b07465f6fdcd395bd66508d486a # v3

      - name: Scan SBOM with Grype (JSON report)
        run: |
          set -euo pipefail
          grype sbom:sbom.json -o json > vuln_report.raw.json

      - name: Enforce license and CVE policy gate
        run: |
          set -euo pipefail
          python3 scripts/supply_chain/gate.py \
            --sbom sbom.json \
            --grype vuln_report.raw.json \
            --license-allowlist security/supply-chain/license-allowlist.txt \
            --license-overrides security/supply-chain/license-overrides.txt \
            --cve-allowlist security/supply-chain/cve-allowlist.txt \
            --severity-threshold HIGH

      - name: Enforce CVE budget gate (max_high=0)
        run: |
          set -euo pipefail
          node scripts/ci/enforce-cve-budget.mjs \
            --grype-json vuln_report.raw.json \
            --waivers-file .github/security-waivers.yml \
            --max-high 0 \
            --max-critical 0 \
            --out vuln_report.json

      - name: Install OPA
        run: |
          set -euo pipefail
          curl -sSfL -o opa https://openpolicyagent.org/downloads/v0.70.0/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa

      - name: OPA metadata gate (license + residency + PII annotations)
        run: |
          set -euo pipefail
          opa eval --format=json \
            --data policy/opa/supply_chain_metadata.rego \
            --input security/supply-chain/metadata.json \
            'data.policy.supply_chain_metadata.allow' | tee opa_supply_chain_eval.json
          jq -e '.result[0].expressions[0].value == true' opa_supply_chain_eval.json >/dev/null

      - name: Install Cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
        with:
          cosign-release: "v3.0.5"

      - name: Sign and verify SBOM
        run: |
          set -euo pipefail
          COSIGN_PASSWORD="" cosign generate-key-pair
          COSIGN_PASSWORD="" cosign sign-blob --key cosign.key --output-signature sbom.json.sig sbom.json
          COSIGN_PASSWORD="" cosign verify-blob --key cosign.pub --signature sbom.json.sig sbom.json

      - name: Generate provenance attestation stub
        run: |
          set -euo pipefail
          SBOM_SHA=$(sha256sum sbom.json | awk '{print $1}')
          cat > attestation.json <<EOF
          {
            "_type": "https://in-toto.io/Statement/v1",
            "predicateType": "https://slsa.dev/provenance/v1",
            "subject": [
              {
                "name": "sbom.json",
                "digest": {
                  "sha256": "${SBOM_SHA}"
                }
              }
            ],
            "predicate": {
              "builder": {
                "id": "https://github.com/${{ github.repository }}/.github/workflows/sbom-scan.yml@${{ github.ref }}"
              },
              "buildType": "https://github.com/Attestations/GitHubActionsWorkflow@v1",
              "invocation": {
                "configSource": {
                  "uri": "git+https://github.com/${{ github.repository }}",
                  "digest": {
                    "sha1": "${{ github.sha }}"
                  }
                }
              },
              "metadata": {
                "buildInvocationId": "${{ github.run_id }}"
              }
            }
          }
          EOF

      - name: Attest SBOM
        uses: actions/attest-sbom@v3
        with:
          subject-path: ${{ github.workspace }}
          sbom-path: sbom.json

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-scan-results
          path: |
            sbom.json
            sbom.json.sig
            cosign.pub
            attestation.json
            vuln_report.raw.json
            vuln_report.json
            opa_supply_chain_eval.json
          retention-days: 90
# Linked: https://linear.app/summi7/issue/SUM-10197
