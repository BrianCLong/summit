name: PR Artifact Preserver

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  archive-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Archive Script
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
        run: npx -y tsx scripts/pr-artifact-archive.ts

      - name: Push to repository
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore(pr-archive): archive closed PR #${{ github.event.pull_request.number }}"
          file_pattern: "artifacts/pr-artifacts.json repoos/artifacts/*"
          branch: ${{ github.event.pull_request.base.ref }}
