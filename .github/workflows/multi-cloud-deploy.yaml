# Multi-Cloud Deployment Pipeline
# Deploys to AWS EKS, Azure AKS, and GCP GKE

name: Multi-Cloud Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'packages/**'
      - 'infrastructure/kubernetes/**'
      - 'infrastructure/helm/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      cloud_provider:
        description: 'Target cloud provider (all for multi-cloud)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - aws
          - azure
          - gcp

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_VERSION: v3.13.0
  KUBECTL_VERSION: v1.28.0

jobs:
  # Build and test
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test

      - name: Run linting
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Snyk security scan
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          args: --severity-threshold=high

  # Deploy to AWS EKS
  deploy-aws:
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: |
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.cloud_provider == 'all' || github.event.inputs.cloud_provider == 'aws')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}-aws

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name summit-${{ github.event.inputs.environment || 'staging' }}-eks \
            --region us-east-1

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install summit-api \
            ./infrastructure/helm/summit-api \
            --namespace summit \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --set cloudProvider.aws.serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ secrets.AWS_IAM_ROLE_ARN }} \
            --values ./infrastructure/helm/summit-api/values.yaml \
            --values ./infrastructure/helm/summit-api/values-aws.yaml \
            --wait \
            --timeout 10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/summit-api -n summit --timeout=5m

  # Deploy to Azure AKS
  deploy-azure:
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: |
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.cloud_provider == 'all' || github.event.inputs.cloud_provider == 'azure')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}-azure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: summit-${{ github.event.inputs.environment || 'staging' }}-rg
          cluster-name: summit-${{ github.event.inputs.environment || 'staging' }}-aks

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install summit-api \
            ./infrastructure/helm/summit-api \
            --namespace summit \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --values ./infrastructure/helm/summit-api/values.yaml \
            --values ./infrastructure/helm/summit-api/values-azure.yaml \
            --wait \
            --timeout 10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/summit-api -n summit --timeout=5m

  # Deploy to GCP GKE
  deploy-gcp:
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: |
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.cloud_provider == 'all' || github.event.inputs.cloud_provider == 'gcp')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}-gcp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials \
            summit-${{ github.event.inputs.environment || 'staging' }}-gke \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install summit-api \
            ./infrastructure/helm/summit-api \
            --namespace summit \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --values ./infrastructure/helm/summit-api/values.yaml \
            --values ./infrastructure/helm/summit-api/values-gcp.yaml \
            --wait \
            --timeout 10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/summit-api -n summit --timeout=5m

  # Post-deployment validation
  validate:
    runs-on: ubuntu-latest
    needs: [deploy-aws, deploy-azure, deploy-gcp]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration tests
        run: |
          echo "Running integration tests against deployed services..."
          # Add integration test commands here

      - name: Notify deployment status
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Multi-cloud deployment completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Multi-Cloud Deployment Status*\n• Environment: ${{ github.event.inputs.environment || 'staging' }}\n• Commit: ${{ github.sha }}\n• AWS: ${{ needs.deploy-aws.result }}\n• Azure: ${{ needs.deploy-azure.result }}\n• GCP: ${{ needs.deploy-gcp.result }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
