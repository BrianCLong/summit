name: evidence-validate
on:
  pull_request:
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev libpixman-1-dev
      - run: pnpm install --no-frozen-lockfile
      - name: Validate Fixtures (Pass)
        run: node tools/evidence/validate.mjs
        env:
          EVIDENCE_OUT_DIR: evidence/fixtures/pass
      - name: Validate Fixtures (Fail)
        run: |
          if node tools/evidence/validate.mjs; then
            echo "Expected failure but passed"
            exit 1
          else
            echo "Failed as expected"
          fi
        env:
          EVIDENCE_OUT_DIR: evidence/fixtures/fail
