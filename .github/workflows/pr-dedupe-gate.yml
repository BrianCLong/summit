name: PR Dedupe Gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  dedupe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install js-yaml

      - name: Classify concern
        id: classify
        run: node scripts/classify_concern.mjs
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}

      - name: Detect existing canonical PR
        id: detect
        run: node scripts/find_existing_concern_pr.mjs
        env:
          PR_CONCERN: ${{ steps.classify.outputs.concern }}

      - name: Block duplicate merge candidate
        id: enforce
        run: node scripts/enforce_one_concern_one_pr.mjs
        env:
          PR_CONCERN: ${{ steps.classify.outputs.concern }}
          HAS_EXISTING_PR: ${{ steps.detect.outputs.has_existing_pr }}
          CANONICAL_BRANCH: ${{ steps.detect.outputs.canonical_branch }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        continue-on-error: true

      - name: Upload Artifact
        if: steps.enforce.outputs.duplicate == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: superseded-pr-evidence-${{ github.event.pull_request.number }}
          path: .artifacts/pr/pr-${{ github.event.pull_request.number }}.json

      - name: Close PR
        if: steps.enforce.outputs.duplicate == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CANONICAL_BRANCH: ${{ steps.detect.outputs.canonical_branch }}
        run: |
          # Close the PR and comment
          gh pr close ${PR_NUMBER} -c "🛑 DUPLICATE CONCERN DETECTED. An open PR or canonical branch (${CANONICAL_BRANCH}) already exists for this concern. To prevent PR explosion, this patch has been converted to an Evidence Artifact and closed."
          exit 1
