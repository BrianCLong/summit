name: AI Supply Chain Firewall

on:
  pull_request:
    paths:
      - 'agents/**'
      - 'policies/**'
      - 'package.json'
      - 'requirements.txt'

jobs:
  ai_supply_chain_firewall:
    name: Run AI Supply Chain Firewall Gate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract AI Suggested Dependencies
        # This is a mock step for the prototype. In reality, it would pull from MCP logs or PR analysis.
        id: extract
        run: |
          echo "deps=requests react malicious-pkg-001 requezts" >> $GITHUB_ENV

      - name: Run Firewall Evaluation
        run: |
          # Flagged enforce mode (e.g., passing --mode enforce to block PRs)
          # We run in observe mode for rollout
          python scripts/run_ai_supply_chain_firewall.py --deps ${{ env.deps }} --mode observe --output-dir evidence/ai-supply-chain-firewall

      - name: Upload Evidence Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-supply-chain-firewall-evidence
          path: evidence/ai-supply-chain-firewall/
          retention-days: 30

      - name: Check Performance Budget
        run: |
          python scripts/profile_ai_supply_chain_firewall.py
          cat evidence/ai-supply-chain-firewall/perf.json

      - name: Drift Monitoring
        run: |
          python scripts/monitoring/ai-supply-chain-drift.py
          cat evidence/ai-supply-chain-firewall/drift_report.json
