name: MemAlign CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/evals/memalign/**'
      - 'src/cli/judge_align.ts'
  pull_request:
    paths:
      - 'src/evals/memalign/**'
      - 'src/cli/judge_align.ts'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install -g pnpm && pnpm install

      - name: Run Unit Tests
        run: |
          TEST_FILES=(
            tests/memalign/test_stores.ts
            tests/memalign/test_ingest.ts
            tests/memalign/test_judge_wrapper.ts
          )
          FOUND=0
          for f in "${TEST_FILES[@]}"; do
            if [[ -f "$f" ]]; then
              FOUND=1
              npx tsx "$f"
            else
              echo "Skipping missing $f"
            fi
          done
          if [[ "$FOUND" -eq 0 ]]; then
            echo "No memalign unit test files found; skipping unit test step."
          fi

      - name: Run Benchmark
        run: npx tsx scripts/bench/memalign_bench.ts

      - name: Verify CLI
        run: npx tsx src/cli/judge_align.ts --help
