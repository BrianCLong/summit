name: Media List Drift Detection

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly
  workflow_dispatch:

jobs:
  media_list_validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run media list generator (mock)
        run: |
          mkdir -p reports/media_ai_lists/test_slug/
          # In a real workflow, this would run the full pipeline to generate a new report
          echo '{}' > reports/media_ai_lists/test_slug/new_report.json
      - name: Detect Drift
        run: |
          python scripts/monitoring/media-list-drift.py \
            --current reports/media_ai_lists/test_slug/report.json \
            --new reports/media_ai_lists/test_slug/new_report.json \
            --output reports/media_ai_lists/test_slug/trend.json
