name: INFOWAR Verify

on:
  pull_request:
    paths:
      - 'src/graphrag/evidence/**'
      - 'src/connectors/**'
      - 'src/graphrag/narratives/**'
      - 'src/graphrag/ontology/**'
      - 'tests/graphrag/**'
      - 'tests/connectors/**'
      - '.github/scripts/validate-evidence.ts'

jobs:
  verify-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Evidence Tests
        run: npx vitest run tests/graphrag/evidence/evidence.spec.ts
      - name: Validate Fixtures
        run: |
          # Create a dummy fixture for validation
          mkdir -p tests/fixtures/evidence
          echo '{"evidence_id": "EVD-TEST-001", "summary": "Test", "findings": ["A"], "confidence": 0.9}' > tests/fixtures/evidence/report.json
          npx tsx .github/scripts/validate-evidence.ts tests/fixtures/evidence/report.json report

      - name: Run Never-Log Scan
        run: npx tsx .github/scripts/never-log-scan.ts src/graphrag

      - name: Verify Dependency Delta
        run: |
          if [ ! -f docs/governance/dependency-delta.md ]; then
            echo "Error: docs/governance/dependency-delta.md is missing"
            exit 1
          fi
