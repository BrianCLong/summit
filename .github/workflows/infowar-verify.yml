name: INFOWAR Verification

on:
  pull_request:
    paths:
      - 'src/graphrag/**'
      - 'src/api/rest/infowar/**'
      - 'docs/operations/infowar-*'
      - 'docs/architecture/infowar-*'
      - 'docs/security/infowar-*'
      - '.github/scripts/validate-evidence.ts'
      - '.github/scripts/never-log-scan.ts'

jobs:
  verify-infowar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Evidence Schema Gate
        run: |
          npx tsx .github/scripts/validate-evidence.ts

      - name: Never-log Scan
        run: |
          npx tsx .github/scripts/never-log-scan.ts src/graphrag docs

      - name: Run INFOWAR Tests
        run: |
          NODE_OPTIONS='--experimental-vm-modules' npx jest tests/graphrag/evidence/evidence.spec.ts tests/graphrag/narratives/graph.spec.ts
