name: client-ci

on:
  pull_request:
    paths:
      - "client/**"
      - "apps/web/**"

concurrency:
  group: client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm test:client
