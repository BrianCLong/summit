name: Infrastructure Checks
on:
  pull_request:
    branches: [main]

jobs:
  helm-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Install helm if needed, or use pre-installed

      - name: Lint Helm Charts
        run: |
          if [ -d "helm" ] && [ -f "helm/Chart.yaml" ]; then
            helm lint helm/
          else
            echo "No helm charts found to lint."
          fi
