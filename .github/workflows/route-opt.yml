name: route-opt

on:
  pull_request:
    paths:
      - 'agents/route_opt/**'
      - 'scripts/ci/check_route_schema.py'
      - 'scripts/ci/check_determinism_hash.py'
      - 'scripts/profile_route_opt.py'
      - 'scripts/monitoring/route-opt-drift.py'
      - '.github/workflows/route-opt.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  check-route-schema:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema
      - name: Generate report artifact
        run: python scripts/ci/check_determinism_hash.py
      - name: check-route-schema
        run: python scripts/ci/check_route_schema.py

  check-determinism-hash:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema
      - name: check-determinism-hash
        run: python scripts/ci/check_determinism_hash.py

  profile-route-opt:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema
      - name: profile-route-opt
        run: python scripts/profile_route_opt.py

  route-opt-drift:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema
      - name: route-opt-drift
        run: |
          python scripts/profile_route_opt.py
          python scripts/monitoring/route-opt-drift.py
