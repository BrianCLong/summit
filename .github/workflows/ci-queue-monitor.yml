name: CI Queue Monitor & Resilience

# Monitors CI queue health and prevents saturation incidents
# Implements lessons learned from 2026-02-28 queue saturation event (8,768 queued runs)

on:
  schedule:
    # Run every 30 minutes during active hours
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      emergency_mode:
        description: 'Emergency analysis and mitigation'
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-queue-monitor
  cancel-in-progress: false # Allow completion for trend data

permissions:
  contents: read
  actions: write # For canceling duplicate runs
  issues: write # For creating alerts

jobs:
  monitor:
    name: Queue Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check Queue Saturation
        id: queue
        run: |
          echo "📊 Analyzing CI queue health..."

          # Get queue metrics
          QUEUED=$(gh run list --repo ${{ github.repository }} --status queued --limit 1000 --json databaseId | jq '. | length')
          PENDING=$(gh run list --repo ${{ github.repository }} --status pending --limit 1000 --json databaseId | jq '. | length')
          IN_PROGRESS=$(gh run list --repo ${{ github.repository }} --status in_progress --limit 100 --json databaseId | jq '. | length')

          TOTAL=$((QUEUED + PENDING + IN_PROGRESS))

          echo "queued=$QUEUED" >> $GITHUB_OUTPUT
          echo "pending=$PENDING" >> $GITHUB_OUTPUT
          echo "in_progress=$IN_PROGRESS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          # Determine status
          if [ $TOTAL -gt 1000 ]; then
            echo "status=🔴 CRITICAL" >> $GITHUB_OUTPUT
            echo "severity=critical" >> $GITHUB_OUTPUT
          elif [ $TOTAL -gt 500 ]; then
            echo "status=🟡 WARNING" >> $GITHUB_OUTPUT
            echo "severity=warning" >> $GITHUB_OUTPUT
          else
            echo "status=🟢 HEALTHY" >> $GITHUB_OUTPUT
            echo "severity=healthy" >> $GITHUB_OUTPUT
          fi

          echo "## 📊 CI Queue Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count | Limit |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Queued | $QUEUED | 500 |" >> $GITHUB_STEP_SUMMARY
          echo "| Pending | $PENDING | 300 |" >> $GITHUB_STEP_SUMMARY
          echo "| In Progress | $IN_PROGRESS | 50 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$TOTAL** | **1000** |" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Detect Duplicate Run Storms
        id: duplicates
        run: |
          echo "🔍 Detecting duplicate run storms..."

          # Get run distribution by branch
          gh run list --repo ${{ github.repository }} \
            --status queued --status pending \
            --limit 1000 --json headBranch,databaseId \
            > /tmp/runs.json

          # Find branches with excessive runs (>10 indicates likely storm)
          STORM_BRANCHES=$(cat /tmp/runs.json | jq -r '
            group_by(.headBranch) |
            map({branch: .[0].headBranch, count: length}) |
            map(select(.count > 10)) |
            sort_by(-.count) |
            .[]' | jq -s '.')

          STORM_COUNT=$(echo "$STORM_BRANCHES" | jq '. | length')

          echo "storm_count=$STORM_COUNT" >> $GITHUB_OUTPUT

          if [ "$STORM_COUNT" -gt 0 ]; then
            echo "storm_detected=true" >> $GITHUB_OUTPUT
            echo "$STORM_BRANCHES" > /tmp/storm_branches.json

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ⚠️ Duplicate Run Storms Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Branch | Run Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-----------|" >> $GITHUB_STEP_SUMMARY
            echo "$STORM_BRANCHES" | jq -r '.[] | "| \(.branch) | \(.count) |"' >> $GITHUB_STEP_SUMMARY
          else
            echo "storm_detected=false" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ✅ No Duplicate Storms" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Auto-Mitigate Critical Saturation
        if: steps.queue.outputs.severity == 'critical' && steps.duplicates.outputs.storm_detected == 'true'
        run: |
          echo "🚨 CRITICAL: Auto-mitigation initiated"

          # Cancel duplicate runs on storm branches (keep only latest 3 per branch)
          cat /tmp/storm_branches.json | jq -r '.[].branch' | while read branch; do
            echo "Mitigating storm on branch: $branch"

            # Get all runs for this branch, sorted newest first
            gh run list --repo ${{ github.repository }} \
              --branch "$branch" \
              --status queued --status pending \
              --limit 100 --json databaseId \
              | jq -r '.[3:][].databaseId' \
              | while read run_id; do
                echo "  Canceling duplicate run: $run_id"
                gh run cancel --repo ${{ github.repository }} $run_id || true
                sleep 0.5
              done

            sleep 1
          done

          echo "✅ Auto-mitigation complete"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔧 Auto-Mitigation Applied" >> $GITHUB_STEP_SUMMARY
          echo "Canceled duplicate runs on storm branches (keeping latest 3 per branch)" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check Stale PR Branches
        id: stale
        run: |
          echo "🕰️ Checking for stale PR branches..."

          # Get PRs with no activity in 90 days
          STALE_PRS=$(gh pr list --repo ${{ github.repository }} \
            --state open --limit 1000 \
            --json number,updatedAt,headRefName \
            | jq '[.[] | select(
                (now - (.updatedAt | fromdateiso8601)) > (90 * 86400)
              )] | length')

          echo "stale_count=$STALE_PRS" >> $GITHUB_OUTPUT

          if [ "$STALE_PRS" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 🕰️ Stale PRs Detected" >> $GITHUB_STEP_SUMMARY
            echo "**Count**: $STALE_PRS PRs with no activity in 90+ days" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Recommendation**: Consider auto-closing stale PRs to reduce CI load" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Alert Issue
        if: steps.queue.outputs.severity == 'critical' || steps.queue.outputs.severity == 'warning'
        uses: actions/github-script@v7
        with:
          script: |
            const severity = '${{ steps.queue.outputs.severity }}';
            const queued = '${{ steps.queue.outputs.queued }}';
            const pending = '${{ steps.queue.outputs.pending }}';
            const total = '${{ steps.queue.outputs.total }}';
            const stormCount = '${{ steps.duplicates.outputs.storm_count }}';
            const staleCount = '${{ steps.stale.outputs.stale_count }}';

            const emoji = severity === 'critical' ? '🔴' : '🟡';
            const label = severity === 'critical' ? 'critical' : 'warning';

            const issueBody = `# ${emoji} CI Queue ${severity.toUpperCase()} Alert

            **Timestamp**: ${new Date().toISOString()}
            **Severity**: ${severity}

            ## 📊 Queue Metrics

            - **Queued Runs**: ${queued}
            - **Pending Runs**: ${pending}
            - **Total Active**: ${total}
            - **Duplicate Storms**: ${stormCount}
            - **Stale PRs**: ${staleCount}

            ## 🔍 Analysis

            ${parseInt(stormCount) > 0 ? `⚠️ Detected ${stormCount} duplicate run storms. Auto-mitigation ${severity === 'critical' ? 'was applied' : 'recommended'}.` : ''}
            ${parseInt(staleCount) > 10 ? `⚠️ Found ${staleCount} stale PRs (90+ days). Consider cleanup.` : ''}

            ## 🔧 Recommended Actions

            ${severity === 'critical' ? `
            - ✅ Auto-mitigation already applied (duplicate runs canceled)
            - Review storm branches and consider closing problematic PRs
            - Monitor queue reduction over next 30 minutes
            ` : `
            - Monitor queue growth
            - Review recent PR activity for unusual patterns
            - Consider enabling concurrency limits on high-frequency workflows
            `}

            ## 📈 Context

            This alert implements lessons learned from the 2026-02-28 queue saturation incident where 8,768 queued runs caused system-wide impact.

            ---
            *Auto-generated by CI Queue Monitor*
            `;

            // Check for recent alert
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['ci-queue', label],
              state: 'open',
              per_page: 5
            });

            const twoHoursAgo = new Date(Date.now() - 2 * 60 * 60 * 1000);
            const recentAlert = existingIssues.data.find(issue =>
              new Date(issue.created_at) > twoHoursAgo
            );

            if (!recentAlert) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${emoji} CI Queue ${severity.toUpperCase()}: ${total} active runs`,
                body: issueBody,
                labels: ['ci-queue', label, 'ci-resilience']
              });
              console.log('Created alert issue');
            } else {
              console.log('Recent alert exists, skipping duplicate');
            }

      - name: Generate Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎯 Health Score" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status**: ${{ steps.queue.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Monitoring interval: 30 minutes*" >> $GITHUB_STEP_SUMMARY
