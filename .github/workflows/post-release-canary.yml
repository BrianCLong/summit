name: Post-Release Canary

on:
  schedule:
    - cron: "0 * * * *" # Run hourly
  workflow_dispatch:

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4 # v6
        with:
          node-version: "18"
          cache: pnpm

      - name: Install dependencies (script only)
        run: pnpm install

      - name: Run Canary Check
        run: node scripts/canary-check.cjs
