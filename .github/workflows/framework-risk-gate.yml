name: Framework Governance Risk Gate

on:
  pull_request:
    paths:
      - 'package.json'
      - '**/package.json'
      - '.github/workflows/framework-risk-gate.yml'

jobs:
  evaluate-framework-risk:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Framework Risk Evaluation
        run: |
          cd cmd/frameworkrisk
          go run main.go
