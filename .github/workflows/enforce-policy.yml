name: Enforce Policy

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

jobs:
  enforce-policy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check Dependencies Delta
        run: |
          if [ -f "tools/ci/check_dependency_delta.py" ]; then
             python3 tools/ci/check_dependency_delta.py
          else
             echo "Dependency delta check script not found, skipping."
          fi

      - name: Validate Evidence
        run: |
          if [ -f "ci/verify_evidence.py" ]; then
            python3 ci/verify_evidence.py
          else
             echo "Evidence verification script not found, skipping."
          fi
