name: Hybrid Search Nightly Benchmark

on:
  schedule:
    - cron: '0 2 * * *' # Run nightly at 2am
  pull_request:
    branches:
      - main
    paths:
      - 'summit/memory/**'
      - 'tests/summit/memory/**'

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || echo "No requirements.txt, falling back to basic deps"
        pip install qdrant-client neo4j sentence-transformers pytest

    - name: Run unit tests
      env:
        PYTHONPATH: .
      run: |
        python -m pytest tests/summit/memory/test_ambient_memory.py -v

    - name: Run nightly benchmarks
      env:
        PYTHONPATH: .
      run: |
        python tests/summit/memory/benchmark.py

    - name: Upload benchmark artifacts
      uses: actions/upload-artifact@v3
      with:
        name: hybrid-search-benchmark-report
        path: benchmark_report.json
        retention-days: 14
