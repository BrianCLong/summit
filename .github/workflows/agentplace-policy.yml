name: AgentPlace Policy Gates

on:
  pull_request:
    paths:
      - 'modules/agentplace/**'
      - 'agents/manifests/**'
  push:
    branches:
      - main
    paths:
      - 'modules/agentplace/**'
      - 'agents/manifests/**'

jobs:
  agentplace-policy-check:
    runs-on: ubuntu-latest
    if: env.SUMMIT_AGENTPLACE_ENABLED == 'true'
    env:
      SUMMIT_AGENTPLACE_ENABLED: ${{ vars.SUMMIT_AGENTPLACE_ENABLED || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install PyYAML jsonschema
      - name: Run Policy Check
        run: |
          # Find all manifests and evaluate them
          find agents/manifests -name "*.json" -exec python3 modules/agentplace/evaluator.py --manifest {} \;

  agentplace-scope-check:
    runs-on: ubuntu-latest
    if: env.SUMMIT_AGENTPLACE_ENABLED == 'true'
    env:
      SUMMIT_AGENTPLACE_ENABLED: ${{ vars.SUMMIT_AGENTPLACE_ENABLED || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install PyYAML jsonschema
      - name: Run Scope Check
        run: |
          # Specific check for over-permissioned scopes
          # In this simplified version, it's part of the evaluator but we could have a separate script
          find agents/manifests -name "*.json" -exec python3 modules/agentplace/evaluator.py --manifest {} \;

  agentplace-perf-check:
    runs-on: ubuntu-latest
    if: env.SUMMIT_AGENTPLACE_ENABLED == 'true'
    env:
      SUMMIT_AGENTPLACE_ENABLED: ${{ vars.SUMMIT_AGENTPLACE_ENABLED || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install PyYAML jsonschema psutil
      - name: Run Performance Profiling
        run: |
          PYTHONPATH=. python3 scripts/profile_agentplace.py
