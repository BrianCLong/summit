name: AgentPlace Policy Check

on:
  pull_request:
    paths:
      - 'modules/agentplace/**'
      - 'agents/**'

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML jsonschema

      - name: Run Unit Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python -m unittest discover modules/agentplace/tests

      - name: Validate Sample Manifest
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          cat <<JSON > test_manifest.json
          {
            "name": "CI-Test-Agent",
            "version": "1.0.0",
            "owner": "user@localhost",
            "description": "CI Test",
            "capabilities": ["network_access"],
            "permissions": ["read"],
            "data_access": ["public"]
          }
          JSON
          python scripts/agentplace_policy_check.py test_manifest.json

      - name: Run Performance Check
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python scripts/profile_agentplace.py
