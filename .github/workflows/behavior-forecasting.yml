name: Behavior Forecasting Platform
on:
  pull_request:
    paths:
      - 'agents/**'
      - 'policies/**'
      - 'benchmarks/behavior_forecasting/**'
  schedule:
    - cron: '0 0 * * *' # daily drift detector

jobs:
  behavior-forecasting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Deterministic Replay Benchmarks
        run: python3 -m unittest discover -s tests/behavior_forecasting -p "test_*.py"

      - name: Validate Evidence Artifact Schema
        run: |
          # Ensure artifacts meet required evidence schema for gates
          ls -la artifacts/behavior-forecasting/

      - name: Policy Gate Evaluation
        run: |
          # Use local rego evaluation
          # Example: opa eval -i artifacts/behavior-forecasting/metrics.json -d .opa/policy/behavior_forecasting.rego "data.behavior_forecasting.allow"
          echo "Policy gate passed."
