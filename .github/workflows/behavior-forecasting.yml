name: Behavior Forecasting Gate

on:
  pull_request:
    paths:
      - "agents/**"
      - "policies/**"
      - "benchmarks/**"
      - "subsumption/timer-s1-behavior-forecasting/**"

jobs:
  behavior-forecasting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pyyaml
      - name: Run Behavior Forecasting Evaluator
        run: python3 -m unittest discover tests/behavior_forecasting
      - name: Validate Artifacts
        run: |
          # Policy failure evaluation hook would be here
          cat artifacts/behavior-forecasting/report.json
