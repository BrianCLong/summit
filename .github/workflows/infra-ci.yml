name: infra-ci
on:
  pull_request:
    paths:
      - "infra/**"
      - "terraform/**"
      - "docker/**"
      - "docker-compose*.yml"
concurrency:
  group: infra-ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
