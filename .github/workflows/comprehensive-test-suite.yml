name: Comprehensive Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-python:
    name: Python Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.in ]; then
            pip install -r requirements.in
            pip install pytest-asyncio  # Ensure async support for tests
          else
            pip install pytest pytest-cov fastapi httpx opentelemetry-api opentelemetry-sdk opentelemetry-exporter-otlp pytest-asyncio
          fi

      - name: Run Tests with Coverage
        working-directory: summit
        env:
          PYTHONPATH: .
        continue-on-error: true  # Allow failure while we ramp up coverage to 80%
        run: |
          # Enforces 80% coverage as per summit/pytest.ini configuration
          pytest

      - name: Upload Python Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-report
          path: summit/coverage.xml
          retention-days: 14

  test-and-coverage:
    name: Test & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Tests with Coverage
        env:
          NODE_OPTIONS: '--experimental-vm-modules'
          # Ensure color output in CI
          FORCE_COLOR: 3
        run: pnpm -r test --coverage

      - name: Verify Coverage Thresholds
        run: node scripts/coverage-aggregate.js
        env:
          COVERAGE_SCOPE: all

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Setup Environment
        run: |
          cp .env.example .env
          echo "AI_ENABLED=true" >> .env
          echo "JWT_SECRET=test-secret" >> .env

      - name: Start Services
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ai.yml up -d
          # Wait for services to be ready
          sleep 60
          docker compose ps

      - name: Run Playwright Tests
        run: npx playwright test
        env:
          CI: true
          # Point to services running on host via Docker
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:4000
          SUMMIT_API_URL: http://localhost:8000

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
