name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  prepare:
    name: 0️⃣ Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Broaden prerelease detection
          if [[ $TAG =~ -(rc|alpha|beta|next)\. ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "Detected prerelease tag: $TAG"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "Detected GA tag: $TAG"
          fi

  changelog:
    name: 1️⃣ Generate Changelog
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Release Notes
        run: |
          mkdir -p artifacts
          chmod +x scripts/release/generate_changelog.sh
          ./scripts/release/generate_changelog.sh --to ${{ github.ref_name }} --out artifacts/release-notes.md

      - name: Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: artifacts/release-notes.md
          retention-days: 1

  build-server:
    name: 2️⃣ Build Server
    needs: prepare
    uses: ./.github/workflows/_reusable-slsa-build.yml
    with:
      image_name: ${{ github.repository }}/server
      dockerfile: ./server/Dockerfile.prod
      context: ./server
    secrets:
      registry_password: ${{ secrets.GITHUB_TOKEN }}

  build-client:
    name: 3️⃣ Build Client
    needs: prepare
    uses: ./.github/workflows/_reusable-slsa-build.yml
    with:
      image_name: ${{ github.repository }}/client
      dockerfile: ./client/Dockerfile.prod
      context: ./client
    secrets:
      registry_password: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: 4️⃣ Publish Release
    needs: [prepare, changelog, build-server, build-client]
    runs-on: ubuntu-latest
    steps:
      - name: Download Release Notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Summit ${{ github.ref_name }}
          body_path: artifacts/release-notes.md
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.prepare.outputs.is_prerelease == 'false' }}
          files: |
            artifacts/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
