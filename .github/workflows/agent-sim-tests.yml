name: Agent Simulator Gates
on:
  pull_request:
    paths:
      - "policy/opa/**"
      - "services/agent-runtime/**"
      - "tests/agent_simulator/**"
      - ".github/workflows/agent-sim-tests.yml"
jobs:
  simulate:
    runs-on: ubuntu-latest
    services:
      s3:
        image: minio/minio
        ports: ["9000:9000"]
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio123
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/ready || exit 1"
          --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Start runner + OPA
        run: |
          docker compose -f services/agent-runtime/docker-compose.canary.yml up -d
      - name: Install deps
        run: pip install pyjwt requests
      - name: Generate HITL keys
        run: |
          openssl genrsa -out hitl.key 2048
          openssl rsa -in hitl.key -pubout -out hitl.pub
          echo "HITL_PRIVKEY_PEM<<EOF" >> $GITHUB_ENV
          sed "s/$/\\n/" hitl.key | tr -d "\n" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "HITL_PUBKEY_PEM<<EOF" >> $GITHUB_ENV
          sed "s/$/\\n/" hitl.pub | tr -d "\n" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Run simulator
        env:
          RUNNER_URL: http://localhost:8080
          S3_EMULATOR: http://localhost:9000
          HITL_PRIVKEY_PEM: ${{ env.HITL_PRIVKEY_PEM }}
          HITL_PUBKEY_PEM: ${{ env.HITL_PUBKEY_PEM }}
        run: python -u tests/agent_simulator/simulate_approval.py
