name: ci:evidence-verify

on:
  pull_request:
    paths:
      - "evidence/bundles/CLAUDE-OBSIDIAN-*/**"
      - "evidence/schemas/report.schema.json"
      - "evidence/schemas/metrics.schema.json"
      - "evidence/schemas/stamp.schema.json"
      - "evidence/index.json"
      - ".github/scripts/evidence-verify.mjs"
      - "docs/ga/evidence-system.md"
      - ".github/workflows/ci-evidence.yml"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify evidence bundles
        run: node .github/scripts/evidence-verify.mjs
