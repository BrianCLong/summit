name: Self-Flow Evaluation
on:
  push:
    paths:
      - 'src/agents/self_flow/**'
      - 'src/graphrag/trajectory/**'
  pull_request:
    paths:
      - 'src/agents/self_flow/**'
      - 'src/graphrag/trajectory/**'
jobs:
  evaluate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pnpm install --no-frozen-lockfile
      - run: npx tsx .github/scripts/verify_self_flow.ts
