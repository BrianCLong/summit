name: PR Planner

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Analyze PR Complexity
        id: analyze
        run: |
          echo "Analyzing PR #${{ github.event.pull_request.number }}..."
          FILES_CHANGED=${{ github.event.pull_request.changed_files }}

          if [ "$FILES_CHANGED" -lt 5 ]; then
            STRATEGY="fast-track"
            COMPLEXITY="low"
          elif [ "$FILES_CHANGED" -lt 15 ]; then
            STRATEGY="standard-review"
            COMPLEXITY="medium"
          else
            STRATEGY="staged-merge"
            COMPLEXITY="high"
          fi

          echo "strategy=$STRATEGY" >> $GITHUB_OUTPUT
          echo "complexity=$COMPLEXITY" >> $GITHUB_OUTPUT

      - name: Generate Merge Plan
        run: |
          cat > plan.md << EOF
          ## 🎯 PR Planner Analysis

          **PR:** #${{ github.event.pull_request.number }}
          **Complexity:** ${{ steps.analyze.outputs.complexity }}
          **Files Changed:** ${{ github.event.pull_request.changed_files }}
          **Recommended Strategy:** ${{ steps.analyze.outputs.strategy }}

          ### Merge Strategy

          Based on the analysis, this PR should follow the **${{ steps.analyze.outputs.strategy }}** merge strategy.

          ### Checklist

          - [ ] All CI checks passing
          - [ ] No merge conflicts
          - [ ] Code review approved
          - [ ] Documentation updated (if needed)

          ---
          🤖 Generated by PR Planner
          EOF

      - name: Post Plan Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: plan
            });
