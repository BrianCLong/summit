name: data-minimization
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Verify Data Minimization
        run: npx tsx .github/scripts/data_minimization_verify.ts
