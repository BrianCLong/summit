name: ci-regulatory-early-warning
on:
  pull_request:
    paths:
      - "src/agents/regulatory/**"
      - "src/graphrag/regulatory/**"
      - "tests/graphrag/regulatory/**"
      - ".github/scripts/verify-regulatory-ew-evidence.ts"
      - ".github/workflows/ci-regulatory-early-warning.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx tsx .github/scripts/verify-regulatory-ew-evidence.ts
      # We will run tests once we actually have them added
      #- run: pnpm test -- tests/graphrag/regulatory/earlywarning
