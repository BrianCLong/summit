name: PR Quality Gate (Strict)

on:
  pull_request:
    branches: [main]

jobs:
  enforce-classification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check classification
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const labels = pr.labels.map(l => l.name);
            const title = pr.title;
            const classificationLabels = ['patch', 'minor', 'major'];
            const prefixes = ['feat:', 'fix:', 'chore:', 'docs:', 'refactor:'];
            const hasLabel = labels.some(l => classificationLabels.includes(l));
            const hasPrefix = prefixes.some(p => title.startsWith(p));
            if (!hasLabel && !hasPrefix) {
              core.setFailed("PR must have a classification label or conventional commit prefix (feat:, fix:, etc.)");
            }
