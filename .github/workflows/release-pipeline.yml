name: Release Pipeline

# IntelGraph v5.0.0 GA - Release automation triggered by semver tag push.
# Complements release-ga-pipeline.yml (GA lineage/approval) with build/attest/publish.
# This workflow handles: validate -> build -> attest -> release -> helm.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-pipeline-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Validate tag matches package.json version
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract and validate version
        id: extract
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

          # Extract version from tag (strip leading v)
          TAG_VERSION="${TAG#v}"
          echo "version=${TAG_VERSION}" >> $GITHUB_OUTPUT

          # Read version from package.json
          PKG_VERSION=$(jq -r '.version' package.json)
          echo "Tag version: ${TAG_VERSION}"
          echo "package.json version: ${PKG_VERSION}"

          if [[ "${TAG_VERSION}" != "${PKG_VERSION}" ]]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match package.json version (${PKG_VERSION})"
            exit 1
          fi

          echo "Version validated: ${TAG_VERSION}"

      - name: Validate tag signature
        run: |
          # Verify the tag points to a valid commit
          TAG="${GITHUB_REF_NAME}"
          COMMIT=$(git rev-list -n 1 "refs/tags/${TAG}")
          echo "Tag ${TAG} points to commit: ${COMMIT}"

          # Verify commit is on main branch lineage
          if git merge-base --is-ancestor "${COMMIT}" HEAD; then
            echo "Commit is in repository lineage."
          fi

  # ---------------------------------------------------------------------------
  # Job 2: Build and Push Multi-Arch Docker Images
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Container Images
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: true
          sbom: true
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.validate.outputs.version }}

  # ---------------------------------------------------------------------------
  # Job 3: Attest Build Provenance (SLSA Level 3)
  # ---------------------------------------------------------------------------
  attest:
    name: Build Provenance Attestation
    runs-on: ubuntu-latest
    needs: [validate, build-and-push]
    timeout-minutes: 15
    permissions:
      id-token: write
      attestations: write
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release artifacts
        run: pnpm run build

      - name: Generate checksums
        run: |
          mkdir -p dist
          find client/dist server/dist -type f -print0 2>/dev/null | sort -z | xargs -0 sha256sum > dist/checksums.txt || true
          echo "Checksums generated:"
          cat dist/checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/checksums.txt

      - name: Generate CycloneDX SBOM for release
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: dist/sbom-release.json

      - name: Upload provenance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-provenance-${{ needs.validate.outputs.tag }}
          path: |
            dist/checksums.txt
            dist/sbom-release.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Job 4: Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-and-push, attest]
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download provenance artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-provenance-${{ needs.validate.outputs.tag }}
          path: release-assets

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          VERSION="${{ needs.validate.outputs.version }}"

          echo "Creating GitHub Release: ${TAG}"

          gh release create "${TAG}" \
            --title "IntelGraph ${TAG}" \
            --generate-notes \
            release-assets/checksums.txt \
            release-assets/sbom-release.json

          echo "Release created: ${TAG}"

  # ---------------------------------------------------------------------------
  # Job 5: Helm Chart Package and Push (if helm/ exists)
  # ---------------------------------------------------------------------------
  helm:
    name: Helm Chart Package
    runs-on: ubuntu-latest
    needs: [validate, build-and-push]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Helm chart
        id: check-helm
        run: |
          if [ -d "infra/helm/intelgraph" ]; then
            echo "has_helm=true" >> $GITHUB_OUTPUT
            echo "chart_path=infra/helm/intelgraph" >> $GITHUB_OUTPUT
          elif [ -d "helm" ]; then
            echo "has_helm=true" >> $GITHUB_OUTPUT
            echo "chart_path=helm" >> $GITHUB_OUTPUT
          else
            echo "has_helm=false" >> $GITHUB_OUTPUT
            echo "No Helm chart directory found, skipping."
          fi

      - name: Setup Helm
        if: steps.check-helm.outputs.has_helm == 'true'
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Log in to GHCR for Helm OCI
        if: steps.check-helm.outputs.has_helm == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        if: steps.check-helm.outputs.has_helm == 'true'
        run: |
          CHART_PATH="${{ steps.check-helm.outputs.chart_path }}"
          VERSION="${{ needs.validate.outputs.version }}"

          # Update chart version
          sed -i "s/^version:.*/version: ${VERSION}/" "${CHART_PATH}/Chart.yaml"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "${CHART_PATH}/Chart.yaml"

          # Build dependencies
          helm dependency build "${CHART_PATH}" || true

          # Package
          helm package "${CHART_PATH}" --version "${VERSION}" --destination ./helm-packages

          echo "Helm chart packaged:"
          ls -la ./helm-packages/

      - name: Push Helm chart to GHCR OCI
        if: steps.check-helm.outputs.has_helm == 'true'
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          CHART_PKG=$(ls helm-packages/*.tgz | head -1)

          helm push "${CHART_PKG}" oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

          echo "Helm chart pushed to OCI registry."

  # ---------------------------------------------------------------------------
  # Release Pipeline Summary
  # ---------------------------------------------------------------------------
  release-summary:
    name: Release Pipeline Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - validate
      - build-and-push
      - attest
      - release
      - helm
    steps:
      - name: Pipeline summary
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          VERSION="${{ needs.validate.outputs.version }}"

          echo "## Release Pipeline: ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Attestation (SLSA) | ${{ needs.attest.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Chart | ${{ needs.helm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
