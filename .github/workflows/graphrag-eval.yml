name: graphrag-eval
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  graphrag_eval:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --no-frozen-lockfile

      - name: Build compiler
        run: |
          pnpm -C packages/graphrag-context-compiler build

      - name: Run GraphRAG eval
        run: |
          node tools/graphrag/eval/run_eval.mjs tools/graphrag/eval/datasets/smoke.jsonl

      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: graphrag-eval
          path: |
            out/graphrag-eval/results.json
