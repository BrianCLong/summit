name: Governor Drift Nightly
on:
  schedule:
    - cron: '0 2 * * *' # Run at 2 AM UTC daily
  workflow_dispatch:

jobs:
  governor-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm@10.0.0
      - name: Install dependencies
        run: pnpm install
      - name: Run Governor Drift
        run: pnpm tsx cli/governor/index.ts --mode required --target drift
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: governor-drift-reports
          path: reports/governor
