name: Reusable Test Suite

on:
  workflow_call:
    inputs:
      test-type:
        description: "Type of tests to run (unit, integration, e2e, perf, lint)"
        required: true
        type: string
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
      pnpm-version:
        description: "pnpm version to use"
        required: false
        type: string
        default: "9"
      test-command:
        description: "Custom test command to run"
        required: false
        type: string
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 30
      upload-coverage:
        description: "Whether to upload coverage reports"
        required: false
        type: boolean
        default: false
      working-directory:
        description: "Working directory for tests"
        required: false
        type: string
        default: "."

env:
  CI: true
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  test:
    name: ${{ inputs.test-type }} tests
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v6

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          retention-days: 14
          name: test-results-${{ inputs.test-type }}
          path: |
            **/junit.xml
            **/coverage/**
            **/test-results/**
          if-no-files-found: ignore

      - name: Upload coverage
        if: ${{ inputs.upload-coverage && inputs.test-type == 'unit' }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          directory: ${{ inputs.working-directory }}/coverage
          fail_ci_if_error: false
