name: macOS 26 Canary

on:
  schedule:
    # Run weekly to catch runner image updates
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  macos-canary:
    name: Canary macOS 26
    runs-on: macos-26-large
    steps:
      - name: System Information
        run: |
          echo "=== macOS Version ==="
          sw_vers
          echo ""
          echo "=== System Info ==="
          system_profiler SPSoftwareDataType
          echo ""
          echo "=== Hardware Info ==="
          system_profiler SPHardwareDataType

      - name: Verify Xcode Version
        run: |
          echo "=== Default Xcode Version ==="
          xcodebuild -version
          echo ""
          echo "=== Available Xcode Versions ==="
          ls -l /Applications | grep Xcode

      - name: Verify Toolchains
        run: |
          echo "=== Swift Version ==="
          swift --version
          echo ""
          echo "=== Clang Version ==="
          clang --version

      - name: Verify SDKs
        run: |
          echo "=== Available SDKs ==="
          xcodebuild -showsdks
permissions:
  contents: read
