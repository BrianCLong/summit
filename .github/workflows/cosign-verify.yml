name: cosign-verify
on:
  workflow_call:
  push:
    branches: [ main ]
    paths: [ 'release/**' ]
jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - name: Install cosign
        run: |
          COSIGN_VERSION="v2.4.0"
          curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
      - name: Verify signatures
        env:
          COSIGN_PUB: ${{ secrets.COSIGN_PUB }}
        run: |
          set -euo pipefail
          for img in $(ls release/* 2>/dev/null || true); do
            echo "Verifying $img"
            cosign verify --use-signed-timestamps --key "$COSIGN_PUB" --certificate-oidc-issuer https://token.actions.githubusercontent.com "$img" || { echo "::error::Supply chain verification failed! Missing or invalid signed timestamps."; false; }
            cosign verify-attestation --use-signed-timestamps --key "$COSIGN_PUB" "$img" --type slsaprovenance || { echo "::error::Supply chain verification failed! Missing or invalid signed timestamps."; false; }
          done
