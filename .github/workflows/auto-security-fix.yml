name: Auto Security Remediation

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM MST
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Update Critical Dependencies
        run: |
          pnpm update swagger-ui@latest swagger-ui-react@latest
          pnpm update --latest
      
      - name: Fix Dockerfile Issues
        run: |
          find . -name 'Dockerfile*' -exec sed -i 's/COPY \(.*\) \/\([^/]\+\)$/COPY \1 \/\2\//' {} \;
      
      - name: Run Security Scans
        continue-on-error: true
        run: |
          npx trivy fs . --severity CRITICAL --exit-code 0
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'security: automated dependency updates and fixes'
          title: 'chore(security): Automated Security Remediation'
          body: |
            ## Automated Security Fixes
            
            This PR contains automated security remediations:
            - Updated critical dependencies
            - Fixed Dockerfile COPY syntax
            - Ran security scans
            
            Generated by auto-security-fix.yml workflow
            
            Related: #16428
          branch: auto-security-fix
          labels: security,automated,P0
          delete-branch: true
