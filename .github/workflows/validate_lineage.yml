name: Validate OpenLineage / PROV
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]
jobs:
  validate-lineage:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest jsonschema
      - name: Generate mock sample spans
        run: |
          PYTHONPATH=. python tools/generate_sample_spans.py
      - name: Run lineage validation
        run: |
          PYTHONPATH=. python tools/validate_prov_openlineage.py
      - name: Run tests
        run: |
          pytest -q tests/test_prov_mapping.py
