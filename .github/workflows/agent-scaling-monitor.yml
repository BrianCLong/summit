name: Agent Scaling Monitor

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  monitor-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: ppnpm install --frozen-lockfile
      - run: npx tsx scripts/monitoring/agent-scaling-drift.ts
      - name: Archive monitoring reports
        uses: actions/upload-artifact@v4
        with:
          name: agent-scaling-monitoring
          path: reports/monitoring/
