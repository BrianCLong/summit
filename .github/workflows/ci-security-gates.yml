name: CI Security Gates

# IntelGraph v5.0.0 GA - Comprehensive PR security and quality checks
# Complements ci-core.yml (quality/build) and ci-security.yml (deep security suite)
# This workflow focuses on fast-feedback security gates for every PR.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  checks: write
  actions: read

env:
  CI: true
  NODE_ENV: test
  REPORT_DIR: security-gate-reports

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & Typecheck
  # ---------------------------------------------------------------------------
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint --max-warnings 0

      - name: Prettier check
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,md,yml,yaml}"

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

  # ---------------------------------------------------------------------------
  # Job 2: Unit Tests with Coverage
  # ---------------------------------------------------------------------------
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:unit --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          path: |
            coverage/
            test-results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 3: Security Scan (Trivy + Semgrep)
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create report directory
        run: mkdir -p "$REPORT_DIR"

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.0

      - name: Trivy filesystem scan (SARIF)
        run: |
          trivy fs \
            --scanners vuln,secret,misconfig \
            --ignore-unfixed \
            --format sarif \
            --output "$REPORT_DIR/trivy-fs.sarif" \
            .

      - name: Upload Trivy SARIF to GitHub Security
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/trivy-fs.sarif
          category: trivy-fs-ci-security-gates

      - name: Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
          generateSarif: true
          sarifFile: ${{ env.REPORT_DIR }}/semgrep.sarif

      - name: Upload Semgrep SARIF to GitHub Security
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/semgrep.sarif
          category: semgrep-ci-security-gates

      - name: Upload security scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports
          path: ${{ env.REPORT_DIR }}/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 4: SBOM Generation
  # ---------------------------------------------------------------------------
  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom-cyclonedx.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Job 5: OPA Policy Tests
  # ---------------------------------------------------------------------------
  opa-policy-test:
    name: OPA Policy Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run OPA policy tests
        run: |
          echo "Running OPA policy tests for IntelGraph..."
          opa test policy/intelgraph/ -v

      - name: Upload OPA test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opa-policy-test-results
          path: policy/intelgraph/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 6: Gitleaks Secret Scanning
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ---------------------------------------------------------------------------
  # Job 7: Docker Build (push to main only)
  # ---------------------------------------------------------------------------
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=main-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ---------------------------------------------------------------------------
  # Gate: All security checks must pass
  # ---------------------------------------------------------------------------
  security-gate-status:
    name: Security Gate Status
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint-typecheck
      - unit-test
      - security-scan
      - sbom
      - opa-policy-test
      - gitleaks
    steps:
      - name: Evaluate gate results
        run: |
          echo "=== CI Security Gates Status ==="
          echo "Lint & Typecheck: ${{ needs.lint-typecheck.result }}"
          echo "Unit Tests: ${{ needs.unit-test.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "SBOM: ${{ needs.sbom.result }}"
          echo "OPA Policy Tests: ${{ needs.opa-policy-test.result }}"
          echo "Gitleaks: ${{ needs.gitleaks.result }}"

          FAILED=0
          for result in \
            "${{ needs.lint-typecheck.result }}" \
            "${{ needs.unit-test.result }}" \
            "${{ needs.security-scan.result }}" \
            "${{ needs.sbom.result }}" \
            "${{ needs.opa-policy-test.result }}" \
            "${{ needs.gitleaks.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              FAILED=1
            fi
          done

          if [[ "$FAILED" -eq 1 ]]; then
            echo "::error::One or more CI Security Gates failed. PR cannot merge."
            exit 1
          fi

          echo "All CI Security Gates passed."

      - name: Post summary
        if: always()
        run: |
          echo "## CI Security Gates" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Typecheck | ${{ needs.lint-typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan (Trivy + Semgrep) | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generation | ${{ needs.sbom.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OPA Policy Tests | ${{ needs.opa-policy-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks Secret Scan | ${{ needs.gitleaks.result }} |" >> $GITHUB_STEP_SUMMARY
