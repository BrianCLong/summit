name: CI Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test

      - name: E2E tests (if present)
        run: pnpm test:e2e --if-present

      - name: Generate evidence
        run: pnpm exec tsx .github/scripts/gen-evidence.ts
