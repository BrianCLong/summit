name: ci-verify

on:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test --runInBand tests/graphrag/evidence/writer.test.ts tests/graphrag/evidence/schema-validation.test.ts

      - name: Validate evidence schemas and determinism
        run: pnpm exec tsx scripts/ci/verify-evidence-bundle.ts

      - name: Validate pipeline contracts
        run: pnpm exec tsx .github/scripts/validate-pipeline-contracts.ts
