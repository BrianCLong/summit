name: CI Verify Evidence

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9.x
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Schemas
        run: npx tsx scripts/verify-evidence-schemas.ts

      - name: Run Evidence Unit Tests
        run: pnpm --filter intelgraph-server test src/graphrag/evidence/__tests__/evidence.test.ts
