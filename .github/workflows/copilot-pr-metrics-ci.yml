name: copilot-pr-metrics-ci

on:
  pull_request:
    paths:
      - 'connectors/github/copilot_metrics/**'
      - 'pipelines/metrics/copilot_pr_metrics.py'
      - 'evidence/copilot_pr_metrics/**'
      - 'evidence/schemas/copilot_pr_metrics.schema.json'
      - 'scripts/ci/copilot_pr_metrics_checks.py'
      - '.github/workflows/copilot-pr-metrics-ci.yml'
  workflow_dispatch:

jobs:
  copilot-pr-metrics-scaffold:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate deterministic artifacts
        run: python pipelines/metrics/copilot_pr_metrics.py
      - name: metrics-schema-validate
        run: python scripts/ci/copilot_pr_metrics_checks.py
        working-directory: ${{ github.workspace }}
      - name: deterministic-output-check
        run: python scripts/ci/copilot_pr_metrics_checks.py
        working-directory: ${{ github.workspace }}
      - name: no-unstable-fields
        run: python scripts/ci/copilot_pr_metrics_checks.py
        working-directory: ${{ github.workspace }}
permissions:
  contents: read
