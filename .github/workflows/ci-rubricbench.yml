name: RubricBench Alignment Check

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  rubric-eval-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run benchmark
        env:
          SUMMIT_FEATURE_RUBRICBENCH: "true"
        run: npx tsx scripts/benchmarks/run-rubricbench.ts
      - name: Check baseline
        run: |
          node -e "
            const metrics = require('./artifacts/rubricbench/metrics.json');
            if (metrics.rubric_alignment < 0.6) {
              console.error('Rubric alignment below baseline: ' + metrics.rubric_alignment);
              process.exitCode = 1;
            }
          "

  rubricbench-success:
    # Shim job required to aggregate matrix results and satisfy branch protection rules.
    # See ADR-052 for governance acceptance record.
    runs-on: ubuntu-latest
    needs: [rubric-eval-matrix]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.rubric-eval-matrix.result }}" != "success" ]; then
            false
          fi
          echo "All matrix jobs succeeded"
