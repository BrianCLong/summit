name: agent-guardrails-no-offense
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Verify Agent Guardrails
        run: npx tsx .github/scripts/agent_guardrails_no_offense.ts
