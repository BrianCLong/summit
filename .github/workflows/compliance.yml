name: Compliance
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  drift-detection:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          # Remove version to read from package.json
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 18 # Downgrade to 18 for native modules (xxhash, spellchecker)
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Simulate compliance check (since we don't have the full proprietary suite)
      - run: echo "Running compliance drift detection..."
