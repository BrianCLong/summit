name: Merge train labeler

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: Number of PRs to mark as merge-ready
        required: true
        default: '25'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const N = parseInt(inputs.batch_size || '25', 10);
            const q = `repo:${context.repo.owner}/${context.repo.repo} is:pr is:open status:success -label:"queue:blocked" -label:"queue:conflict" -label:"queue:merge-now" -label:"queue:obsolete"`;
            let page = 1;
            let remaining = N;
            const labeled = [];

            while (remaining > 0) {
              const res = await github.rest.search.issuesAndPullRequests({
                q,
                sort: 'updated',
                order: 'asc',
                per_page: 100,
                page,
              });

              if (!res.data.items?.length) break;

              for (const item of res.data.items) {
                if (remaining <= 0) break;

                const number = item.number;
                const pr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: number,
                });

                const mergeable = pr.data.mergeable;
                const state = (pr.data.mergeable_state || '').toLowerCase();
                if (mergeable === false) continue;
                if (state === 'dirty' || state === 'conflicting' || state === 'blocked') continue;

                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  labels: ['queue:merge-now'],
                });

                labeled.push(number);
                remaining -= 1;
              }

              if (res.data.items.length < 100) break;
              page += 1;
            }

            core.info(`labeled=${labeled.join(',') || 'none'}`);
