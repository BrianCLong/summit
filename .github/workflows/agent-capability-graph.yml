name: agent-capability-graph
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: npm install -g pnpm && pnpm install --frozen-lockfile
      - name: Test graph checks
        run: npx tsx --test tests/agent-graph/*.ts tests/e2e/agent-graph-ci-gate.spec.ts
      - name: Emit deterministic artifacts
        run: npx tsx .github/scripts/run-agent-graph-check.ts
