name: Affected CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  detect-affected:
    name: Detect Affected Packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Detect
        id: detect
        run: |
          # Use the script to get affected packages
          export BASE_REF=${{ github.event.pull_request.base.sha || 'origin/main' }}
          PACKAGES=$(node .github/scripts/get-affected-packages.cjs)

          if [ -z "$PACKAGES" ] || [ "$PACKAGES" = "[]" ]; then
            # fallback to empty array but ensure valid JSON
            PACKAGES="[]"
          fi

          # GitHub Actions needs JSON array output escaped properly for matrix
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "Detected packages: $PACKAGES"

  build-and-test:
    name: Build & Test
    needs: detect-affected
    if: needs.detect-affected.outputs.packages != '[]' && needs.detect-affected.outputs.packages != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-affected.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Test ${{ matrix.package }}
        run: |
          if [ -d "${{ matrix.package }}" ] && [ -f "${{ matrix.package }}/package.json" ]; then
            cd "${{ matrix.package }}"

            # Check if build script exists and run it
            if pnpm run | grep -q "^  build$"; then
              pnpm run build || true
            fi

            # Check if test script exists and run it
            if pnpm run | grep -q "^  test$"; then
              pnpm run test || true
            fi
          else
            echo "Directory ${{ matrix.package }} not found or missing package.json"
          fi
