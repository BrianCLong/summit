name: RCP Merge Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      emergency_override:
        description: "Set true to override freeze (requires manual attestation step)"
        required: false
        default: "false"

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  rcp-evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (if needed)
        run: |
          pip install pyyaml

      - name: Evaluate PR with RCP
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          EMERGENCY_OVERRIDE: ${{ github.event.inputs.emergency_override }}
        run: |
          mkdir -p rcp/out
          ./rcp/bin/rcp evaluate-pr --pr "$PR_NUMBER" --sha "$SHA" --out rcp/out/rcp-output.json
          cat rcp/out/rcp-output.json

      - name: Upload RCP output artifact
        uses: actions/upload-artifact@v4
        with:
          name: rcp-output
          path: rcp/out/rcp-output.json
          if-no-files-found: error

      - name: Fail if not merge eligible
        run: |
          python3 -c '
          import json, sys
          with open("rcp/out/rcp-output.json") as f:
              data = json.load(f)
              if not data.get("merge_eligible"):
                  print("RCP: merge blocked", file=sys.stderr)
                  print(json.dumps(data.get("violations", []), indent=2), file=sys.stderr)
                  sys.exit(1)
          print("RCP: merge eligible")
          '
