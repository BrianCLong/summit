name: Release Integrity

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-integrity:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate release artifacts
        run: node scripts/release/generate-release-artifacts.mjs

      - name: Verify release artifacts
        run: node scripts/release/verify-release.mjs

      - name: Assert verification pass in readiness report
        run: |
          node -e "const fs=require('fs');const p='.repoos/evidence/release-readiness-report.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));if(!j.verification_passed) {throw new Error('verification_passed=false in readiness report')}"

      - name: Upload release integrity artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-integrity-artifacts
          path: |
            .repoos/release/release-surface.json
            .repoos/evidence/release-readiness-report.json
            .repoos/evidence/release-readiness-stamp.json
            .repoos/evidence/release-verification-report.json
            release/manifest.json
            release/sbom.json
            release/provenance.json
            release/rollback-spec.md
