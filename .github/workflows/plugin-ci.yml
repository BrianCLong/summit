# Plugin System CI/CD Pipeline
name: Plugin CI/CD

on:
  push:
    paths:
      - 'packages/plugin-*/**'
      - 'services/plugin-*/**'
      - 'tools/plugin-cli/**'
  pull_request:
    paths:
      - 'packages/plugin-*/**'
      - 'services/plugin-*/**'
      - 'tools/plugin-cli/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm run lint --filter "@summit/plugin-*"

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type checking
        run: pnpm run typecheck --filter "@summit/plugin-*"

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test --filter "@summit/plugin-*"
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: plugin-system

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build --filter "@summit/plugin-*"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-system-dist
          path: |
            packages/plugin-*/dist
            services/plugin-*/dist
            tools/plugin-cli/dist

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=high

      - name: Run npm audit
        run: |
          cd packages/plugin-system && npm audit --audit-level=moderate || true
          cd ../plugin-sdk && npm audit --audit-level=moderate || true

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push plugin-registry
        uses: docker/build-push-action@v5
        with:
          context: ./services/plugin-registry
          push: true
          tags: ghcr.io/${{ github.repository }}/plugin-registry:latest

      - name: Build and push plugin-executor
        uses: docker/build-push-action@v5
        with:
          context: ./services/plugin-executor
          push: true
          tags: ghcr.io/${{ github.repository }}/plugin-executor:latest

      - name: Build and push plugin-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/plugin-gateway
          push: true
          tags: ghcr.io/${{ github.repository }}/plugin-gateway:latest

  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/plugin-v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build --filter "@summit/plugin-*"

      - name: Publish to npm
        run: |
          cd packages/plugin-system && npm publish --access public || true
          cd ../plugin-sdk && npm publish --access public || true
          cd ../extension-api && npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
