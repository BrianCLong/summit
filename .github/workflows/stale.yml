name: Stale PR Cleanup

on:
  schedule:
    - cron: "0 0 * * *" # Daily
  workflow_dispatch:

permissions:
  pull-requests: write
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-pr-message: "This PR has been inactive for 14 days and is now marked as stale. It will be closed in 7 days if no further activity occurs."
          close-pr-message: "This PR has been closed due to inactivity. If the work is still relevant, please reopen it after rebasing onto main."
          days-before-stale: 14
          days-before-close: 7
          stale-pr-label: "status:stale"
          exempt-pr-labels: "do-not-supersede,supersedence:review,canonical-survivor"
