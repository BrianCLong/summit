name: Close inactive issues
on:
  schedule:
    - cron: "0 0 * * *"

jobs:
  close-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: "stale"
          stale-issue-message: "This issue has been inactive for 30 days and will be closed in 7 days if no further activity occurs. Please comment if you wish to keep it open."
          close-issue-message: "This issue has been closed due to inactivity."
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: "This pull request has been inactive for 30 days and will be closed in 7 days if no further activity occurs. Please comment or update the PR if you wish to keep it open."
          close-pr-message: "This pull request has been closed due to inactivity."
