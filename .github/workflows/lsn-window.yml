name: LSN Window Validator

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

jobs:
  validate-lsn-window:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run scanner (emit metrics)
        id: scan
        run: |
          python tools/lsn/lsn_scanner.py data/fixtures/debezium_sample.jsonl > metrics.json

      - name: Run pytest slice
        run: |
          pytest -q tests/ci/test_lsn_window.py

      - name: Upload evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: window-health-metrics
          path: metrics.json

      - name: Publish summary
        run: |
          echo "## LSN Window Health" >> $GITHUB_STEP_SUMMARY
          cat metrics.json >> $GITHUB_STEP_SUMMARY
