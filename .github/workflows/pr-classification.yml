name: PR Classification and Queue Assignment

# Runs after Frontier Engine has compressed patches into PRs
# Operates on ~80 PRs/day instead of 100,000 patches/day

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to classify'
        required: true

jobs:
  classify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --prefix services/evolution-ledger
          npm install --prefix services/repoos

      - name: Classify PR
        id: classify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTGRES_HOST: ${{ secrets.EVOLUTION_LEDGER_HOST }}
          POSTGRES_PORT: ${{ secrets.EVOLUTION_LEDGER_PORT }}
          POSTGRES_DB: ${{ secrets.EVOLUTION_LEDGER_DB }}
          POSTGRES_USER: ${{ secrets.EVOLUTION_LEDGER_USER }}
          POSTGRES_PASSWORD: ${{ secrets.EVOLUTION_LEDGER_PASSWORD }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          node scripts/pr/classify-pr.mjs classify $PR_NUMBER

        working-directory: ${{ github.workspace }}
      - name: Check auto-merge eligibility
        if: success()
        id: auto_merge
        run: |
          # Read classification result
          CLASSIFICATION=$(cat .repoos/pr-classifications/pr-${{ github.event.pull_request.number }}.json)

          AUTO_MERGE=$(echo $CLASSIFICATION | jq -r '.queue.autoMergeEligible')
          QUEUE_LANE=$(echo $CLASSIFICATION | jq -r '.queue.lane')

          echo "auto_merge=$AUTO_MERGE" >> $GITHUB_OUTPUT
          echo "queue_lane=$QUEUE_LANE" >> $GITHUB_OUTPUT

      - name: Enable auto-merge (if eligible)
        if: steps.auto_merge.outputs.auto_merge == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Enable auto-merge with squash merge
          gh pr merge ${{ github.event.pull_request.number }} \
            --auto \
            --squash \
            --delete-branch

          echo "✅ Auto-merge enabled for PR #${{ github.event.pull_request.number }}"

      - name: Request reviews (if needs review)
        if: steps.auto_merge.outputs.queue_lane == 'needs-review'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Request review from appropriate team based on concern
          # This would be customized based on your CODEOWNERS or team structure

          gh pr edit ${{ github.event.pull_request.number }} \
            --add-reviewer platform-team

      - name: Block merge (if blocked)
        if: steps.auto_merge.outputs.queue_lane == 'blocked'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Add comment explaining why PR is blocked
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "❌ This PR is currently blocked from merging. Please resolve conflicts or failing checks."

      - name: Upload classification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-classification-${{ github.event.pull_request.number }}
          path: .repoos/pr-classifications/pr-${{ github.event.pull_request.number }}.json
          retention-days: 90

      - name: Emit evolution event
        if: success()
        env:
          POSTGRES_HOST: ${{ secrets.EVOLUTION_LEDGER_HOST }}
          POSTGRES_PORT: ${{ secrets.EVOLUTION_LEDGER_PORT }}
          POSTGRES_DB: ${{ secrets.EVOLUTION_LEDGER_DB }}
          POSTGRES_USER: ${{ secrets.EVOLUTION_LEDGER_USER }}
          POSTGRES_PASSWORD: ${{ secrets.EVOLUTION_LEDGER_PASSWORD }}
        run: |
          # Record pr_classified event
          node scripts/evolution/emit-pr-event.mjs \
            pr_classified \
            "$(cat .repoos/pr-classifications/pr-${{ github.event.pull_request.number }}.json)"
        working-directory: ${{ github.workspace }}
permissions:
  contents: read
