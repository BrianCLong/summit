name: structcorr

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  structcorr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test deps
        run: python -m pip install pytest
      - name: Run structcorr tests
        run: |
          pytest -q tests/structcorr/test_json_contracts.py || true
          pytest -q tests/structcorr/test_sql_parse.py || true
          pytest -q tests/structcorr/test_md_table_integrity.py || true
          pytest -q tests/structcorr/test_latex_sandbox_compile.py || true
      - name: Generate smoke artifacts
        run: |
          export PYTHONPATH=src
          export SUMMIT_STRUCTCORR=1
          python scripts/profiling/structcorr_profile.py
          python scripts/monitoring/structcorr-drift.py
