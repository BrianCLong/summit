name: docs-ci

on:
  pull_request:
    paths:
      - "docs/**"
      - "*.md"
      - "adr/**"
      - ".github/workflows/docs-ci.yml"

concurrency:
  group: docs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint markdown files
        run: |
          if command -v markdownlint &> /dev/null; then
            markdownlint docs/ *.md || echo "Markdown lint check"
          fi

      - name: Check for broken links
        run: |
          if command -v markdown-link-check &> /dev/null; then
            find docs -name "*.md" -exec markdown-link-check {} \; || echo "Link check"
          fi

      - name: Validate governance docs
        run: pnpm test:docs-governance || echo "Docs governance check"
