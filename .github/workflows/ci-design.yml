name: ci-design-artifact-verify

on:
  pull_request:
    paths:
      - 'src/agents/design/**'
      - 'tests/design/**'
      - 'scripts/ci/verify_design_artifact.mjs'
      - 'config/feature-flags.json'
      - 'docs/architecture/design-mcp.md'
      - 'docs/security/design-mcp-threat-model.md'
      - 'docs/repo_assumptions.md'
      - 'docs/roadmap/STATUS.json'
      - 'artifacts/ui-design/**'
      - '.github/workflows/ci-design.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-design-artifact-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run design lane tests
        run: pnpm test -- --runTestsByPath tests/design/design-mcp-adapter.test.ts tests/design/artifact-importer.test.ts tests/design/implementation-planner.test.ts

      - name: Verify design artifact constraints
        run: node scripts/ci/verify_design_artifact.mjs --base "origin/${{ github.base_ref }}" --head "${{ github.sha }}"
