name: GraphRAG Benchmark

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run benchmark
        run: |
          npx tsx scripts/ci/run-graphrag.ts
      - name: Validate registry
        run: |
          npx tsx scripts/ci/validate-registry.ts
      - name: Validate public artifacts
        run: |
          ./scripts/ci/public-private-validator
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: artifacts/bench/
