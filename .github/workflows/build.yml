name: Supply Chain Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-attest:
    name: Build, SBOM & Provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    env:
      SIGSTORE_KEY: ${{ secrets.SIGSTORE_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4.1.7

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # v4.1.0

      # Note: pnpm version is read from package.json "packageManager" field
      - name: Setup Node
        uses: actions/setup-node@v4 # v4
        with:
          name: sboms
          path: |
            sbom.*.json
            attestation.json
