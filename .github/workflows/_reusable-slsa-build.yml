name: Reusable SLSA L3 Build

on:
  workflow_call:
    inputs:
      image_name:
        description: "Container image name"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      context:
        description: "Build context path"
        required: false
        type: string
        default: "."
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        type: string
        default: "linux/amd64"
      push:
        description: "Push to registry"
        required: false
        type: boolean
        default: true
      sign:
        description: "Sign with cosign"
        required: false
        type: boolean
        default: true
      sbom:
        description: "Generate SBOM"
        required: false
        type: boolean
        default: true
      slsa_provenance:
        description: "Generate SLSA provenance"
        required: false
        type: boolean
        default: true
      reproducible:
        description: "Enable reproducible build settings"
        required: false
        type: boolean
        default: true
    outputs:
      image_digest:
        description: "Image digest"
        value: ${{ jobs.build.outputs.digest }}
      image_uri:
        description: "Full image URI with digest"
        value: ${{ jobs.build.outputs.image-uri }}
      sbom_digest:
        description: "SBOM digest"
        value: ${{ jobs.build.outputs.sbom-digest }}
      slsa_level:
        description: "Achieved SLSA level"
        value: ${{ jobs.build.outputs.slsa-level }}
    secrets:
      registry_password:
        description: "Container registry password/token"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  COSIGN_EXPERIMENTAL: "1"
  EXPECTED_OIDC_ISSUER: https://token.actions.githubusercontent.com
  EXPECTED_OIDC_SUBJECT: https://github.com/${{ github.repository }}/.github/workflows/_reusable-slsa-build.yml@${{ github.ref }}

jobs:
  build:
    name: Build & Attest
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image-uri: ${{ steps.image-uri.outputs.uri }}
      sbom-digest: ${{ steps.sbom.outputs.digest }}
      slsa-level: ${{ steps.slsa-check.outputs.level }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v6
        with:
          driver-opts: |
            network=none
            image=moby/buildkit:v0.12.4

      - name: Log in to Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Set reproducible build environment
        if: inputs.reproducible
        run: |
          # Set deterministic timestamps for reproducible builds
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Build and push
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          cosign-release: v2.2.4

      - name: Sign image (OIDC keyless)
        if: inputs.sign && inputs.push
        run: |
          set -euo pipefail

          IMAGE="${{ steps.image-uri.outputs.uri }}"

          cosign sign --yes \
            -a "repo=${{ github.repository }}" \
            -a "ref=${{ github.ref }}" \
            -a "sha=${{ github.sha }}" \
            -a "workflow=${{ github.workflow }}" \
            -a "slsa_level=3" \
            "$IMAGE"

      - name: Verify signature identity pins
        if: inputs.sign && inputs.push
        run: |
          set -euo pipefail

          IMAGE="${{ steps.image-uri.outputs.uri }}"

          cosign verify "$IMAGE" \
            --certificate-identity "${{ env.EXPECTED_OIDC_SUBJECT }}" \
            --certificate-oidc-issuer "${{ env.EXPECTED_OIDC_ISSUER }}"

      - name: Generate SBOMs (SPDX + CycloneDX)
        if: inputs.sbom
        id: sbom
        uses: anchore/sbom-action@v0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ inputs.image_name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM
        if: inputs.sbom && inputs.sign && inputs.push
        uses: actions/attest-sbom@v2
        with:
          name: build-artifacts-${{ inputs.image_name }}-${{ github.run_id }}
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json
          retention-days: 90

  # SLSA provenance generation using official generator
  provenance:
    name: Generate SLSA Provenance
    needs: build
    if: inputs.slsa_provenance && inputs.push
    permissions:
      actions: read
      id-token: write
      contents: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.build.outputs.image-uri }}
      digest: ${{ needs.build.outputs.digest }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
