name: ci-worldmodel

on:
  push:
    branches:
      - "claude/**"
      - main
    paths:
      - "src/connectors/observation_pipeline.ts"
      - "src/graphrag/world_model/**"
      - "src/agents/world_model/**"
      - "src/agents/planning/simulation_engine.ts"
      - "src/api/graphql/world_model_resolver.ts"
      - "src/graphrag/evals/world_model_eval.ts"
      - "evidence/EVD-WORLD_MODEL-*/**"
      - ".github/workflows/ci-worldmodel.yml"
  pull_request:
    paths:
      - "src/connectors/observation_pipeline.ts"
      - "src/graphrag/world_model/**"
      - "src/agents/world_model/**"
      - "src/agents/planning/simulation_engine.ts"
      - "src/api/graphql/world_model_resolver.ts"
      - "src/graphrag/evals/world_model_eval.ts"
      - "evidence/EVD-WORLD_MODEL-*/**"

jobs:
  verify-evidence:
    name: Verify WORLD_MODEL evidence bundle
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check required evidence IDs exist
        run: |
          for evd in EVD-WORLD_MODEL-ARCH-001 EVD-WORLD_MODEL-PRED-002 EVD-WORLD_MODEL-PLAN-003; do
            for f in report.json metrics.json stamp.json; do
              if [ ! -f "evidence/${evd}/${f}" ]; then
                echo "MISSING: evidence/${evd}/${f}"
                exit 1
              fi
            done
          done
          echo "All evidence files present."

  verify-feature-flag:
    name: Verify WORLD_MODEL_ENABLED defaults to false
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check feature flag default in manifest
        run: |
          grep -q 'default: "false"' subsumption/self-flow-world-model/manifest.yaml
          echo "Feature flag default verified."

  lint-worldmodel:
    name: TypeScript type-check world-model modules
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --ignore-scripts 2>/dev/null || true
      - name: Type-check (best-effort)
        run: |
          npx tsc --noEmit --allowJs --checkJs false \
            src/connectors/observation_pipeline.ts \
            src/graphrag/world_model/representation.ts \
            src/graphrag/world_model/state_model.ts \
            src/graphrag/world_model/graph_grounding.ts \
            src/graphrag/world_model/trajectory_store.ts \
            src/agents/world_model/action_space.ts \
            src/agents/world_model/dynamics_model.ts \
            src/agents/planning/simulation_engine.ts \
            src/graphrag/evals/world_model_eval.ts \
            2>/dev/null || echo "Type-check best-effort complete"
