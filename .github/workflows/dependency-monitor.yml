name: Dependency Monitoring

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "0 03 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  REPORT_DIR: dependency-monitoring

jobs:
  dependency-review:
    name: Block vulnerable dependency changes
    runs-on: ubuntu-latest
    # dependency-review-action only works for pull_request/merge_group events
    if: ${{ (vars.MERGE_SURGE != 'true' || github.event_name == 'merge_group' || github.event_name == 'push' || github.event_name == 'schedule') && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target' || github.event_name == 'merge_group') }}
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261 # v4.8.2
        with:
          command: test
          args: >-
            --all-projects
            --severity-threshold=high
            --fail-on=all
            --sarif-file-output=${{ env.REPORT_DIR }}/snyk.sarif

      - name: Upload Snyk SARIF
        if: env.SNYK_TOKEN != ''
        uses: github/codeql-action/upload-sarif@cdefb33c0f6224e58673d9004f47f7cb3e328b89 # v4
        with:
          retention-days: 14
          name: dependency-monitoring
          path: ${{ env.REPORT_DIR }}/snyk.sarif

  snyk-skip-notice:
    name: Snyk scan (skipped - no token)
    needs: dependency-review
    runs-on: ubuntu-latest
    # Run if dependency-review passed or was skipped
    if: ${{ (vars.MERGE_SURGE != 'true' || github.event_name == 'merge_group' || github.event_name == 'push' || github.event_name == 'schedule') && always() && (needs.dependency-review.result == 'success' || needs.dependency-review.result == 'skipped') }}
    steps:
      - name: Notice
        run: |
          echo "::notice::Snyk scan skipped - SNYK_TOKEN not configured."
          echo "Add SNYK_TOKEN to repository secrets to enable Snyk dependency scanning."

  check-drift:
    name: Check Lockfile Drift
    if: ${{ vars.MERGE_SURGE != 'true' || github.event_name == 'merge_group' || github.event_name == 'push' || github.event_name == 'schedule' }} 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v4.1.7
      - name: Install pnpm
        uses: pnpm/action-setup@v4 # v4.1.0
      - name: Setup Node
        uses: actions/setup-node@v4 # v4
        with:
          cache: 'pnpm'
          node-version-file: .nvmrc
      # Note: pnpm version is read from package.json "packageManager" field
      - name: Check Drift
        run: ./scripts/check-lockfile-drift.sh
