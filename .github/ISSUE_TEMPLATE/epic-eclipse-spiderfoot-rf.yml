name: "Epic: Eclipse Strategy - SpiderFoot & Recorded Future Parity"
description: "Strategic Epic for achieving baseline parity with SpiderFoot and Recorded Future while establishing our 'Proof Moat'."
title: "[Epic] Eclipse Strategy - Parity and Proof Moat"
labels: ["lane:bizdev", "summit", "epic"]
assignees:
  - jules
body:
  - type: markdown
    attributes:
      value: |
        ## Overview
        Our objective is to dominate the market currently split between tactical OSINT scanners (SpiderFoot) and enterprise threat intelligence platforms (Recorded Future). To do this, Summit CompanyOS must achieve baseline feature parity while introducing an insurmountable strategic moat: **Provable, Graph-Native, Evidence-Gated Intelligence**.

        See `sales/spiderfoot-recorded-future-eclipse.md` for full strategic analysis.

  - type: textarea
    id: scope
    attributes:
      label: "Phase 1: Parity Kernel (Codex)"
      description: What are the minimal viable features needed for baseline parity?
      value: |
        - [ ] Build Module Ecosystem SDK based on MCP.
        - [ ] Implement Continuous Drift Detection (Scheduled runs).
        - [ ] Develop Integration Stubs (SIEM/SOAR + Ticketing).
        - [ ] Implement Core Vulnerability Intelligence Module.
        - [ ] Implement Core Brand Protection Module.
    validations:
      required: true

  - type: textarea
    id: moat
    attributes:
      label: "Phase 2: Evidence & Integrity Gate (Antigravity)"
      description: What features establish our unique "Proof Moat"?
      value: |
        - [ ] Implement Deterministic Artifact IDs (EVID tags).
        - [ ] Establish Provenance Capture and Lineage Tracking.
        - [ ] Develop Hash-Stable Output Generation.
        - [ ] Create Verifiable Signatures for Chain-of-Custody.
    validations:
      required: true

  - type: textarea
    id: ux
    attributes:
      label: "Phase 3: Case-First Investigation UX (Palette)"
      description: How will the user experience differ from legacy scanners?
      value: |
        - [ ] Design Evidence Capture UI.
        - [ ] Implement Run-to-Run Diff Visualizations.
        - [ ] Build Executive Report Generation with linked citations.
        - [ ] Create Collaborative Hypothesis Workspaces.
    validations:
      required: true
