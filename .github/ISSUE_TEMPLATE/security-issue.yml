name: Security Issue
description: Track a security vulnerability, compliance violation, or internal security task
title: "[Security] <title>"
labels: ["security", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **WARNING:** Do not report zero-day or unpatched external vulnerabilities here. Please use the [Security Advisories](https://github.com/BrianCLong/summit/security/advisories) tab instead. Use this template for internal security tracking, configuration issues, or known/patched vulnerabilities.
  - type: dropdown
    id: severity
    attributes:
      label: Severity / CVSS Score
      description: What is the severity of this issue?
      options:
        - "Critical (CVSS >= 9.0)"
        - "High (CVSS 7.0 - 8.9)"
        - "Moderate (CVSS 4.0 - 6.9)"
        - "Low (CVSS < 4.0)"
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Affected Component
      description: Which part of the system is affected?
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a clear and concise description of the security issue.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Potential Impact
      description: What is the potential impact of this issue?
    validations:
      required: true
  - type: textarea
    id: mitigation
    attributes:
      label: Suggested Fix / Mitigation
      description: If you have a fix or mitigation, please describe it.
    validations:
      required: false
