name: "Feature: Case-First Investigation UX (Palette)"
description: "Design and implement the user experience for investigations, focusing on evidence capture and collaborative workflows."
title: "[Feature] Case-First Investigation UX"
labels: ["lane:platform", "feature", "palette"]
assignees:
  - palette
body:
  - type: markdown
    attributes:
      value: |
        ## Overview
        Move from generating "alerts" to creating actionable "investigations." This feature provides the UI and collaborative environment for analysts to compile evidence, track changes, and generate executive reports.

  - type: textarea
    id: tasks
    attributes:
      label: "Tasks"
      description: Specific implementation tasks.
      value: |
        - [ ] Design and implement the core evidence capture UI, allowing analysts to curate findings.
        - [ ] Create visualizations for run-to-run diffs (e.g., highlighting new or changed data points between scans).
        - [ ] Build a robust executive report generation tool that automatically links claims to their underlying EVID citations.
        - [ ] Develop a collaborative workspace environment where analysts can build and share hypotheses.
    validations:
      required: true
