name: sigstore-verify
description: Bundle-first Sigstore/Cosign verification with pinned cosign and evidence output
inputs:
  cosign_version:
    description: "Cosign version to install (e.g., 3.0.4)."
    required: true
  artifact_path:
    description: "Artifact path or reference to verify."
    required: true
  bundle_path:
    description: "Sigstore bundle file path."
    required: true
  trusted_root:
    description: "Optional trusted_root.json path."
    required: false
  signing_config:
    description: "Optional signing_config.json path."
    required: false
  require_trusted_root:
    description: "Require TRUSTED_ROOT to be set and valid."
    default: "false"
    required: false
  require_signing_config:
    description: "Require SIGNING_CONFIG to be set and valid."
    default: "false"
    required: false
runs:
  using: composite
  steps:
    - name: Verify cosign version floor
      shell: bash
      run: |
        set -euo pipefail
        .github/scripts/sigstore/check-cosign-version.sh "${{ inputs.cosign_version }}"
    - name: Install cosign (pinned)
      shell: bash
      run: |
        set -euo pipefail
        version="${{ inputs.cosign_version }}"
        os="$(uname | tr '[:upper:]' '[:lower:]')"
        arch="$(uname -m)"
        case "$arch" in
          x86_64) arch="amd64" ;;
          aarch64|arm64) arch="arm64" ;;
          *) echo "unsupported architecture: $arch" >&2; exit 1 ;;
        esac
        cosign_path="${RUNNER_TEMP}/cosign"
        curl -sSfL -o "$cosign_path" \
          "https://github.com/sigstore/cosign/releases/download/v${version}/cosign-${os}-${arch}"
        chmod +x "$cosign_path"
        echo "${RUNNER_TEMP}" >> "$GITHUB_PATH"
    - name: Verify (bundle-first)
      shell: bash
      run: |
        set -euo pipefail
        trusted_root="${{ inputs.trusted_root }}"
        signing_config="${{ inputs.signing_config }}"
        args=()
        if [[ -n "$trusted_root" ]]; then
          args+=(--trusted-root "$trusted_root")
        fi
        if [[ -n "$signing_config" ]]; then
          args+=(--signing-config "$signing_config")
        fi
        .github/scripts/sigstore/verify.sh \
          --artifact "${{ inputs.artifact }}" \
          --bundle "${{ inputs.bundle }}" \
          "${args[@]}" \
          --evidence-id "${{ inputs.evidence_id }}"
