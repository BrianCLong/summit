# Agent Policy — Summit Control Plane
# EVD-AFCP-POLICY-004
#
# Defines the deny-by-default governance rules for all agents registered
# in the Summit control plane.  CI will validate every AgentDescriptor
# against these rules before merge.

version: "1.0"

defaults:
  # Every agent MUST declare capabilities; an empty list is rejected.
  require_capabilities: true

  # Every agent MUST have auditEnabled: true.
  require_audit_enabled: true

  # Agents touching confidential or restricted data MUST have
  # observabilityScore >= 0.7.
  min_observability_for_sensitive_data: 0.7

  # High-risk agents MUST have observabilityScore >= 0.5.
  min_observability_for_high_risk: 0.5

  # determinismScore must be declared (0 is a valid value).
  require_determinism_score: true

risk_levels:
  low:
    max_blast_radius: 1
    requires_human_approval: false

  medium:
    max_blast_radius: 2
    requires_human_approval_for_restricted: true

  high:
    max_blast_radius: 3
    requires_human_approval: true
    min_observability_score: 0.5

data_classification:
  public:
    requires_approval: false
  internal:
    requires_approval: false
  confidential:
    requires_approval_for_high_risk: true
    min_agent_observability: 0.7
  restricted:
    requires_human_approval: true
    min_agent_observability: 0.7
    audit_required: true

forbidden_tools:
  # These tool ids must never appear in any agent's authorised tool list.
  - "rm-rf"
  - "drop-database"
  - "delete-all-records"

ci_checks:
  # Names of the CI jobs that enforce this policy.
  - agent-policy-check
  - deny-fixtures-check
  - router-determinism-check
