# .github/policies/model-sandbox/data-classification.yml
version: 1
classifications:
  public:
    allowed: true
    description: "Open source data, public datasets."
  internal:
    allowed: true
    requires_approval: true
    description: "Summit-internal non-sensitive data."
  restricted:
    allowed: false
    requires_hardenend_sandbox: true
    description: "Customer data, PII, secrets, or sensitive IP."
default_classification: restricted
