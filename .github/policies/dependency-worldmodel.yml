# Dependency policy for the World-Model (SWMA) modules
#
# CI gate: any PR touching src/*/world_model/ or src/agents/planning/
# must not introduce new runtime dependencies without updating this file
# and supplying a dependency_delta doc under deps_delta/.
#
# Evidence: EVD-WORLD_MODEL-ARCH-001

policy_version: "1.0"
scope:
  paths:
    - "src/connectors/observation_pipeline.ts"
    - "src/graphrag/world_model/**"
    - "src/agents/world_model/**"
    - "src/agents/planning/simulation_engine.ts"
    - "src/api/graphql/world_model_resolver.ts"

rules:
  - id: no-new-runtime-deps
    description: >
      World-model modules must use only Node.js stdlib and existing project
      dependencies. New runtime packages require a deps_delta document and
      Security/Governance review.
    enforcement: blocking

  - id: license-compliance
    description: >
      All dependencies (direct and transitive) must carry an OSI-approved
      license. GPL/AGPL not permitted without legal sign-off.
    enforcement: blocking

  - id: no-llm-sdk-in-core
    description: >
      The dynamics model and planning engine must not import any LLM SDK
      directly. LLM calls must flow through the existing Summit agent layer.
    enforcement: blocking

approved_stdlib_modules:
  - "crypto"      # UUID generation, hashing
  - "path"
  - "fs"
  - "url"

dependency_delta_required: true
delta_doc_root: "deps_delta"
