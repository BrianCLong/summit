version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      rust-dependencies:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  # Go modules — one entry per go.mod (weekly to reduce noise)
  - package-ecosystem: "gomod"
    directory: "/alsp"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/ccs"
