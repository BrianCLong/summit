services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: intelgraph
      POSTGRES_PASSWORD: password
      POSTGRES_DB: intelgraph
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelgraph"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15.0
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - 7687:7687
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1'"]
      interval: 5s
      timeout: 5s
      retries: 5
