services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: summit_test
      POSTGRES_PASSWORD: password
      POSTGRES_DB: summit_graph_sync
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summit_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.23.0
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7687:7687"
      - "7474:7474"
    healthcheck:
      test: ["CMD", "wget", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
