# Canonical list of required status checks for protected branches
# Order is stable and intentional (deterministic diffs)

version: 1
protected_branches:
  - main
  - release/*

required_checks:
  - Governance Meta Gate / meta-gate
  - GA Gate / gate
  - CI / Unit Tests (CI)
  - SOC Controls / SOC Controls
  - Unit Tests & Coverage / test (20.x)

notes:
  owner: summit-ga
  policy: docs/governance/branch-protection/README.md
