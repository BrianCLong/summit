release_status_blocked:
  - code: PREFLIGHT_ANCESTRY
    description: Tag not reachable from allowed branches
  - code: VERSION_MISMATCH
    description: Tag version does not match package/version constraints
  - code: FREEZE_WINDOW
    description: Release attempted during freeze window
  - code: VERIFY_FAILED
    description: Bundle verification failed
  - code: MISSING_ARTIFACTS
    description: Required artifacts missing from bundle
  - code: SECURITY_GUARD
    description: Security policy blocked release
  - code: UNKNOWN
    description: Unclassified failure

maestro_nogo:
  - code: BUNDLE_SCHEMA_INCOMPATIBLE
    description: Bundle schema major unsupported
  - code: BUNDLE_SCHEMA_INVALID
    description: Bundle violates schema validation
  - code: BUNDLE_INVALID_JSON
    description: Invalid JSON in bundle artifacts
  - code: BUNDLE_MISSING_FIELD
    description: Required field missing
  - code: BUNDLE_INVALID_VALUE
    description: Unsupported enum/value encountered

evidence_check:
  - code: EVIDENCE_MISSING
    description: Evidence file absent
  - code: EVIDENCE_EXPIRED
    description: Evidence expired
  - code: EVIDENCE_SHA_MISMATCH
    description: Evidence sha mismatch
  - code: EVIDENCE_BUNDLE_DIGEST_MISMATCH
    description: Evidence digest mismatch
  - code: EVIDENCE_NOT_GO
    description: Evidence decision not GO
  - code: DIR_EXTRA_FILE
    description: File found on disk but not in SHA256SUMS
  - code: HASH_MISMATCH
    description: File hash does not match SHA256SUMS
  - code: DIR_MISSING_FILE
    description: File in SHA256SUMS not found on disk
  - code: INDEX_EXTRA_FILE
    description: bundle-index.json lists file not in SHA256SUMS
  - code: INDEX_HASH_MISMATCH
    description: bundle-index.json hash mismatch
  - code: INDEX_MISSING_FILE
    description: SHA256SUMS lists file not in bundle-index.json
  - code: POINTER_INVALID
    description: bundle-index.json pointer is invalid
  - code: INDEX_PARSE_ERROR
    description: Failed to parse bundle-index.json
  - code: PROV_EXTRA_SUBJECT
    description: Provenance subject not in SHA256SUMS
  - code: PROV_HASH_MISMATCH
    description: Provenance hash mismatch
  - code: PROV_MISSING_SUBJECT
    description: SHA256SUMS file missing from Provenance subjects
  - code: PROV_PARSE_ERROR
    description: Failed to parse provenance.json
  - code: NOTES_MISSING
    description: notes-source.json exists but release-notes.md is missing
  - code: INTERNAL_ERROR
    description: An internal error occurred during verification

  - code: "SCHEMA_MAJOR_UNSUPPORTED"
    description: "The major schema version is not supported by the current tooling."
    severity: "error"
    action: "Upgrade tooling or use an older compatible schema."

  - code: "SCHEMA_VERSION_INVALID"
    description: "The schema version provided is invalid or malformed."
    severity: "error"
    action: "Correct the schema version format."

  - code: "JSON_PARSE_ERROR"
    description: "Failed to parse JSON file."
    severity: "error"
    action: "Ensure the file contains valid JSON."

  - code: "MISSING_FIELD"
    description: "A required field is missing from the payload."
    severity: "error"
    action: "Supply the missing field."

  - code: "INVALID_ENUM"
    description: "The provided value is not a valid enum member."
    severity: "error"
    action: "Use one of the allowed enum values."

  - code: "DRIFT_DETECTED"
    description: "Configuration drift detected between environments."
    severity: "error"
    action: "Reconcile drift before proceeding."

  - code: "DRIFT_ERROR"
    description: "An error occurred while checking for drift."
    severity: "error"
    action: "Investigate drift checker logs."

  - code: "SIG_ORPHAN"
    description: "A signature was found without a corresponding payload."
    severity: "error"
    action: "Ensure signatures are accompanied by their payloads."

  - code: "SIG_INVALID"
    description: "The provided signature is invalid."
    severity: "error"
    action: "Resign the payload with correct key."

  - code: "COSIGN_MISSING"
    description: "Cosign signature is missing."
    severity: "error"
    action: "Provide a valid cosign signature."

  - code: "SIG_MISSING"
    description: "A required signature is missing."
    severity: "error"
    action: "Ensure all required artifacts are signed."

  - code: "ATTESTATION_MISSING"
    description: "Required attestation is missing."
    severity: "error"
    action: "Generate and provide required SLSA attestation."

  - code: "SHA256SUMS_INVALID_FORMAT"
    description: "The sha256sums file is improperly formatted."
    severity: "error"
    action: "Regenerate sha256sums file in standard format."

  - code: "INVALID_JSON"
    description: "Invalid JSON encountered in strict mode."
    severity: "error"
    action: "Fix JSON syntax errors."
