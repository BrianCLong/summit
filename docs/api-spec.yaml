openapi: 3.0.0
info:
  title: IntelGraph Summit API
  version: 1.1.0
  description: API for IntelGraph Summit, including Maestro orchestration, policy simulation, and disclosure.

servers:
  - url: /api
    description: Base API path for most endpoints
  - url: /
    description: Root path for monitoring and health

paths:
  /monitoring/metrics:
    get:
      operationId: getMonitoringMetrics
      summary: Prometheus metrics
      tags: [Observability]
      responses:
        '200':
          description: Prometheus metrics text
          content:
            text/plain:
              schema:
                type: string

  /health:
    get:
      operationId: getHealth
      summary: System health check
      tags: [Observability]
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: Unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /api/tenants:
    post:
      summary: Create a new tenant
      tags: [Tenancy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'

    get:
      summary: List tenants (Admin only)
      tags: [Tenancy]
      responses:
        '200':
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tenant'

  /api/policy/simulate:
    post:
      summary: Simulate a policy decision (Preflight)
      tags: [Governance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicySimulationInput'
      responses:
        '200':
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicySimulationResult'

  /api/export/bundles:
    post:
      summary: Create an Intel Bundle export
      tags: [Disclosure]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBundleRequest'
      responses:
        '202':
          description: Bundle generation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatus'

  /api/receipts/{id}:
    get:
      summary: Get a signed receipt by ID
      tags: [Provenance]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Signed receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receipt'

  /api/approvals/v1/requests/{requestId}/simulate:
    post:
      summary: Re-run policy simulation for an approval request
      tags: [Governance]
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Simulation snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalPolicySimulationSnapshot'

  /api/approvals/v1/requests/{requestId}/receipts:
    get:
      summary: List receipts for an approval request
      tags: [Provenance]
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated list of top-level fields for selective disclosure.
      responses:
        '200':
          description: Receipts for this request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptListResponse'

  /api/approvals/v1/receipts/{receiptId}:
    get:
      summary: Get a single approval receipt with optional selective disclosure
      tags: [Provenance]
      parameters:
        - name: receiptId
          in: path
          required: true
          schema:
            type: string
        - name: X-Tenant-ID
          in: header
          required: true
          schema:
            type: string
        - name: fields
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated list of top-level fields for selective disclosure.
      responses:
        '200':
          description: Receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptV1'

  /api/maestro/route/preview:
    post:
      operationId: previewRoute
      summary: Preview routing candidates for a task
      tags: [Maestro]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                task:
                  type: string
                context:
                  type: object
      responses:
        '200':
          description: List of candidates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutePreviewResponse'

  /api/maestro/route/execute:
    post:
      operationId: executeRoute
      summary: Execute a task with selected candidates
      tags: [Maestro]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                task:
                  type: string
                selection:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Execution results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteExecuteResponse'

  /api/maestro/web/interfaces:
    get:
      operationId: getWebInterfaces
      summary: Get available web interfaces
      tags: [Maestro]
      responses:
        '200':
          description: List of web interfaces
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebInterfacesResponse'

  /api/maestro/web/run:
    post:
      operationId: runWebOrchestration
      summary: Orchestrate web search/content tasks
      tags: [Maestro]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                task:
                  type: string
                interfaces:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Orchestration results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestrateWebResponse'

  /api/maestro/budgets:
    get:
      operationId: getBudgets
      summary: Get budget and usage information
      tags: [Maestro]
      responses:
        '200':
          description: Budget info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetsResponse'

  /api/maestro/policy/check:
    post:
      operationId: checkPolicy
      summary: Check policy for an action
      tags: [Maestro]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                payload:
                  type: object
      responses:
        '200':
          description: Policy check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyCheckResponse'

  /api/maestro/runs:
    post:
      operationId: createRun
      summary: Create and run a new pipeline
      tags: [Maestro]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                requestText:
                  type: string
      responses:
        '200':
          description: Run created
          content:
            application/json:
              schema:
                type: object

  /api/tenants/{tenantId}/workflows:
    post:
      operationId: createWorkflowDefinition
      summary: Create or update a workflow definition
      tags: [Maestro]
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowDefinitionInput'
      responses:
        '201':
          description: Workflow definition created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDefinition'

  /api/tenants/{tenantId}/runs:
    post:
      operationId: startRun
      summary: Start a new run from a workflow definition
      tags: [Maestro]
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartRunInput'
      responses:
        '201':
          description: Run started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'

  /api/tenants/{tenantId}/runs/{runId}:
    get:
      operationId: getRun
      summary: Get run details including receipts
      tags: [Maestro]
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Run details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'

  /api/tenants/{tenantId}/runs/{runId}/approve:
    post:
      operationId: approveRun
      summary: Approve or reject a run/step
      tags: [Maestro]
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: runId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalInput'
      responses:
        '200':
          description: Approval processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResult'

  /api/tenants/{tenantId}/runs/{runId}/events:
    get:
      operationId: getRunEvents
      summary: Get timeline events for a run
      tags: [Maestro]
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunEvent'

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        timestamp:
          type: string
          format: date-time
        error:
          type: string

    CreateTenantRequest:
      type: object
      required: [name, slug, adminEmail]
      properties:
        name:
          type: string
        slug:
          type: string
        adminEmail:
          type: string
        tier:
          type: string
          enum: [internal, partner, hosted]
        policyProfile:
          type: string
          enum: [strict, balanced, fast_ops]

    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        tier:
          type: string
        status:
          type: string

    Actor:
      type: object
      required: [id]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
        attributes:
          type: object
          additionalProperties: true

    PolicySimulationInput:
      type: object
      required: [subjectTenantId, resourceTenantId, action]
      properties:
        subjectTenantId:
          type: string
        resourceTenantId:
          type: string
        action:
          type: string
        purpose:
          type: string
        justification:
          type: string
        profile:
          type: string
          enum: [strict, balanced, fast_ops]
          description: Optional profile to simulate against

    PolicySimulationResult:
      type: object
      properties:
        allow:
          type: boolean
        reason:
          type: string
        overlaysApplied:
          type: array
          items:
            type: string
        evaluationPath:
          type: array
          items:
            type: string

    CreateBundleRequest:
      type: object
      required: [runId]
      properties:
        runId:
          type: string
        redactionProfile:
          type: string
          enum: [none, sources, raw_content, actor_ids, minimize_pii]
        includeReceipts:
          type: boolean

    JobStatus:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [queued, processing, completed, failed]

    Receipt:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        action:
          type: string
        actor:
          type: string
        resource:
          type: string
        inputHash:
          type: string
        policyDecisionId:
          type: string
        signature:
          type: string
        signerKeyId:
          type: string

    RiskTier:
      type: string
      enum: [low, medium, high, critical]

    CostEstimateSnapshot:
      type: object
      properties:
        currency:
          type: string
        amount:
          type: number
        confidence:
          type: number
          minimum: 0
          maximum: 1

    ReceiptV1:
      type: object
      required:
        - schema_version
        - id
        - approval_id
        - tenant_id
        - actor
        - decision
        - timestamp
        - policy_version
        - input_hash
        - signature
        - key_id
      properties:
        schema_version:
          type: string
          example: switchboard.receipt.v1
        id:
          type: string
        approval_id:
          type: string
        tenant_id:
          type: string
        actor:
          $ref: '#/components/schemas/Actor'
        decision:
          type: string
          enum: [created, approve, reject, cancelled]
        timestamp:
          type: string
          format: date-time
        policy_version:
          type: string
        policy_decision_hash:
          type: string
        pre_state_hash:
          type: string
        post_state_hash:
          type: string
        risk_tier:
          $ref: '#/components/schemas/RiskTier'
        cost_estimate:
          $ref: '#/components/schemas/CostEstimateSnapshot'
        input_hash:
          type: string
        signature:
          type: string
        key_id:
          type: string

    ReceiptListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReceiptV1'
        total:
          type: integer

    ApprovalPolicySimulationSnapshot:
      type: object
      required:
        - request_id
        - tenant_id
        - simulated_at
        - simulation_hash
        - policy
        - risk_tier
        - privileged
      properties:
        request_id:
          type: string
        tenant_id:
          type: string
        simulated_at:
          type: string
          format: date-time
        simulation_hash:
          type: string
        policy:
          $ref: '#/components/schemas/PolicySimulationResult'
        risk_tier:
          $ref: '#/components/schemas/RiskTier'
        privileged:
          type: boolean

    Candidate:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [model, web]
        name:
          type: string
        score:
          type: number
        cost_est:
          type: number
        latency_est_ms:
          type: number
        rationale:
          type: string

    RoutePreviewResponse:
      type: object
      properties:
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/Candidate'

    RouteExecuteStep:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
        status:
          type: string
          enum: [ok, fail]
        tokens:
          type: number
        cost:
          type: number
        citations:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              url:
                type: string
        elapsed_ms:
          type: number

    RouteExecuteResponse:
      type: object
      properties:
        runId:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/RouteExecuteStep'

    WebInterface:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        reliability:
          type: number
        cost_hint:
          type: number

    WebInterfacesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WebInterface'

    OrchestrateWebResponse:
      type: object
      properties:
        responses:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              interface:
                type: string
              text:
                type: string
              citations:
                type: array
                items:
                  type: object
                  properties:
                    title:
                      type: string
                    url:
                      type: string
        synthesized:
          type: object
          properties:
            text:
              type: string
            citations:
              type: array
              items:
                type: object
                properties:
                  title:
                    type: string
                  url:
                    type: string

    BudgetsResponse:
      type: object
      properties:
        tier:
          type: string
          enum: [bronze, silver, gold]
        remaining:
          type: object
          properties:
            tokens:
              type: number
            usd:
              type: number
        burndown:
          type: array
          items:
            type: object
            properties:
              t:
                type: string
              usd:
                type: number
              tokens:
                type: number

    PolicyCheckResponse:
      type: object
      properties:
        allowed:
          type: boolean
        reason:
          type: string
        elevation:
          type: object
          properties:
            contact:
              type: string
            sla_hours:
              type: number

    WorkflowDefinitionInput:
      type: object
      required: [version, env, retentionClass, costCenter, inputSchema, outputSchema, body]
      properties:
        version:
          type: string
        env:
          type: string
        retentionClass:
          type: string
        costCenter:
          type: string
        inputSchema:
          type: string
        outputSchema:
          type: string
        body:
          type: string

    WorkflowDefinition:
      allOf:
        - $ref: '#/components/schemas/WorkflowDefinitionInput'
        - type: object
          properties:
            id:
              type: string
            tenantId:
              type: string
            createdAt:
              type: string
            updatedAt:
              type: string

    StartRunInput:
      type: object
      required: [workflowId, input]
      properties:
        workflowId:
          type: string
        input:
          type: string
        env:
          type: string

    Run:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        workflowId:
          type: string
        status:
          type: string
          enum: [PENDING, RUNNING, COMPLETED, FAILED, CANCELLED, NEEDS_APPROVAL]
        startedAt:
          type: string
        completedAt:
          type: string
        input:
          type: string
        output:
          type: string
        receipts:
          type: array
          items:
            $ref: '#/components/schemas/Receipt'

    ApprovalInput:
      type: object
      required: [decision, rationale]
      properties:
        decision:
          type: string
          enum: [APPROVE, REJECT]
        rationale:
          type: string
        stepId:
          type: string

    ApprovalResult:
      type: object
      properties:
        status:
          type: string

    RunEvent:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        timestamp:
          type: string
        payload:
          type: string
