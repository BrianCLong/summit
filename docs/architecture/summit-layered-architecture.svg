<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Summit Layered Architecture</title>
  <desc id="desc">Four-layer architecture showing progression from developer utilities to trust pipeline engine.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#101A2F"/>
    </linearGradient>
    <linearGradient id="layer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#172A46"/>
      <stop offset="100%" stop-color="#1F3A63"/>
    </linearGradient>
    <style>
      .h1 { font: 700 44px Inter,Segoe UI,Arial,sans-serif; fill: #F8FAFC; }
      .h2 { font: 600 24px Inter,Segoe UI,Arial,sans-serif; fill: #E2E8F0; }
      .p { font: 400 20px Inter,Segoe UI,Arial,sans-serif; fill: #CBD5E1; }
      .small { font: 500 18px Inter,Segoe UI,Arial,sans-serif; fill: #94A3B8; }
      .label { font: 700 28px Inter,Segoe UI,Arial,sans-serif; fill: #F8FAFC; }
      .cap { font: 500 20px Inter,Segoe UI,Arial,sans-serif; fill: #CFE2FF; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#60A5FA"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="700" y="80" text-anchor="middle" class="h1">Summit Architecture Evolution</text>
  <text x="700" y="120" text-anchor="middle" class="h2">Utilities → EUP → EvidenceFlow → Trust Pipeline Engine</text>

  <rect x="270" y="680" width="860" height="130" rx="18" fill="url(#layer)" stroke="#3B82F6" stroke-width="2"/>
  <text x="700" y="735" text-anchor="middle" class="label">Layer 1 · Developer Utilities</text>
  <text x="700" y="770" text-anchor="middle" class="cap">Hash, JSON, Base64, UUID, Time Canonicalization</text>

  <rect x="230" y="500" width="940" height="130" rx="18" fill="url(#layer)" stroke="#3B82F6" stroke-width="2"/>
  <text x="700" y="555" text-anchor="middle" class="label">Layer 2 · Evidence Utility Platform (EUP)</text>
  <text x="700" y="590" text-anchor="middle" class="cap">Every utility execution emits report.json, metrics.json, stamp.json</text>

  <rect x="190" y="320" width="1020" height="130" rx="18" fill="url(#layer)" stroke="#3B82F6" stroke-width="2"/>
  <text x="700" y="375" text-anchor="middle" class="label">Layer 3 · EvidenceFlow DAG</text>
  <text x="700" y="410" text-anchor="middle" class="cap">Composable transformation graph with deterministic lineage artifacts</text>

  <rect x="150" y="140" width="1100" height="130" rx="18" fill="url(#layer)" stroke="#3B82F6" stroke-width="2"/>
  <text x="700" y="195" text-anchor="middle" class="label">Layer 4 · Trust Pipeline Engine</text>
  <text x="700" y="230" text-anchor="middle" class="cap">Policy validation + cryptographic attestation for AI, CI/CD, and compliance pipelines</text>

  <line x1="700" y1="670" x2="700" y2="640" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="700" y1="490" x2="700" y2="460" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="700" y1="310" x2="700" y2="280" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="100" y="845" class="small">Outcome: Pipeline Execution → Evidence Chain → Trust Attestation</text>
</svg>
