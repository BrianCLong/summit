<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Trust Pipeline Example Walkthrough</title>
  <desc id="desc">Example dataset-to-attestation pipeline with emitted evidence artifacts at each stage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#14213D"/>
    </linearGradient>
    <style>
      .title { font: 700 40px Inter,Segoe UI,Arial,sans-serif; fill: #F8FAFC; }
      .step { font: 700 24px Inter,Segoe UI,Arial,sans-serif; fill: #F8FAFC; }
      .desc { font: 500 18px Inter,Segoe UI,Arial,sans-serif; fill: #CBD5E1; }
      .artifact { font: 600 16px Inter,Segoe UI,Arial,sans-serif; fill: #E2E8F0; }
      .footer { font: 500 18px Inter,Segoe UI,Arial,sans-serif; fill: #94A3B8; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#7DD3FC"/>
    </marker>
  </defs>

  <rect width="1600" height="920" fill="url(#bg)"/>
  <text x="800" y="70" text-anchor="middle" class="title">Summit Trust Pipeline Example Walkthrough</text>

  <rect x="70" y="180" width="260" height="140" rx="16" fill="#1D4ED8"/>
  <text x="200" y="235" text-anchor="middle" class="step">1. Dataset</text>
  <text x="200" y="268" text-anchor="middle" class="desc">Input: dataset.csv</text>

  <rect x="370" y="180" width="260" height="140" rx="16" fill="#2563EB"/>
  <text x="500" y="235" text-anchor="middle" class="step">2. Transform</text>
  <text x="500" y="268" text-anchor="middle" class="desc">Normalize + canonicalize</text>

  <rect x="670" y="180" width="260" height="140" rx="16" fill="#1E40AF"/>
  <text x="800" y="235" text-anchor="middle" class="step">3. Train</text>
  <text x="800" y="268" text-anchor="middle" class="desc">Model build execution</text>

  <rect x="970" y="180" width="260" height="140" rx="16" fill="#1D4ED8"/>
  <text x="1100" y="235" text-anchor="middle" class="step">4. Evaluate</text>
  <text x="1100" y="268" text-anchor="middle" class="desc">Metrics + regression gates</text>

  <rect x="1270" y="180" width="260" height="140" rx="16" fill="#0F766E"/>
  <text x="1400" y="235" text-anchor="middle" class="step">5. Attest</text>
  <text x="1400" y="268" text-anchor="middle" class="desc">Sign + verify trust bundle</text>

  <line x1="330" y1="250" x2="370" y2="250" stroke="#7DD3FC" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="630" y1="250" x2="670" y2="250" stroke="#7DD3FC" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="930" y1="250" x2="970" y2="250" stroke="#7DD3FC" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1230" y1="250" x2="1270" y2="250" stroke="#7DD3FC" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="95" y="380" width="220" height="160" rx="12" fill="#1E293B" stroke="#334155"/>
  <text x="205" y="420" text-anchor="middle" class="artifact">Artifacts</text>
  <text x="110" y="455" class="artifact">• dataset_hash</text>
  <text x="110" y="485" class="artifact">• stamp.json</text>

  <rect x="395" y="380" width="220" height="180" rx="12" fill="#1E293B" stroke="#334155"/>
  <text x="505" y="420" text-anchor="middle" class="artifact">Artifacts</text>
  <text x="410" y="455" class="artifact">• normalized_data</text>
  <text x="410" y="485" class="artifact">• report.json</text>
  <text x="410" y="515" class="artifact">• metrics.json</text>

  <rect x="695" y="380" width="220" height="180" rx="12" fill="#1E293B" stroke="#334155"/>
  <text x="805" y="420" text-anchor="middle" class="artifact">Artifacts</text>
  <text x="710" y="455" class="artifact">• model.bin</text>
  <text x="710" y="485" class="artifact">• train_report.json</text>
  <text x="710" y="515" class="artifact">• lineage.json</text>

  <rect x="995" y="380" width="220" height="180" rx="12" fill="#1E293B" stroke="#334155"/>
  <text x="1105" y="420" text-anchor="middle" class="artifact">Artifacts</text>
  <text x="1010" y="455" class="artifact">• evaluation.json</text>
  <text x="1010" y="485" class="artifact">• perf_metrics.json</text>
  <text x="1010" y="515" class="artifact">• gate_report.json</text>

  <rect x="1295" y="380" width="220" height="200" rx="12" fill="#1E293B" stroke="#334155"/>
  <text x="1405" y="420" text-anchor="middle" class="artifact">Artifacts</text>
  <text x="1310" y="455" class="artifact">• attestation.json</text>
  <text x="1310" y="485" class="artifact">• trust_bundle.json</text>
  <text x="1310" y="515" class="artifact">• verification_result</text>
  <text x="1310" y="545" class="artifact">• policy_verdict.json</text>

  <rect x="250" y="650" width="1100" height="170" rx="16" fill="#0B2A43" stroke="#38BDF8" stroke-width="2"/>
  <text x="800" y="700" text-anchor="middle" class="step">Final Trust Bundle</text>
  <text x="800" y="735" text-anchor="middle" class="desc">artifact/ + evidence/ + lineage/ + attestation/</text>
  <text x="800" y="770" text-anchor="middle" class="desc">Deterministic execution with machine-verifiable provenance</text>

  <text x="70" y="880" class="footer">Pipeline contract: dataset → transform → train → evaluate → attest</text>
</svg>
