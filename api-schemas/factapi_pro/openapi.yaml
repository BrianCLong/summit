openapi: 3.0.0
info:
  title: FactAPI Pro
  description: White-label verification API
  version: 1.0.0
servers:
  - url: /v1
paths:
  /verify:
    post:
      summary: Verify a claim
      operationId: verifyClaim
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRequest'
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyResponse'
        '401':
          description: Unauthorized
        '503':
          description: Service Unavailable
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    VerifyRequest:
      type: object
      required:
        - claim
      properties:
        claim:
          type: string
        context:
          type: string
    VerifyResponse:
      type: object
      required:
        - verified
        - score
        - reasoning
      properties:
        verified:
          type: boolean
        score:
          type: number
          format: float
        reasoning:
          type: string
        timestamp:
          type: string
