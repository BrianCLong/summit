apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-graph-analytics
  labels:
    app: gpu-graph-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-graph-analytics
  template:
    metadata:
      labels:
        app: gpu-graph-analytics
    spec:
      containers:
        - name: gpu-graph-analytics
          image: internal-registry/gpu-graph-analytics:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              nvidia.com/gpu: 1
            limits:
              nvidia.com/gpu: 1
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gpu-graph-analytics
  labels:
    app: gpu-graph-analytics
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: gpu-graph-analytics
