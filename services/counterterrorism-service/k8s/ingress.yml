apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: counterterrorism-ingress
  namespace: intelligence
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: basic-auth
    nginx.ingress.kubernetes.io/auth-realm: 'Counterterrorism Services - Authorized Access Only'
spec:
  tls:
    - hosts:
        - counterterrorism.example.com
        - threat-assessment.example.com
      secretName: counterterrorism-tls
  rules:
    - host: counterterrorism.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: counterterrorism-service
                port:
                  number: 3020
    - host: threat-assessment.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: threat-assessment-service
                port:
                  number: 3021
