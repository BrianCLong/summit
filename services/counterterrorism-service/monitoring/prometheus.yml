global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'counterterrorism-platform'
    environment: 'production'

scrape_configs:
  - job_name: 'counterterrorism-service'
    static_configs:
      - targets: ['counterterrorism-service:3020']
    metrics_path: '/metrics'

  - job_name: 'threat-assessment-service'
    static_configs:
      - targets: ['threat-assessment-service:3021']
    metrics_path: '/metrics'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - 'alerts.yml'
