version: '3.8'
services:
  runner:
    build: .
    environment:
      - PORT=4012
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - OPA_URL=http://opa:8181
      - POLICY_DRY_RUN=true
      - HITL_PUBKEY_PEM=${HITL_PUBKEY_PEM}
    ports:
      - "8080:4012"
    depends_on:
      - redis
      - opa

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  opa:
    image: openpolicyagent/opa:latest-static
    ports:
      - "8181:8181"
    volumes:
      - ./sidecar/opa-config.yaml:/config/opa-config.yaml
      - ../../policy/opa:/policies
    command:
      - "run"
      - "--server"
      - "--config-file=/config/opa-config.yaml"
      - "/policies"
