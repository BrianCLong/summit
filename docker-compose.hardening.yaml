services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: summit-server:latest
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://summit:summit@postgres:5432/summit
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=summit-password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=hardening-secret-at-least-32-chars-long-!!!
      - JWT_REFRESH_SECRET=hardening-refresh-secret-at-least-32-chars-long-!!!
      - SKIP_FEDERAL_CHECKS=false
      - ALLOW_SOFTWARE_CRYPTO=true
      - OTEL_SERVICE_NAME=summit-server-hardening
    depends_on:
      - postgres
      - redis
      - neo4j
    networks:
      - summit

  api-gateway:
    build:
      context: ./services/api-gateway
    image: summit-gateway:latest
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - GRAPH_SERVICE_URL=http://server:3000
      - AGENT_RUNTIME_URL=http://agent-runtime:4012
      - PROV_LEDGER_URL=http://prov-ledger:4010
      - XAI_EXPLAIN_ANOMALY_URL=http://xai-explain-anomaly:4000
      - GRAPH_XAI_URL=http://graph-xai:4011
      - PREDICTIVE_SUITE_URL=http://predictd:4001
    depends_on:
      - server
      - agent-runtime
      - prov-ledger
      - xai-explain-anomaly
      - graph-xai
      - predictd
    networks:
      - summit

  nl-cypher:
    build:
      context: ./services/nl-cypher
    image: summit-nl-cypher:latest
    environment:
      - PORT=8080
      - NODE_ENV=development
    networks:
      - summit

  agent-runtime:
    build:
      context: ./services/agent-runtime
    image: summit-agent-runtime:latest
    environment:
      - PORT=4012
      - NODE_ENV=production
    networks:
      - summit

  xai-explain-anomaly:
    build:
      context: ./services/xai-explain-anomaly
    image: summit-xai-explain-anomaly:latest
    environment:
      - PORT=4000
      - NODE_ENV=development
    networks:
      - summit

  prov-ledger:
    build:
      context: ./services/prov-ledger
    image: summit-prov-ledger:latest
    environment:
      - PORT=4010
      - NODE_ENV=development
    networks:
      - summit

  graph-xai:
    build:
      context: ./services/graph-xai
    image: summit-graph-xai:latest
    environment:
      - PORT=4011
      - NODE_ENV=production
    networks:
      - summit

  predictd:
    build:
      context: ./services/predictd
    image: summit-predictd:latest
    environment:
      - PORT=4001
      - NODE_ENV=production
    networks:
      - summit

  neo4j:
    image: neo4j:5.12
    environment:
      - NEO4J_AUTH=neo4j/summit-password
      - NEO4J_PLUGINS=["apoc"]
    networks:
      - summit

  redis:
    image: redis:7-alpine
    networks:
      - summit

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=summit
      - POSTGRES_USER=summit
      - POSTGRES_PASSWORD=summit
    networks:
      - summit

networks:
  summit:
    driver: bridge
