global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  - "alert_rules.yml"
  - "summit-alerts.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'intelgraph-server'
    static_configs:
      - targets: ['api:4000']
    metrics_path: '/metrics'

  - job_name: 'intelgraph-ml'
    static_configs:
      - targets: ['ai-sandbox:4020']
    metrics_path: '/metrics'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'neo4j-exporter'
    static_configs:
      - targets: ['neo4j-exporter:9113']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'summit-python'
    static_configs:
      - targets: ['summit-python:8000']
    metrics_path: '/metrics'

  - job_name: 'blackbox-routing'
    metrics_path: '/probe'
    params:
      module: ['http_2xx']
    static_configs:
      - targets: ['https://edge.intelgraph.ai/health']
        labels:
          region: us-east
          asn: AS7922
          provider: isp
      - targets: ['https://edge.intelgraph.ai/health']
        labels:
          region: us-west
          asn: AS7018
          provider: isp
      - targets: ['https://edge.intelgraph.ai/health']
        labels:
          region: eu-central
          asn: AS3209
          provider: isp
      - targets: ['https://edge.intelgraph.ai/health']
        labels:
          region: ap-southeast
          asn: AS2914
          provider: isp
      - targets: ['https://edge.intelgraph.ai/health']
        labels:
          region: us-east
          asn: AS16509
          provider: cloud
      - targets: ['https://edge.intelgraph.ai/health']
        labels:
          region: us-central
          asn: AS15169
          provider: cloud
      - targets: ['https://edge.intelgraph.ai/health']
        labels:
          region: eu-west
          asn: AS8075
          provider: cloud
    relabel_configs:
      - source_labels: ['__address__']
        target_label: '__param_target'
      - source_labels: ['__param_target']
        target_label: 'instance'
      - target_label: '__address__'
        replacement: 'blackbox-exporter:9115'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
