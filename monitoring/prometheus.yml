#       max_shards: 200
#       capacity: 10000
#     write_relabel_configs:
#       - source_labels: [__name__]
#         regex: 'go_.*'
#         action: drop

# Storage configuration
storage:
  tsdb:
    retention:
      time: 30d
      size: 50GB
    wal_compression: true
