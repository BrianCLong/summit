# Prometheus Configuration for Summit Governance Monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'summit-governance'
    environment: 'production'

# Scrape configurations
scrape_configs:
  # Summit Application
  - job_name: 'summit-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: 'summit-api'

  # OPA (Open Policy Agent)
  - job_name: 'opa'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['opa:8181']
        labels:
          service: 'opa'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
