global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/alerts.yaml"

scrape_configs:
  - job_name: 'summit-server'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['server:4000']
        labels:
          service: 'summit-api'
          env: 'development'

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'neo4j-exporter'
    static_configs:
      - targets: ['neo4j-exporter:9308']

  - job_name: 'blackbox-routing'
    metrics_path: '/probe'
    params:
      module: ['http_2xx']
    static_configs:
      - targets: ['https://edge.intelgraph.ai/health']
        labels:
          region: us-east
          asn: AS7922
          provider: isp
      - targets: ['https://edge.intelgraph.ai/health']
        labels:
          region: eu-central
          asn: AS3209
          provider: isp
      - targets: ['https://edge.intelgraph.ai/health']
        labels:
          region: ap-southeast
          asn: AS2914
          provider: isp
      - targets: ['https://edge.intelgraph.ai/health']
        labels:
          region: us-east
          asn: AS16509
          provider: cloud
      - targets: ['https://edge.intelgraph.ai/health']
        labels:
          region: eu-west
          asn: AS8075
          provider: cloud
    relabel_configs:
      - source_labels: ['__address__']
        target_label: '__param_target'
      - source_labels: ['__param_target']
        target_label: 'instance'
      - target_label: '__address__'
        replacement: 'blackbox-exporter:9115'
