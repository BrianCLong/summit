type AiInfluenceCampaign {
  campaignId: ID!
  actorIds: [ID!]!
  objectives: [String!]!
  tacticIds: [String!]!
  techniqueIds: [String!]!
  aiUsage: [AiUsage!]!
  evidenceIds: [ID!]!
}

type AiUsage {
  phase: String!
  capability: String!
  evidenceIds: [ID!]!
}

extend type Query {
  aiInfluenceCampaign(campaignId: ID!): AiInfluenceCampaign
  aiInfluenceCampaignsByTactic(tacticId: String!): [AiInfluenceCampaign!]!
}
