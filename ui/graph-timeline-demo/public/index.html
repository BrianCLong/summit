<!doctype html><html><head><meta charset="utf-8"><title>Graph–Timeline Demo</title>
<style>
body{margin:0;font-family:Arial}
#root{display:flex;height:100vh}
#graph{width:60%;height:100%}
#right{width:40%;display:flex;flex-direction:column}
#timeline{height:40%}
#map{height:60%}
.vis-item.normal { background:#dfe8ff; border-color:#8aa4ff; }
.vis-item.suspicious { background:#fff4cc; border-color:#e1b700; }
.vis-item.anomaly { background:#ffd6d6; border-color:#d9534f; }
.badge {
  position:absolute; top:12px; left:12px; z-index:9999;
  background:rgba(0,0,0,0.75); color:#fff; padding:8px 10px;
  border-radius:8px; font-size:12px;
}
</style></head>
<body>
  <div class="badge" id="graph-mode-badge">mode: loading</div>
  <div id="root">
    <div id="graph"></div>
    <div id="right">
      <div id="timeline"></div>
      <div id="map"></div>
    </div>
  </div>
  <script type="module" src="../src/GraphTimelineDemo.jsx"></script>
</body>
</html>
