alerts:
  - name: "behavior_forecast_calibration_drift"
    description: "Fires when the 7-day average calibration error exceeds the baseline by 15%."
    severity: "warning"
    runbook_url: "docs/ops/runbooks/behavior-forecasting-platform.md"
