groups:
  - name: release-captain-control-plane
    interval: 30s
    rules:
      - record: rc:workflow_failure_ratio:5m
        expr: |
          sum(rate(rc_workflow_failure_total[5m]))
          /
          clamp_min(sum(rate(rc_workflow_runs_total[5m])), 0.001)

      - record: rc:gate_failure_ratio:15m
        expr: |
          sum by (gate) (rate(rc_gate_total{result="fail"}[15m]))
          /
          clamp_min(sum by (gate) (rate(rc_gate_total[15m])), 0.001)

      - record: rc:pr_time_to_merge_p95_seconds:30m
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(rc_pr_time_to_merge_seconds_bucket[30m])) by (le)
          )

      - alert: ReleaseCaptainWorkflowFailureRateHigh
        expr: rc:workflow_failure_ratio:5m > 0.15
        for: 15m
        labels:
          severity: page
          service: release-captain
          category: control-plane
        annotations:
          summary: "Release Captain workflow failure ratio is above 15%"
          description: "Workflow failures are above the GA-safe threshold for 15m. Check failing required checks and deployment gate status before allowing merges."
          runbook_url: "https://github.com/${GITHUB_REPOSITORY}/blob/main/ops/observability/runbooks/release-captain-control-plane.md#workflow-failure-ratio"

      - alert: ReleaseCaptainGateFailureConcentrated
        expr: max(rc:gate_failure_ratio:15m) > 0.25
        for: 15m
        labels:
          severity: page
          service: release-captain
          category: control-plane
        annotations:
          summary: "A required gate has a failure ratio above 25%"
          description: "A single quality gate is failing repeatedly and is likely the dominant merge blocker. Use the gate-failure panel to identify the gate and route to the owning team."
          runbook_url: "https://github.com/${GITHUB_REPOSITORY}/blob/main/ops/observability/runbooks/release-captain-control-plane.md#gate-failure-concentration"

      - alert: ReleaseCaptainMergeLatencyP95High
        expr: rc:pr_time_to_merge_p95_seconds:30m > 10800
        for: 20m
        labels:
          severity: warning
          service: release-captain
          category: control-plane
        annotations:
          summary: "PR time-to-merge p95 exceeds 3 hours"
          description: "Merge readiness is degrading. Check queueing in required checks, gate retries, and deployment windows before opening additional release trains."
          runbook_url: "https://github.com/${GITHUB_REPOSITORY}/blob/main/ops/observability/runbooks/release-captain-control-plane.md#merge-latency-p95"

      - alert: ReleaseCaptainCircuitBreakerOpen
        expr: max_over_time(rc_circuit_state[10m]) >= 2
        for: 10m
        labels:
          severity: page
          service: release-captain
          category: control-plane
        annotations:
          summary: "Release Captain circuit breaker is OPEN"
          description: "Automation safety circuit is open for at least 10 minutes. Pause automated promotions and execute rollback decision checks."
          runbook_url: "https://github.com/${GITHUB_REPOSITORY}/blob/main/ops/observability/runbooks/release-captain-control-plane.md#circuit-breaker-open"

      - alert: ReleaseCaptainRollbackSpike
        expr: increase(rc_rollback_total[30m]) >= 2
        for: 5m
        labels:
          severity: page
          service: release-captain
          category: control-plane
        annotations:
          summary: "Rollback count spiked in the last 30 minutes"
          description: "Two or more rollbacks in 30 minutes indicate unstable deployments. Freeze further merges until root cause is identified."
          runbook_url: "https://github.com/${GITHUB_REPOSITORY}/blob/main/ops/observability/runbooks/release-captain-control-plane.md#rollback-spike"
