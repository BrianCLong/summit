# Routing Rules
routing_rules:
  # Cross-domain changes require synthesis PR
  cross_domain_policy: synthesis_required

  # Default domain for unclassified files
  default_domain: platform-runtime

  # Interface spine exceptions
  interface_spine_domain: platform-interface

  # Documentation routes to docs domain
  documentation_patterns:
    - "docs/**"
    - "*.md"
    - "README"

  # Configuration routes to config domain
  config_patterns:
    - ".github/**"
    - "*.yml"
    - "*.yaml"
    - "*.json"
    - "package.json"

# Consolidation Tracking
consolidation:
  phase: "initial"
  target_completion: "2026-06-09"
  estimated_entropy_reduction: 5.12
  projected_subsystem_count: 35
  current_frontier_entropy: 1.20
  target_frontier_entropy: 0.25

# Meta-Governance
meta_governance:
  protected: true
  requires_multi_party_approval: true
  approval_count: 3
  approval_groups:
    - architecture-owners
    - governance-owners
    - platform-owners
