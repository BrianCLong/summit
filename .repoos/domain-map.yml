# Summit Domain Topology
#
# Hierarchical architecture consolidating 978 subsystems → 35 domains
# This enables deterministic routing, frontier entropy control, and
# autonomous architecture synthesis.
#
# Structure:
#   Domain (architectural boundary)
#     ├── Capabilities (functional groups)
#     └── Subsystems (implementation units)

version: "1.0.0"
generated: "2026-03-09"
subsystem_count_target: 35
current_subsystem_count: 978
consolidation_ratio: 27.9

domains:
  # Core Platform
  repoos-core:
    description: "Repository operating system core infrastructure"
    frontier: platform
    owner_team: architecture-owners
    capabilities:
      - router
      - evolution-ledger
      - governance
      - consolidation
    subsystem_patterns:
      - ".repoos/**"
      - "scripts/repoos/**"
      - "packages/repoos-*/**"

  platform-runtime:
    description: "Core platform execution and runtime services"
    frontier: platform
    owner_team: platform-owners
    capabilities:
      - execution
      - lifecycle
      - resource-management
    subsystem_patterns:
      - "packages/summit-core/**"
      - "packages/summit-runtime/**"
      - "server/src/platform/**"

  # Intelligence & Analytics
