constitution_version: 1.0

# Evolution Constitution
#
# Machine-enforced policy framework that defines immutable operational laws
# for the repository. These rules ensure that even future maintainers cannot
# accidentally dismantle the RepoOS architecture.

laws:

  frontier_sovereignty:
    enforce: true
    description: >
      No direct modification of frontier-owned domains.
      All changes must enter through the patch routing system.
    violations:
      - Direct commits to frontier-owned files
      - Merges bypassing frontier synthesis
    enforcement:
      - CI check: scripts/repoos/check-frontier-sovereignty.mjs
    exceptions:
      - Emergency security patches (requires approval)
      - RepoOS system files

  deterministic_integration:
    enforce: true
    description: >
      Repository evolution must be reproducible.
      Given identical inputs, RepoOS must produce identical merge results.
    requirements:
      - Deterministic patch ordering in windows
      - Deterministic frontier synthesis
      - Deterministic artifact generation
    enforcement:
      - Patch timestamps recorded
      - Synthesis process logged
      - Artifacts version controlled

  evidence_preservation:
    enforce: true
    description: >
      All repository evolution must produce evidence artifacts.
      No work may disappear from repository history.
    artifacts_required:
      - patch.json for all patches
      - evaluation.json for assessments
      - frontier.json for convergence state
      - merge-decision.json for PR outcomes
    storage:
      - Active: .repoos/pr-classifications/
      - Archive: .repoos/evidence-archive/
    enforcement:
      - CI artifact validation
      - Evidence graph indexing

  system_homeostasis:
    enforce: true
    description: >
      Repository must maintain operational health automatically.
      RepoOS must respond to instability signals.
    monitored_signals:
      - Entropy velocity (FEV)
      - Merge latency
      - Frontier explosion
      - CI queue depth
      - Patch backlog
    automatic_responses:
      - Reduce patch ingestion rate
      - Expand patch windows
      - Limit frontier concurrency
      - Force frontier convergence
    thresholds:
      entropy_velocity_critical: 0.01  # /s
      max_active_frontiers: 300
      merge_latency_warning: 1800  # 30 minutes
      ci_queue_critical: 20

  evolutionary_continuity:
    enforce: true
    description: >
      Repository must remain capable of self-evolution.
      Core RepoOS components may not be removed or disabled.
    protected_components:
      - services/repoos/concern-router.mjs
      - services/repoos/frontier-engine.mjs
      - services/repoos/frontier-lock.mjs
      - services/repoos/patch-window-manager.mjs
      - services/repoos/frontier-entropy.mjs
      - services/repoos/patch-market.mjs
      - services/evolution-ledger/decision-api.mjs
      - scripts/pr/classify-pr.mjs
    enforcement:
      - CI check for component removal
      - Require governance approval for modifications
    exceptions:
      - Refactoring with equivalent replacement
      - Security patches

# Enforcement Configuration

enforcement:
  mode: strict
  fail_on_violation: true
  require_approval_for_exceptions: true
  audit_all_enforcement_decisions: true

# Governance Approval

governance_approvers:
  - team: platform-team
  - role: repository-admin

# Compliance Reporting

reporting:
  enforcement_log: .repoos/constitution-enforcement.log
  violation_archive: .repoos/constitution-violations/
  audit_frequency: weekly

# Amendment Process

amendments:
  require_approval: true
  approval_threshold: 2  # number of approvers
  audit_trail: true
  notification_channels:
    - slack: #repo-governance
    - email: platform-team@summit.ai

# Notes

notes: |
  This constitution protects the repository from long-term governance drift.

  Typical failure pattern without a constitution:
  - Month 1: RepoOS deployed
  - Month 3: Manual merges increase
  - Month 6: Frontier systems bypassed
  - Month 9: Repository returns to PR chaos

  The constitution prevents this regression by enforcing immutable rules
  at the CI level, making it technically impossible to bypass RepoOS
  mechanisms without explicit governance approval.
