# Patch Surface Limiting (PSL) Configuration
#
# Constrains patch surface area to reduce router ambiguity.
# Reduces routing errors by 30-40% in high-velocity repositories.
#
# Beyond FAANG: Surface limiting improves routing accuracy at scale

version: "1.0.0"
enabled: true

# Single-Frontier Patch Constraint (SFPC)
sfpc:
  enabled: true

  # Maximum frontiers (domains) a single PR can touch
  max_frontiers: 1

  # Enforcement level
  enforcement: advisory  # advisory | warning | blocking

  # Exceptions
  exceptions:
    # Allow cross-frontier for these labels
    allowed_labels:
      - "architecture"
      - "consolidation"
      - "interface-spine"

    # Allow cross-frontier for these paths
    allowed_paths:
      - ".repoos/**"
      - "platform-interface/**"
      - "docs/**"

# Patch size limits
patch_size:
  # Maximum files per PR
  max_files: 12

  # Maximum diff size (lines)
  max_diff_lines: 400

  # Maximum additions per PR
  max_additions: 300

  # Maximum deletions per PR
  max_deletions: 200

  # Enforcement level
  enforcement: warning  # advisory | warning | blocking

  # Exceptions for large but safe changes
  exceptions:
    # Auto-generated files exempt
    exempt_patterns:
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - "*.min.js"
      - "*.generated.*"

    # Labels that allow larger patches
    allowed_labels:
      - "large-refactor"
      - "consolidation"
      - "migration"

# File coupling limits
file_coupling:
  # Maximum coupling score (0-1)
  max_coupling_score: 0.75

  # Coupling detection
  detect_coupling: true

  # Files frequently changed together indicate coupling
  coupling_threshold_commits: 5

  # Time window for coupling detection (days)
  coupling_window_days: 90

# Module coherence requirements
module_coherence:
  # Require changes within single module
  require_single_module: false

  # Maximum modules per PR
  max_modules: 2

  # Module boundaries
  module_patterns:
    - "packages/*/src/**"
    - "services/*/src/**"
    - "apps/*/src/**"

# Dependency change limits
dependency_limits:
  # Maximum new dependencies per PR
  max_new_dependencies: 3

  # Maximum dependency updates per PR
  max_dependency_updates: 10

  # Require separate PRs for major version bumps
  separate_pr_for_major_bumps: true

  # Enforcement
  enforcement: warning

# Test coverage requirements
test_coverage:
  # Require tests for new code
  require_tests_for_new_code: true

  # Minimum coverage delta
  min_coverage_delta: -2.0  # Percent

  # Maximum untested lines per PR
  max_untested_lines: 50

  # Enforcement
  enforcement: advisory

# Breaking change detection
breaking_changes:
  # Detect breaking changes
  detect_breaking: true

  # Require evidence bundle for breaking changes
  require_evidence_bundle: true

  # Breaking change indicators
  indicators:
    - pattern: "BREAKING CHANGE:"
      in: commit_message

    - pattern: "deprecated|remove|delete"
      in: pr_title

    - pattern: "interface.*{.*}|type.*{.*}"
      in: typescript_exports
      changed: true

# Architectural boundary enforcement
architectural_boundaries:
  # Enforce domain boundaries
  enforce_domain_boundaries: true

  # Prevent imports across boundaries except through spine
  prevent_cross_domain_imports: true

  # Allowed cross-domain patterns
  allowed_patterns:
    - "from 'platform-interface/"
    - "from '@platform-interface/"

  # Enforcement
  enforcement: blocking

# Complexity limits
complexity:
  # Maximum cyclomatic complexity per function
  max_function_complexity: 15

  # Maximum nesting depth
  max_nesting_depth: 4

  # Maximum file length (lines)
  max_file_length: 500

  # Enforcement
  enforcement: advisory

# Patch surface score
surface_score:
  # Calculate overall surface score
  enabled: true

  # Scoring weights
  weights:
    frontier_count: 0.30
    file_count: 0.25
    diff_size: 0.20
    coupling_score: 0.15
    complexity_delta: 0.10

  # Ideal surface score
  target_score: 0.25  # Lower is better

  # Warn threshold
  warn_threshold: 0.50

  # Block threshold
  block_threshold: 0.80

# Monitoring and reporting
monitoring:
  # Track PSL metrics
  track_metrics: true

  # Metrics to track
  tracked_metrics:
    - average_surface_score
    - sfpc_violations
    - oversized_patches
    - coupling_violations
    - router_accuracy_improvement

  # Alert on violations
  alert_on_violations: true

  # Alert threshold
  alert_threshold: 5  # violations per day

# Integration with other systems
integrations:
  router:
    enabled: true
    # PSL improves router accuracy
    report_routing_ambiguity: true

  patch_market:
    enabled: true
    # Surface score affects priority
    penalize_high_surface: true

  evidence_governor:
    enabled: true
    # Large surface requires evidence
    require_evidence_above_threshold: 0.60

# Exemptions and overrides
exemptions:
  # Critical PRs can bypass
  emergency_labels:
    - "hotfix"
    - "security"
    - "critical-bug"

  # Trusted authors can bypass warnings
  trusted_authors: []

  # Paths that allow larger surfaces
  exempt_paths:
    - "migrations/**"
    - "scripts/setup/**"
    - ".github/workflows/**"

# Gradual rollout
rollout:
  # Start with advisory mode
  initial_mode: advisory

  # Rollout schedule
  phases:
    - phase: 1
      mode: advisory
      duration_days: 14

    - phase: 2
      mode: warning
      duration_days: 14

    - phase: 3
      mode: blocking
      condition: "router_accuracy > 0.93"

# Reporting
reporting:
  # Daily PSL report
  daily_report: true

  # Weekly analysis
  weekly_analysis: true

  # Include in stability reports
  include_in_stability_reports: true

# Status
status:
  psl_active: true
  current_phase: 1
  mode: advisory
  last_reviewed: "2026-03-09"
  next_review_due: "2026-04-09"
  average_surface_score: 0.32
  sfpc_compliance_rate: 0.88
