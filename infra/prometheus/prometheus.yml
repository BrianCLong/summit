global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'summit-api'
    static_configs:
      - targets: ['api:4000']

  - job_name: 'summit-gateway'
    static_configs:
      - targets: ['gateway:4100']

  - job_name: 'summit-worker'
    static_configs:
      - targets: ['ai-worker:8000']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
