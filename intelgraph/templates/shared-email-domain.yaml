id: intelgraph.identity.shared-email-domain
version: 1.0.0
category: identity
title: Shared Email Domain
description: Find scoped account clusters sharing an email domain.
parameters:
  domain: { type: string, required: true }
  minAccounts: { type: integer, default: 2, min: 2 }
  timeWindowDays: { type: integer, default: 90, min: 1 }
scope:
  required: [tenantId, workspaceId]
returns:
  nodes: Account[]
  edges: HAS_EMAIL[]
  matches:
    type: cluster
provenance:
  requiredFields: [sourceIds, firstSeenAt, lastSeenAt, confidence]
risk:
  abusePotential: medium
  notes: Analyst use only. No cross-tenant execution.
budgets:
  p95Ms: 1200
  maxDbHits: 50000
  maxRows: 5000
cypher:
  entrypoint: shared_email_domain_v1
evidence:
  idPattern: IG-EVID-######
